<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://raw.githubusercontent.com/A7Club/life/refs/heads/main/faviconico.ico" type="image/x-icon">
    <title>A7 柒樂部🎡｜林口、龜山美食生活地圖指南</title>
    <meta name="description" content="提供在地住戶推薦的桃園龜山 A7 重劃區生活資訊。包含美食推薦、診所藥局、生活代辦及在地社群及建案地圖，讓住戶輕鬆掌握社區大小事。">
    <meta name="keywords" content="A7重劃區, 龜山美食, A7生活圈, 林口龜山, 桃園建案, 柒樂部">
    <meta property="og:image" content="https://a7club.github.io/life/website.jpg">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts (可愛圓潤字體) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- 🗺️ 加入 Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 🗺️ 加入 Leaflet.MarkerCluster (地標群聚套件) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', '"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        themePink: '#FF9EBB',
                        themeBlue: '#80CFFF',
                        themeYellow: '#FFD166',
                        themeGreen: '#06D6A0',
                        themePurple: '#C197FF',
                        bgPastel: '#FDFBF7'
                    },
                    boxShadow: {
                        'cute': '0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04)',
                        'sticker': '0 0 0 4px white, 0 8px 20px rgba(0,0,0,0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #FDFBF7; 
            /* 可愛的圓點背景 */
            background-image: radial-gradient(#FF9EBB 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        /* 自訂可愛滾動條 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FF9EBB; border-radius: 10px; border: 2px solid #FDFBF7; }
        ::-webkit-scrollbar-thumb:hover { background: #ff7eb3; }

        /* 隱藏橫向滾動條(強制一列時使用) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 頁面切換動畫 */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 標籤氣球動畫 */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        
        /* 數字跳動的字體強調 */
        .num-counter { font-family: 'Nunito', sans-serif; font-variant-numeric: tabular-nums; }

        /* --- Leaflet 客製化樣式 --- */
        .leaflet-popup-content-wrapper { border-radius: 1.5rem !important; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1) !important; padding: 4px !important; }
        .leaflet-popup-content { margin: 10px !important; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        
        /* 為 Leaflet Popup 關閉按鈕加上粉紅底圖與白色X (上移並靠右) */
        .leaflet-popup-close-button { 
            top: 4px !important; 
            right: 4px !important; 
            color: white !important; 
            background-color: #FF9EBB !important; 
            border-radius: 50% !important; 
            width: 24px !important; 
            height: 24px !important; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
            text-align: center !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }
        .leaflet-popup-close-button:hover { background-color: #ff7eb3 !important; color: white !important; transform: scale(1.1); transition: transform 0.2s ease;}
        
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(255, 158, 187, 0.5) !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important; color: white !important; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important;
        }

        .custom-leaflet-icon-dynamic .fa-solid { margin-bottom: 2px; margin-right: 1px; }

        .leaflet-tooltip.custom-tooltip { background-color: white; color: #FF9EBB; font-weight: 900; border-radius: 0.5rem; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 4px 10px; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        .leaflet-tooltip.custom-tooltip::before { border-top-color: white; }

        /* 水滴圖標動畫 */
        .floating-marker { animation: floatMarker 2.5s ease-in-out infinite; }
        @keyframes floatMarker {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        
        /* 恢復圖標彈跳動畫 */
        .bounce-marker { animation: bounceMarker 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite; }
        @keyframes bounceMarker {
            0% { transform: translateY(0px) scale(1, 1); }
            45% { transform: translateY(-12px) scale(0.95, 1.05); }
            100% { transform: translateY(0px) scale(1, 1); }
        }

        /* 可愛愛心動畫 */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.35); }
            28% { transform: scale(1); }
            42% { transform: scale(1.35); }
            70% { transform: scale(1); }
        }
        .heart-beat-active {
            animation: heartBeat 0.6s ease-in-out;
        }
        @keyframes flyUpFade {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5) rotate(15deg); opacity: 0; }
        }
        .flying-heart {
            position: fixed;
            pointer-events: none;
            animation: flyUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            color: #FF4785;
            font-size: 1.5rem;
            z-index: 9999;
            text-shadow: 0 4px 8px rgba(255, 71, 133, 0.3);
        }
    </style>
</head>
<body class="text-gray-700 antialiased min-h-screen flex flex-col relative">

    <!-- 🎪 導航列 (雲朵造型) -->
    <nav class="sticky top-4 z-40 mx-4 sm:mx-8 lg:mx-auto max-w-6xl">
        <div class="bg-white/90 backdrop-blur-md rounded-full shadow-cute px-6 py-3 flex justify-between items-center border-2 border-white">
            <!-- Logo -->

                <button onclick="loadPage('medical')" id="nav-btn-medical" class="nav-btn px-4 py-2 rounded-full font-bold text-gray-500 hover:bg-themeGreen hover:text-white transition-all">🩺 救護站</button>

            <button onclick="loadPage('food'); toggleMobileMenu()" class="w-full py-4 px-6 rounded-2xl font-black text-xl tracking-wider text-themePink bg-pink-50 shadow-sm active:scale-95 transition-transform">🍿 美食販賣部</button>
            <button onclick="loadPage('shopping'); toggleMobileMenu()" class="w-full py-4 px-6 rounded-2xl font-black text-xl tracking-wider text-themeYellow bg-yellow-50 shadow-sm active:scale-95 transition-transform">🛍️ 購物與生活</button>
            <button onclick="loadPage('medical'); toggleMobileMenu()" class="w-full py-4 px-6 rounded-2xl font-black text-xl tracking-wider text-themeGreen bg-green-50 shadow-sm active:scale-95 transition-transform">🩺 樂園救護站</button>
            <button onclick="loadPage('explore'); toggleMobileMenu()" class="w-full py-4 px-6 rounded-2xl font-black text-xl tracking-wider text-themePurple bg-purple-50 shadow-sm active:scale-95 transition-transform">🎠 探索在地A7</button>
        </div>
    </nav>

    <!-- 🎈 動態內容容器 (避免重疊的核心) -->
    <main id="app-root" class="flex-1 max-w-6xl mx-auto w-full px-4 sm:px-6 py-8 relative">
        <!-- JS 將會把 Template 的內容注入到這裡 -->
    </main>

    <!-- 頁腳 -->
    <footer class="bg-white border-t-4 border-dashed border-pink-200 py-8 text-center mt-auto rounded-t-[3rem]">
        <h2 class="text-xl font-black text-themePink mb-2">A7 柒楽部 ᴄʟᴜʙ🎈林口、龜山美食機能生活地圖指南 </h2>
        <p class="text-gray-400 text-sm font-bold">讓每天的生活都像在遊樂園一樣精彩！© 2026</p>

    <!-- ========================================== -->
    <!-- 🛍️ 店家詳細資訊 Modal (彈出視窗) -->
    <!-- ========================================== -->
    <div id="store-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-6">

        <!-- 卡片內容 -->
        <div class="bg-white w-full max-w-lg rounded-[2rem] md:rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh] transform scale-95 opacity-0 transition-all duration-300" id="store-modal-content">
            <!-- 關閉按鈕 -->
            <button onclick="closeStoreModal()" class="absolute top-4 right-4 w-10 h-10 bg-white rounded-full text-gray-500 hover:bg-themePink hover:text-white flex items-center justify-center z-20 shadow-md transition-colors border-2 border-gray-100">

    <!-- 🏠 1. 首頁模板 -->

                <div class="absolute inset-0 bg-gradient-to-br from-themeBlue/40 to-themePink/40"></div>
                
                <div class="absolute -right-10 -top-10 text-white/40 text-9xl z-0"><i class="fa-solid fa-tent"></i></div>

                <p class="text-lg md:text-xl text-white/95 font-bold mb-8 relative z-10 drop-shadow-md">林口、龜山、A7體育大學站在地生活指南<br>

                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>

    <!-- JavaScript 路由與注入邏輯 -->
    <script>
        // 用於存放全域 setInterval 以便切換頁面時清除
        let globalMrtInterval = null;
        
        // --- Leaflet 全域變數 ---
        let foodMapInstance = null;
        let foodClusterGroup = null;
        let foodMarkersMap = {}; 
        let activeFoodMarkerName = null; // 新增：用於記錄目前被選取的店家名稱

        // 初始化與路由監聽 (讓 GA 可追蹤網址 Hash 停留時間)
        document.addEventListener('DOMContentLoaded', () => {
            handleRoute();
        });

        // 當網址 Hash 發生變化時觸發 (可用於瀏覽器上一頁/下一頁)
        window.addEventListener('hashchange', handleRoute);

        // 核心路由控制處理器
        function handleRoute(customRoute) {
            let hash = 'home';
            if (typeof customRoute === 'string') {
                hash = customRoute;
            } else {
                try {
                    hash = window.location.hash.substring(1) || 'home';
                } catch(e) {
                    hash = 'home';
                }
            }
            
            // 處理搜尋的特殊路由
            if (hash.startsWith('search=')) {
                const query = decodeURIComponent(hash.substring(7));
                renderPage('search');
                executeSearchLogic(query);
            } else if (hash === 'buildings') {
                // 處理建案分佈的特殊書籤：載入探索頁面且不捲動至頂部
                renderPage('explore', true); 
                // 延遲等待 DOM 渲染與資料拉取後，平滑捲動到建案區塊
                setTimeout(() => {
                    const section = document.getElementById('buildings-section');
                    if (section) {
                        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 150);
            } else {
                renderPage(hash);
            }
        }

        // 修改原本的 loadPage，改為推播網址 Hash，讓瀏覽器產生歷史紀錄
        function loadPage(pageId) {
            try {
                history.pushState(null, '', '#' + pageId);
            } catch (e) {
                // Canvas 環境安全性限制，略過報錯
            }
            handleRoute(pageId);
        }

        // 打開店家詳細資訊 Modal
        function openStoreModal(name, tag, tagColor, desc, address, hours, imgUrl, mapQuery) {
            document.getElementById('store-modal-title').innerText = name;
            
            const tagEl = document.getElementById('store-modal-tag');
            tagEl.innerText = tag;
            tagEl.className = `text-xs font-black px-2.5 py-1 rounded-lg text-white shadow-sm ${tagColor}`;
            
            document.getElementById('store-modal-desc').innerText = desc;
            document.getElementById('store-modal-hours').innerText = hours;
            
            const imgContainer = document.getElementById('store-modal-img-container');
            // 清除之前的圖片，並加入新圖片，同時保留漸層遮罩
            imgContainer.innerHTML = `
                <img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent z-10"></div>
            `;
            
            const mapBtn = document.getElementById('store-modal-map-btn');
            const qrContainer = document.getElementById('store-modal-qr-container');
            const qrImg = document.getElementById('store-modal-qr-img');
            const lineBtn = document.getElementById('store-modal-line-btn');
            const ratingContainer = document.getElementById('store-modal-rating-container');
            const addressEl = document.getElementById('store-modal-address');
            
            // 判判若是 LINE 網址，顯示 QR Code 區塊並隱藏 Google Map 按鈕
            if (mapQuery.startsWith('http') && (mapQuery.includes('line.me') || mapQuery.includes('lin.ee'))) {
                mapBtn.classList.add('hidden');
                qrContainer.classList.remove('hidden');
                qrContainer.classList.add('flex');
                
                // 使用公共 API 生成 QR Code
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(mapQuery)}`;
                lineBtn.href = mapQuery;
                
                // 如果是純線上服務，隱藏評分
                if (ratingContainer) ratingContainer.classList.add('hidden');
                
                // 地址欄改為顯示 LINE 帳號提示
                addressEl.innerHTML = `<span class="text-[#00B900]">官方 LINE 帳號諮詢</span>`;
                
            } else {
                // 一般實體店家，顯示 Google Map
                qrContainer.classList.add('hidden');
                qrContainer.classList.remove('flex');
                mapBtn.classList.remove('hidden');
                
                if (ratingContainer) ratingContainer.classList.remove('hidden');
                addressEl.innerText = address;

                mapBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(mapQuery)}`;
                mapBtn.innerHTML = `<i class="fa-solid fa-map-location-dot text-xl"></i> 前往 Google Map 查看詳細資訊`;
                mapBtn.className = "w-full text-white bg-blue-500 hover:bg-blue-600 font-black py-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 transition-transform hover:scale-[1.02] text-lg";
            }

            const modal = document.getElementById('store-modal');
            const content = document.getElementById('store-modal-content');
            
            // 顯示背景
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // 觸發放大淡入動畫
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        // 關閉店家詳細資訊 Modal
        function closeStoreModal() {
            const modal = document.getElementById('store-modal');
            const content = document.getElementById('store-modal-content');
            
            // 觸發縮小淡出動畫
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            // 等待動畫結束後隱藏背景
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        // 頁面動態注入核心函數 (原本的 loadPage 改為內部 renderPage)
        function renderPage(pageId, skipScrollTop = false) {
            const root = document.getElementById('app-root');
            const template = document.getElementById('tpl-' + pageId);
            
            if (template) {
                // 1. 完全清空容器 (避免 DOM 重疊與衝突)
                root.innerHTML = '';
                
                // 2. 複製 Template 內容並注入
                root.appendChild(template.content.cloneNode(true));
                
                // 3. 更新導航列樣式
                updateNavStyles(pageId);
                
                // 4. 平滑滾動到頂部 (如果是跳轉到特定錨點則略過)
                if (!skipScrollTop) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }

                // 如果是首頁，觸發捲動監聽的跳動數字動畫及各種動態載入
                if (pageId === 'home') {
                    // 微小延遲確保 DOM 已完全渲染
                    setTimeout(() => {
                        fetchAndUpdateHomeCounts(); // 動態載入並計算首頁店家數字
                        fetchAttractionsData(); // 新增：抓取動態景點並計算車程
                        fetchLocalNews(); // 新增：抓取在地動態新聞
                        
                        // 啟動 MRT 動態模擬
                        updateMRTStatus();
                        if (globalMrtInterval) clearInterval(globalMrtInterval);
                        globalMrtInterval = setInterval(updateMRTStatus, 1000);
                    }, 50);
                } else {
                    // 若切換到其他頁面，清除 MRT 動畫定時器節省資源
                    if (globalMrtInterval) {
                        clearInterval(globalMrtInterval);
                        globalMrtInterval = null;
                    }
                }

                // 如果是 Food 頁面，動態抓取試算表資料
                if (pageId === 'food') {
                    // 確保 DOM 載入後喚醒 Leaflet
                    setTimeout(() => {
                        initFoodMap();
                        fetchFoodData();
                    }, 50);
                }

                // 如果是 Shopping 頁面，動態抓取購物生活資料庫
                if (pageId === 'shopping') {
                    fetchShoppingData();
                }

                // 如果是 Medical 頁面，動態抓取醫療資料庫
                if (pageId === 'medical') {
                    fetchMedicalData();
                }

                // 如果是 Explore 頁面，動態抓取熱門社群推薦資料
                if (pageId === 'explore') {
                    fetchCommunityData();
                    fetchBuildingData(); // 新增：抓取建案資料
                }
            } else {
                console.error("找不到對應的模板: ", pageId);
            }
        }

        // ==========================================
        // 🔎 全域搜尋系統 (Global Search)
        // ==========================================
        function doSearch() {
            const input = document.getElementById('home-search-input');
            if(!input) return;
            const query = input.value.trim();
            if(!query) return;
            
            const route = 'search=' + encodeURIComponent(query);
            try {
                history.pushState(null, '', '#' + route);
            } catch (e) {
                // Canvas 環境安全性限制，略過報錯
            }
            handleRoute(route);
        }

        // --- 機捷動態模擬更新函數 ---
        function updateMRTStatus() {
            const container = document.getElementById('mrt-track-container');
            const nbEl = document.getElementById('mrt-time-north');
            const sbEl = document.getElementById('mrt-time-south');
            if (!container || !nbEl || !sbEl) return;

            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const currentTotalMinutes = minutes + seconds / 60;

            // 假設北上列車 (往台北) 在每個小時的 5, 20, 35, 50 分抵達 A7
            const baseNbArrivals = [5, 20, 35, 50]; 
            // 假設南下列車 (往機場) 在每個小時的 10, 25, 40, 55 分抵達 A7
            const baseSbArrivals = [10, 25, 40, 55]; 

            let nbTrainsHTML = '';
            let minNbDiff = 999;
            
            // 處理北上列車 (由 A10 往 A4 方向移動，A7位於中心)
            baseNbArrivals.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - currentTotalMinutes;
                    if (diff > 0 && diff < minNbDiff) minNbDiff = diff;
                    
                    // 從 A10 到 A4，總共跨越 6 個站距，每站約3分鐘，跨度約為 -9 到 +9 分鐘
                    if (diff >= -9 && diff <= 9) {
                        // A7 固定在 50% 位置，每 9 分鐘移動 50%
                        // 北上列車：從右側 A10 (100%) 往左側 A4 (0%) 開
                        let pos = 50 + (diff * (50/9));
                        pos = Math.max(0, Math.min(100, pos));
                        
                        nbTrainsHTML += `<div class="absolute top-[0px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;">
                            <div class="bg-white text-themeGreen rounded-full shadow-md border-2 border-green-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse">
                                <i class="fa-solid fa-caret-left text-[10px]"></i>
                                <i class="fa-solid fa-train-subway text-xs sm:text-sm"></i>
                            </div>
                        </div>`;
                    }
                });
            });

            let sbTrainsHTML = '';
            let minSbDiff = 999;
            
            // 處理南下列車 (由 A4 往 A10 方向移動)
            baseSbArrivals.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - currentTotalMinutes;
                    if (diff > 0 && diff < minSbDiff) minSbDiff = diff;
                    
                    if (diff >= -9 && diff <= 9) {
                        // 南下列車：從左側 A4 (0%) 往右側 A10 (100%) 開
                        let pos = 50 - (diff * (50/9));
                        pos = Math.max(0, Math.min(100, pos));
                        
                        sbTrainsHTML += `<div class="absolute top-[26px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;">
                            <div class="bg-white text-themeBlue rounded-full shadow-md border-2 border-blue-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse" style="animation-delay: 0.5s;">
                                <i class="fa-solid fa-train-subway text-xs sm:text-sm"></i>
                                <i class="fa-solid fa-caret-right text-[10px]"></i>
                            </div>
                        </div>`;
                    }
                });
            });

            // 寫入畫面
            container.innerHTML = nbTrainsHTML + sbTrainsHTML;

            // 更新倒數文字
            const updateText = (el, diff, unitId) => {
                const unitEl = document.getElementById(unitId);
                if (Math.ceil(diff) <= 1 && Math.ceil(diff) >= 0) {
                    el.innerText = '進站中';
                    el.className = 'text-2xl sm:text-3xl font-black text-red-400 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest';
                    if(unitEl) unitEl.style.display = 'none';
                } else {
                    el.innerText = Math.ceil(diff);
                    el.className = el.id.includes('north') ? 'text-3xl sm:text-4xl font-black text-themeGreen font-mono w-10 text-center' : 'text-3xl sm:text-4xl font-black text-themeBlue font-mono w-10 text-center';
                    if(unitEl) unitEl.style.display = 'inline';
                }
            };

            updateText(nbEl, minNbDiff, 'mrt-unit-north');
            updateText(sbEl, minSbDiff, 'mrt-unit-south');
        }

        // 單一數字跳動動畫函數 (Ease-Out 特效)
        function animateSingleCounter(counter, target) {
            const duration = 2000; // 動畫總時間 2 秒
            const frameRate = 1000 / 60; // 60 FPS
            const totalFrames = Math.round(duration / frameRate);
            let currentFrame = 0;

            // 緩動函數
            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

            const updateCounter = () => {
                currentFrame++;
                const progress = easeOutExpo(currentFrame / totalFrames);
                const currentVal = Math.round(target * progress);
                counter.innerText = currentVal;

                if (currentFrame < totalFrames) {
                    requestAnimationFrame(updateCounter);
                } else {
                    counter.innerText = target; // 確保最後停在精準目標數字
                }
            };
            
            counter.innerText = '0';
            requestAnimationFrame(updateCounter);
        }

        // --- 景點車程計算邏輯 ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球半徑(公里)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // 返回直線距離(公里)
        }

        async function calculateCarTime() {
            const timeElements = document.querySelectorAll('.location-time');
            if(!timeElements.length) return;

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    // 依序處理每個景點卡片
                    for (let el of timeElements) {
                        let targetLat = parseFloat(el.getAttribute('data-lat'));
                        let targetLng = parseFloat(el.getAttribute('data-lng'));
                        const address = el.getAttribute('data-address');

                        // 如果沒有經緯度，嘗試利用 OSM (Nominatim) 即時將地址轉為座標
                        if ((isNaN(targetLat) || isNaN(targetLng)) && address) {
                            try {
                                let searchAddress = address;
                                if(!searchAddress.includes('市') && !searchAddress.includes('區')) {
                                    searchAddress = '桃園市龜山區 ' + searchAddress;
                                }
                                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                                const data = await response.json();
                                if (data && data.length > 0) {
                                    targetLat = parseFloat(data[0].lat);
                                    targetLng = parseFloat(data[0].lon);
                                    // 儲存起來避免重複查詢
                                    el.setAttribute('data-lat', targetLat);
                                    el.setAttribute('data-lng', targetLng);
                                }
                            } catch (e) {
                                console.error("座標換算失敗:", address);
                            }
                            // 為了遵守免費地圖 API 限制，每次查詢間隔 1 秒
                            await new Promise(r => setTimeout(r, 1000));
                        }

                        // 如果成功取得座標，計算距離與車程
                        if (!isNaN(targetLat) && !isNaN(targetLng)) {
                            const dist = calculateDistance(userLat, userLng, targetLat, targetLng);
                            let estimatedMins = Math.round((dist / 30) * 60 + 5);
                            if(estimatedMins < 2) estimatedMins = 2;
                            el.innerHTML = `<i class="fa-solid fa-car-side"></i> 車程約 ${estimatedMins} 分鐘`;
                            el.classList.replace('text-gray-400', 'text-themePurple');
                        } else {
                            el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 無法估算車程`;
                            el.classList.replace('text-themePurple', 'text-gray-400');
                        }
                    }
                }, function(error) {
                    timeElements.forEach(el => {
                        el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 未授權定位 (無法估算)`;
                        el.classList.replace('text-themePurple', 'text-gray-400');
                    });
                });
            } else {
                timeElements.forEach(el => {
                    el.innerHTML = `<i class="fa-solid fa-car-side"></i> 瀏覽器不支援定位`;
                });
            }
        }

        // CSV 解析器 (支援引號內換行與逗號)
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            // 過濾掉全空的列
            return ret.filter(r => r.join('').trim() !== '');
        }

        // 輔助函數：自動隱藏台灣地址開頭的 3~6 碼郵遞區號
        function formatAddress(address) {
            if (!address) return '';
            // 正則表達式：比對開頭的 3 到 6 個數字，以及可能緊接在後的空白並將其移除
            return address.replace(/^\d{3,6}\s*/, '');
        }

        // 輔助函數：格式化店家名稱，將英文縮小
        function formatStoreName(name) {
            // 利用正則表達式，將英文與其周圍的空格包覆在較小字級的 span 中
            return name.replace(/([a-zA-Z\s]+)/g, '<span class="text-[0.8em]">$1</span>');
        }

        // 讀取愛心表單資料 (僅用於確認自己有沒有點過讚)
        function loadSharedLikesData() {
            return new Promise((resolve) => {
                if (globalLikesData) return resolve(globalLikesData);
                
                // 你的愛心評分 Google Sheet CSV 網址 (likeClick)
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1295636704&single=true&output=csv';
                
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    let likesMap = {};
                    
                    if (rows.length > 1) {
                        const headers = rows[0];
                        const isLogFormat = headers.some(h => h.includes('時間')) && headers.some(h => h.includes('ID')) && headers.some(h => h.includes('店'));

                        if (isLogFormat) {
                            const userIdx = headers.findIndex(k => k.includes('ID') || k.includes('使用者'));
                            const storeIdx = headers.findIndex(k => k.includes('店'));

                            rows.slice(1).forEach(row => {
                                const storeName = row[storeIdx];
                                const userId = row[userIdx];
                                if (!storeName || !userId) return;

                                if (!likesMap[storeName]) {
                                    likesMap[storeName] = { users: [] };
                                }
                                if (!likesMap[storeName].users.includes(userId)) {
                                    likesMap[storeName].users.push(userId);
                                }
                            });
                        }
                    }
                    
                    // 結合 LocalStorage 暫存的按讚資料
                    const localCache = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
                    for (let store in localCache) {
                        if(!likesMap[store]) likesMap[store] = { users: [] };
                        // 將本地已紀錄的 user 合併進去
                        localCache[store].users.forEach(u => {
                            if(!likesMap[store].users.includes(u)) likesMap[store].users.push(u);
                        });
                    }
                    
                    globalLikesData = likesMap;
                    resolve(globalLikesData);
                }).catch(err => {
                    console.error("讀取愛心表單失敗:", err);
                    globalLikesData = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
                    resolve(globalLikesData);
                });
            });
        }

        // 處理愛心點擊 (樂觀 UI 更新：直接改 DOM 數字)
        function toggleLike(event, storeName) {
            event.stopPropagation(); // 避免點擊愛心時觸發外層卡片的彈出視窗或導航
            
            if (!globalLikesData[storeName]) {
                globalLikesData[storeName] = { users: [] };
            }
            
            const storeLikes = globalLikesData[storeName];
            const userIndex = storeLikes.users.indexOf(currentUserId);
            const isLiked = userIndex !== -1;
            
            const btn = event.currentTarget;
            const icon = btn.querySelector('i.fa-heart');
            const countSpan = btn.querySelector('span');
            let currentCount = parseInt(countSpan.innerText) || 0;
            
            if (isLiked) {
                // 已按讚 -> 取消讚
                storeLikes.users.splice(userIndex, 1);
                icon.classList.remove('fa-solid', 'heart-beat-active', 'text-[#FF4785]');
                icon.classList.add('fa-regular', 'text-pink-400');
                btn.classList.remove('bg-pink-50', 'border-pink-300');
                countSpan.innerText = Math.max(0, currentCount - 1);
            } else {
                // 未按讚 -> 新增讚
                storeLikes.users.push(currentUserId);
                icon.classList.remove('fa-regular', 'text-pink-400');
                icon.classList.add('fa-solid', 'heart-beat-active', 'text-[#FF4785]');
                btn.classList.add('bg-pink-50', 'border-pink-300');
                countSpan.innerText = currentCount + 1;
                
                // 動態產生飛出的可愛小愛心
                const flyingHeart = document.createElement('i');
                flyingHeart.className = 'fa-solid fa-heart flying-heart';
                // 取得點擊位置
                flyingHeart.style.left = (event.clientX - 10) + 'px';
                flyingHeart.style.top = (event.clientY - 10) + 'px';
                document.body.appendChild(flyingHeart);
                
                // 動畫結束後移除節點
                setTimeout(() => flyingHeart.remove(), 800);
            }
            
            // 將更新狀態存入本地快取 (只存 users 陣列，不存 count，count 永遠以表單 O 欄為準)
            localStorage.setItem('a7club_likes_cache', JSON.stringify(globalLikesData));

            // ==== 串接 Google Apps Script 寫入 ====
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyH7yhuVfi-Ajb0u9hwob8plKXqvm2Bbas4H-TFiDFQ2_aKmZQI6vhfHJyvLO7xhB1WA/exec';
            const now = new Date();
            const timeString = now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
            
            if (GAS_URL) {
                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8' 
                    },
                    body: JSON.stringify({
                        storeName: storeName,
                        userId: currentUserId,
                        action: isLiked ? 'unlike' : 'like',
                        timestamp: timeString 
                    })
                }).catch(e => console.log('傳送愛心資料失敗', e));
            }
        }

        // 輔助函數：透過分類名稱，找出最適合的樣式設定
        function getFoodStyleByCategory(categoryName) {
            if (!categoryName) return FOOD_CATEGORY_STYLES[FOOD_CATEGORY_STYLES.length - 1]; // 回傳預設
            
            for (let style of FOOD_CATEGORY_STYLES) {
                if (style.keywords.some(kw => categoryName.includes(kw))) {
                    return style;
                }
            }
            return FOOD_CATEGORY_STYLES[FOOD_CATEGORY_STYLES.length - 1]; // 找不到配對，回傳預設
        }

        function loadSharedFoodData() {
            return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點') || k.includes('網址')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                        let finalImg = rawImg.startsWith('http') ? rawImg : '';
                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                            img: finalImg,
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                            likesCount: parseInt(row[14]) || 0 // 讀取 O 欄作為絕對愛心數量
                        };
                    }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(reject);
            });
        }

                <div onclick="updateFoodMap('${item.address.replace(/'/g, "\\'")}', '${item.name.replace(/'/g, "\\'")}', ${item.lat || null}, ${item.lng || null}, '${item.category.replace(/'/g, "\\'")}')" class="bg-white p-4 rounded-3xl shadow-cute flex items-center gap-4 hover:-translate-y-1 transition-transform cursor-pointer border border-pink-50 group relative">

        // 點擊飛躍動畫與地標顏色變化 (平滑飛躍，徹底移除畫面顫抖衝突)
        async function updateFoodMap(address, name, preLat, preLng, category) {
            // 如果地圖上已經有該店家地標，直接平滑飛躍 (不顯示載入遮罩避免畫面閃爍)
            if (foodMarkersMap[name]) {
                const marker = foodMarkersMap[name];
                
                // 還原前一個被點擊的店家圖標狀態
                if (activeFoodMarkerName && activeFoodMarkerName !== name && foodMarkersMap[activeFoodMarkerName]) {
                    const prevMarker = foodMarkersMap[activeFoodMarkerName];
                    if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                    prevMarker.setIcon(getCategoryIcon(prevMarker.category, 'normal', false));
                }
                activeFoodMarkerName = name; // 更新當前選取店家
                
                // 計算下修偏移量，讓圖釘落在地圖下方 1/3 處保留上方資訊卡空間
                const targetZoom = 18;
                const pt = foodMapInstance.project(marker.getLatLng(), targetZoom);
                // 將視角中心往上移 (Y軸減去高度的 1/3.5)，讓圖釘在畫面中往下掉
                pt.y -= foodMapInstance.getSize().y / 3.5; 
                const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);
                
                // 單純使用 flyTo 從目前位置平滑飛躍到目標店家
                foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });
                
                // 必須等飛躍動畫完全結束 ('moveend') 後，再執行地標展開與變色
                foodMapInstance.once('moveend', () => {
                    foodClusterGroup.zoomToShowLayer(marker, () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(category, 'clicked', true));
                        
                        // 5 秒後停止跳動，但保持紅色
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => {
                            if (foodMarkersMap[name] && activeFoodMarkerName === name) {
                                marker.setIcon(getCategoryIcon(category, 'clicked', false));
                            }
                        }, 5000);
                    });
                });
                return;
            }

            // 以下為無快取時需透過地址解析的 fallback 邏輯
            const overlay = document.getElementById('food-map-overlay');
            const overlayText = document.getElementById('food-map-overlay-text');
            
            if (overlay) {
                overlayText.className = "text-sm font-bold text-gray-600";
                overlayText.innerText = `正在為您定位 ${name}...`;
                overlay.style.display = 'flex';
            }

            try {
                let targetLat = preLat;
                let targetLng = preLng;

                if (!targetLat || !targetLng) {
                    let searchAddress = address.includes('市') ? address : '桃園市龜山區 ' + address;
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        targetLat = parseFloat(data[0].lat);
                        targetLng = parseFloat(data[0].lon);
                    }
                }

                if (targetLat && targetLng) {
                    const targetZoom = 18;
                    const pt = foodMapInstance.project([targetLat, targetLng], targetZoom);
                    pt.y -= foodMapInstance.getSize().y / 3.5;
                    const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);

                    foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });
                    setTimeout(() => {
                        L.popup({ className: 'custom-popup-temporary' })
                            .setLatLng([targetLat, targetLng])
                            .setContent(`<div class="font-black text-themePink p-2 pt-6 text-center text-lg leading-[1.1]"><i class="fa-solid fa-location-dot mr-1"></i> ${formatStoreName(name)}</div>`)
                            .openOn(foodMapInstance);
                    }, 1000);
                } else {
                    if (overlay) {
                        overlayText.innerHTML = `地圖無法精確定位此地址<br><span class="text-xs text-gray-400 mt-1">${address}</span>`;
                        overlayText.className = "text-sm font-bold text-red-400 text-center";
                        setTimeout(() => overlay.style.display = 'none', 2000);
                        return;
                    }
                }
            } catch (error) { 
                console.error("Geocoding error:", error); 
                if (overlay) {
                    overlayText.innerText = `地圖服務暫時無法連線`;
                    overlayText.className = "text-sm font-bold text-red-400";
                    setTimeout(() => overlay.style.display = 'none', 2000);
                    return;
                }
            }

            if(overlay) setTimeout(() => overlay.style.display = 'none', 800);
        }

        // ==========================================
        // 🛍️ 購物、生活與景點共用資料模組 (Shopping)
        // ==========================================
        function loadSharedShoppingData() {
            return new Promise((resolve, reject) => {
                if (globalShoppingData) {
                    resolve(globalShoppingData);
                    return;
                }
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1279676556&single=true&output=csv';

                fetch(csvUrl)
                    .then(res => res.text())
                    .then(csvText => {
                        const rows = parseCSV(csvText);
                        if (rows.length < 2) {
                            globalShoppingData = [];
                            resolve(globalShoppingData);
                            return;
                        }

                        const headers = rows[0];
                        let nameIdx = headers.findIndex(k => k.includes('店') || k.includes('名'));
                        if (nameIdx === -1) nameIdx = 1; 
                        
                        let catIdx = headers.findIndex(k => k === '生活分類' || k.includes('生活分類'));
                        if (catIdx === -1) catIdx = 6; 

                        let addressIdx = headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點'));
                        let statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                        let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')); // 抓取照片

                        let parsedData = rows.slice(1).map(row => {
                            let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                            let finalImg = rawImg.startsWith('http') ? rawImg : '';

                            return {
                                name: row[nameIdx] || '未命名',
                                category: row[catIdx] || '未分類',
                                address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                                status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                                img: finalImg,
                                likesCount: parseInt(row[14]) || 0 // 讀取 O 欄作為絕對愛心數量
                            };
                        }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                        globalShoppingData = parsedData.filter(item => {
                            if (statusIdx === -1) return true;
                            const s = String(item.status).toUpperCase().trim();
                            return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                        });

                        resolve(globalShoppingData);
                    })
                    .catch(err => reject(err));
            });
        }

        function fetchShoppingData() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;

            // 等待購物生活資料與愛心資料同時載入
            Promise.all([loadSharedShoppingData(), loadSharedLikesData()]).then(([data, likes]) => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold py-8">目前沒有店家資料</div>';
                } else {
                    renderShoppingData(data, '全部');
                }
            }).catch(err => {
                console.error('CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8">資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderShoppingData(data, activeCategory = '全部') {
            const container = document.getElementById('shopping-list-container');
            const tagsContainer = document.getElementById('shopping-tags-container');
            if (!container) return;

            // 取消瀑布流，改為單一直列佈局 (因為會將機捷、圖片分類獨立抽離出來)
            container.className = "flex flex-col gap-6 w-full";

            // --- 1. 渲染上方分類 TAG ---
            if (tagsContainer) {
                // 從全部資料中抓出唯一分類
                const allCategories = ['全部', ...new Set(globalShoppingData.map(item => item.category).filter(c => c))];
                
                tagsContainer.innerHTML = allCategories.map(cat => {
                    const isActive = cat === activeCategory;
                    
                    // 統一標籤的適應性佈局，取消個別差異
                    const activeClass = isActive 
                        ? 'bg-themeYellow text-white shadow-md scale-[1.02] md:scale-105 z-10' 
                        : 'bg-white text-gray-600 hover:bg-yellow-50 shadow-sm border-2 border-transparent hover:-translate-y-1';
                    
                    // 給予適合的圖示
                    let icon = '🛍️';
                    if(cat.includes('生鮮') || cat.includes('超市') || cat.includes('食品') || cat.includes('市場')) icon = '🛒';
                    if(cat.includes('居家') || cat.includes('寵物') || cat.includes('五金') || cat.includes('電器')) icon = '🏠';
                    if(cat.includes('服務') || cat.includes('洗') || cat.includes('美容') || cat.includes('修繕')) icon = '✂️';
                    if(cat === '全部') icon = '🎡';
                    
                    // 手機版根據內容自適應寬度 (flex-auto)，大螢幕維持一列 (lg:flex-1 或 flex-none)，文字縮小一級，改為全圓角藥丸形狀
                    return `<button onclick="renderShoppingData(globalShoppingData, '${cat.replace(/'/g, "\\'")}')" class="flex-auto lg:flex-1 w-auto py-2.5 md:py-3 px-4 md:px-6 rounded-full font-black text-xs md:text-sm transition-all transform flex items-center justify-center gap-1 md:gap-2 border border-yellow-100 whitespace-nowrap ${activeClass}">
                                <span class="hidden md:inline-block shrink-0">${icon}</span>
                                <span>${cat}</span>
                            </button>`;
                }).join('');
            }

            // --- 2. 依照選中的分類過濾資料 ---
            const filteredData = activeCategory === '全部' ? data : data.filter(item => item.category === activeCategory);

            if (filteredData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有審核通過的店家喔！</div>';
                return;
            }

            // --- 3. 依生活分類群組化過濾後的資料，並渲染卡片 ---
            const groupedCategories = {};
            filteredData.forEach(item => {
                const cat = item.category || '未分類';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            // 為不同分類預備的可愛色彩池
            const stylePool = [
                { border: 'border-yellow-50', textBig: 'text-yellow-100', textTitle: 'text-themeYellow', icon: 'fa-cart-shopping', emoji: '🛒' },
                { border: 'border-blue-50', textBig: 'text-blue-100', textTitle: 'text-themeBlue', icon: 'fa-couch', emoji: '🏠' },
                { border: 'border-purple-50', textBig: 'text-purple-100', textTitle: 'text-themePurple', icon: 'fa-scissors', emoji: '✂️' },
                { border: 'border-green-50', textBig: 'text-green-100', textTitle: 'text-themeGreen', icon: 'fa-basket-shopping', emoji: '🛍️' },
                { border: 'border-pink-50', textBig: 'text-pink-100', textTitle: 'text-themePink', icon: 'fa-gift', emoji: '🎁' }
            ];

            let mrtBlocksHtml = '';
            let photoBlocksHtml = '';
            let listBlocksHtml = '';
            let styleIndex = 0;

            for (const [catName, items] of Object.entries(groupedCategories)) {

                items.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));

                // 智慧配對：依分類名稱關鍵字給予適合的顏色與圖示，若無則按順序取用
                let style;
                if (catName.includes('生鮮') || catName.includes('超市') || catName.includes('採買') || catName.includes('食品') || catName.includes('市場')) style = stylePool[0];
                else if (catName.includes('居家') || catName.includes('寵物') || catName.includes('五金') || catName.includes('電器')) style = stylePool[1];
                else if (catName.includes('服務') || catName.includes('洗') || catName.includes('寄') || catName.includes('修') || catName.includes('美容')) style = stylePool[2];
                else {

                            <button onclick="toggleLike(event, '${item.name.replace(/'/g, "\\'")}')" class="absolute bottom-1.5 right-1.5 hover:scale-110 active:scale-95 transition-all flex items-center gap-1 shrink-0 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-xl text-xs font-black shadow-sm z-20 border-2 border-pink-100 ${isLiked ? 'bg-pink-50 border-pink-300' : 'text-pink-400'}">

                            </button>

        // ==========================================
        // 🩺 樂園救護站 (Medical) 模組
        // ==========================================
        function loadSharedMedicalData() {
            return new Promise((resolve, reject) => {
                if (globalMedicalData) return resolve(globalMedicalData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
                
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構') || k.includes('店名'));
                    if (nameIdx === -1) nameIdx = 0; 
                    let catIdx = headers.findIndex(k => k.includes('醫療分類'));
                    if (catIdx === -1) catIdx = 8; // 預設使用 I 欄
                    let addressIdx = headers.findIndex(k => k.includes('地址'));
                    let phoneIdx = headers.findIndex(k => k.includes('電話'));
                    
                    // 尋找機構代碼/核准字號欄位，預設為 O 欄 (第15欄，即 index 14)
                    let licenseIdx = 14; 

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他醫療',
                            address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                            phone: phoneIdx !== -1 && row[phoneIdx] ? row[phoneIdx].trim() : '',
                            license: row[licenseIdx] ? row[licenseIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalMedicalData = parsedData;
                    resolve(globalMedicalData);
                }).catch(reject);
            });
        }

        // --- 探索在地A7：社群推薦模組 ---
        function loadSharedCommunityData() {
            return new Promise((resolve, reject) => {
                if (globalCommunityData) return resolve(globalCommunityData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('社群'));
                    if (nameIdx === -1) nameIdx = 0;
                    let catIdx = headers.findIndex(k => k.includes('屬性') || k.includes('分類'));
                    if (catIdx === -1) catIdx = 1;
                    let linkIdx = headers.findIndex(k => k.includes('連結') || k.includes('網址') || k.includes('URL'));
                    if (linkIdx === -1) linkIdx = 2;
                    
                    // 強制指定讀取表單 E 欄 (Index 4 為 E 欄) 作為照片備註來源
                    let imgIdx = 4;

                    let parsedData = rows.slice(1).map(row => {
                        // 如果有找到對應欄位，嘗試從裡面萃取出 http 開頭的網址
                        let rawImg = (row.length > imgIdx && row[imgIdx]) ? row[imgIdx].trim() : '';
                        let finalImg = '';
                        const urlMatch = rawImg.match(/https?:\/\/[^\s]+/);
                        if (urlMatch) {
                            finalImg = urlMatch[0];
                        }

                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他推薦',
                            link: row[linkIdx] ? row[linkIdx].trim() : '#',
                            img: finalImg
                        };
                    }).filter(item => item.name !== '' && item.link !== '#');

                    // 直接使用表單載入的資料，不再強制寫死
                    globalCommunityData = parsedData;
                    resolve(globalCommunityData);
                }).catch(reject);
            });
        }

        function renderCommunityData(data) {
            const container = document.getElementById('community-list-container');
            if (!container) return;

            // 初始化時先設定好「在地社群」與「地方互助」，利用 JS 物件屬性順序特性，確保排在前面
            const groupedCategories = { '在地社群': [], '地方互助': [] };
            
            data.forEach(item => {
                const cat = item.category || '其他推薦';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            // 若未來真的沒有資料，則清除空陣列避免顯示空白區塊
            if (groupedCategories['在地社群'].length === 0) {
                delete groupedCategories['在地社群'];
            }
            if (groupedCategories['地方互助'] && groupedCategories['地方互助'].length === 0) {
                delete groupedCategories['地方互助'];
            }

            let html = '';
            for (const [catName, items] of Object.entries(groupedCategories)) {
                
                const isLocalCommunity = catName === '在地社群';
                const isMutualHelp = catName === '地方互助';
                
                // 動態排版：根據分類決定 Grid 或 Flex
                let gridClass = '';
                let wrapperSpan = 'lg:col-span-3'; // 預設為換行顯示全幅寬

                if (isLocalCommunity) {
                    gridClass = 'flex flex-wrap justify-center items-stretch gap-3 md:gap-4';
                    wrapperSpan = 'lg:col-span-2'; // 佔畫面的 2/3
                } else if (isMutualHelp) {
                    // 手機版一排兩張，桌機版(佔 1/3 寬度)一排一張
                    gridClass = 'grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-1 gap-3'; 
                    wrapperSpan = 'lg:col-span-1'; // 佔畫面的 1/3
                } else {
                    // 其他分類 (例如興趣群組、媽媽群等)
                    gridClass = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3';
                }

                const itemsHtml = items.map(item => {
                    let snsType = 'Web';
                    let snsBadgeClass = 'bg-gray-500 text-white';
                    let snsIcon = 'fa-solid fa-globe';
                    let avatarBg = 'random'; // 頭像背景色
                    let btnClasses = 'bg-gray-500 hover:bg-gray-600 text-white';
                    
                    const searchStr = (item.name + ' ' + item.link).toUpperCase();
                    if (searchStr.includes('LINE') || searchStr.includes('賴')) {
                        snsType = 'LINE'; 
                        snsBadgeClass = 'bg-[#00B900] text-white'; 
                        snsIcon = 'fa-brands fa-line';
                        avatarBg = '00B900';
                        btnClasses = 'bg-[#00B900] hover:bg-[#009900] text-white';
                    } else if (searchStr.includes('THREADS')) {
                        snsType = 'Threads'; 
                        snsBadgeClass = 'bg-black text-white'; 
                        snsIcon = 'fa-brands fa-threads';
                        avatarBg = '000000'; // Threads 品牌色
                        btnClasses = 'bg-black hover:bg-gray-800 text-white';
                    } else if (searchStr.includes('FB') || searchStr.includes('FACEBOOK') || searchStr.includes('臉書')) {
                        snsType = 'Facebook'; 
                        snsBadgeClass = 'bg-[#1877F2] text-white'; 
                        snsIcon = 'fa-brands fa-facebook';
                        avatarBg = '1877F2'; // Facebook 品牌色
                        btnClasses = 'bg-[#1877F2] hover:bg-[#166FE5] text-white';
                    } else {
                        btnClasses = 'bg-themePink hover:bg-pink-400 text-white';
                    }

                    // 判斷是否需要顯示 QR Code (僅一般社群的 LINE 顯示)
                    const showQR = snsType === 'LINE' && !isLocalCommunity;
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(item.link)}`;
                    
                    // 預設文字頭像 URL (使用品牌色或隨機色)
                    let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=${avatarBg === 'random' ? 'random' : avatarBg}&color=fff&size=150&font-size=0.35`;

                    // 動態解析頭像：若表單有圖片則優先使用，否則 Threads 顯示社群名稱前兩個字
                    let fallbackName = item.name;
                    if (item.img) {
                        avatarUrl = item.img;
                    } else if (snsType === 'Threads') {
                        let fallbackName = item.name.substring(0, 2);
                        avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(fallbackName)}&background=000000&color=fff&size=150&bold=true&length=2&font-size=0.4`;
                    }

                    // 取得社群 ID 顯示文字 (自動過濾網址擷取並移除 @)
                    let displayId = "點擊進入";
                    if (item.link.includes('@')) {
                        const match = item.link.match(/@([a-zA-Z0-9_.]+)/);
                        if (match && match[1]) {
                            displayId = match[1];
                        }
                    } else if (snsType === 'LINE') {
                        displayId = "加入 LINE 社群";
                    } else if (snsType === 'Facebook') {
                        displayId = "前往粉絲專頁";
                    }
                    
                    // 動態決定卡片寬度：如果名稱超過 9 個字，手機版改為佔滿整排 (col-span-2)
                    const isLongText = item.name.length > 9;
                    const colClass = (!isLocalCommunity && isLongText) ? 'col-span-2 sm:col-span-1 lg:col-span-1' : 'col-span-1';

                    // === 在地社群 (精緻直式彈性卡片置中排版) ===
                    if (isLocalCommunity) {
                        const imgElement = `<div class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 rounded-full shadow-sm border-2 border-gray-100 group-hover:border-themePink group-hover:scale-105 transition-all mx-auto mb-3 shrink-0 bg-gray-50 overflow-hidden"><img src="${avatarUrl}" class="w-full h-full object-cover" alt="頭像" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=${avatarBg === 'random' ? 'random' : avatarBg}&color=fff'"></div>`;

                        // 移除 SNS 標籤，讓卡片極簡，寬度會依據 flex-1 與 min-w / max-w 自動調整
                        return `
                            <a href="${item.link}" target="_blank" class="flex-1 min-w-[140px] sm:min-w-[160px] max-w-[240px] shrink-0 flex flex-col bg-white rounded-[1.5rem] sm:rounded-[2rem] p-4 sm:p-5 shadow-cute border-2 border-gray-100 hover:border-pink-200 hover:shadow-xl transition-all group hover:-translate-y-2 text-center justify-between items-center relative overflow-hidden">
                                <!-- 裝飾背景 Icon -->
                                <div class="absolute -right-3 -bottom-3 text-6xl opacity-[0.03] text-gray-500 pointer-events-none"><i class="${snsIcon}"></i></div>

                                ${imgElement}

                                <h4 class="font-black text-gray-800 text-sm sm:text-base md:text-lg mb-4 line-clamp-2 leading-snug group-hover:text-themePink transition-colors flex-1 w-full">${item.name}</h4>

                                <div class="w-full ${btnClasses} py-2 sm:py-2.5 rounded-xl font-black text-xs sm:text-sm shadow-sm flex items-center justify-center gap-1.5 transition-colors mt-auto z-10 relative">
                                    <i class="${snsIcon}"></i> <span class="truncate">${displayId}</span>
                                </div>
                            </a>
                        `;
                    }

                    // === 一般社群 (橫式條列卡片排版) ===
                    return `
                        <a href="${item.link}" target="_blank" class="${colClass} bg-white rounded-[1.5rem] p-3 md:p-4 shadow-sm border-2 border-gray-100 hover:border-pink-200 hover:-translate-y-1 transition-all flex items-center justify-between group h-full">
                            <!-- 左側：標題與藥丸標籤 -->
                            <div class="flex flex-col items-start pr-2 flex-1 min-w-0">
                                <h4 class="font-black text-gray-800 text-sm md:text-base mb-2 line-clamp-2 group-hover:text-themePink transition-colors w-full">${item.name}</h4>
                                <div class="${snsBadgeClass} text-[10px] md:text-xs font-black px-2 py-1 rounded-lg shadow-sm flex items-center shrink-0">
                                    <i class="${snsIcon} mr-1"></i> ${snsType}
                                </div>
                            </div>
                            
                            <!-- 右側：QR Code 或 自動頭像 -->
                            ${showQR ? `
                            <div class="w-12 h-12 md:w-16 md:h-16 shrink-0 bg-white rounded-xl p-1 border border-dashed border-gray-200 group-hover:border-themePink transition-colors relative flex items-center justify-center">
                                <img src="${qrUrl}" class="w-full h-full object-contain mix-blend-multiply opacity-90 group-hover:opacity-100" alt="QR Code">
                            </div>
                            ` : `
                            <div class="w-10 h-10 md:w-14 md:h-14 shrink-0 rounded-full border-2 border-gray-100 group-hover:border-themePink transition-colors relative flex items-center justify-center overflow-hidden shadow-sm bg-gray-50 p-0.5">
                                <img src="${avatarUrl}" class="w-full h-full object-cover rounded-full" alt="社群頭像">
                            </div>
                            `}
                        </a>
                    `;
                }).join('');

                // 針對在地社群給予特殊的樣式 (圖釘圖示與微紅邊框)
                const catIcon = catName === '在地社群' ? 'fa-thumbtack text-red-400' : 'fa-hashtag text-themePink';
                const catBorder = catName === '在地社群' ? 'border-red-50' : 'border-blue-50';
                const catBgIcon = catName === '在地社群' ? 'text-red-100' : 'text-blue-100';

                // 外層大區塊加入 flex 確保等高，並用動態 Class 來排版 (含 2/3, 1/3 全寬控制)
                html += `
                    <div class="bg-white rounded-[2.5rem] p-6 md:p-8 shadow-cute border-4 ${catBorder} relative h-full flex flex-col ${wrapperSpan}">
                        <div class="absolute -top-4 -right-4 ${catBgIcon} text-6xl floating z-0 pointer-events-none"><i class="fa-solid fa-users-rectangle"></i></div>
                        <h3 class="text-lg font-black text-themeBlue mb-6 border-b-4 border-blue-100 pb-3 inline-block relative z-10 shrink-0">
                            <i class="fa-solid ${catIcon} mr-2"></i>${catName}
                        </h3>
                        <!-- 應用動態網格：根據是否為在地社群決定彈性或網格 -->
                        <div class="${gridClass} relative z-10 flex-1 content-start items-stretch">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // --- 探索在地A7：建案分佈模組 ---
        function loadSharedBuildingData() {
            return new Promise((resolve, reject) => {
                if (globalBuildingData) return resolve(globalBuildingData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=985024788&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('建案') || k.includes('名稱'));
                    if (nameIdx === -1) nameIdx = 0; 
                    let villageIdx = headers.findIndex(k => k.includes('里'));
                    if (villageIdx === -1) villageIdx = 1;
                    let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                    if (imgIdx === -1) imgIdx = 3; // D column fallback

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            village: row[villageIdx] ? row[villageIdx].trim() : '未分類區域',
                            img: row[imgIdx] ? row[imgIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalBuildingData = parsedData;
                    resolve(globalBuildingData);
                }).catch(reject);
            });
        }

        function fetchBuildingData() {
            const container = document.getElementById('buildings-list-container');
            if (!container) return;

            loadSharedBuildingData().then(data => {
                renderBuildingData(data);
            }).catch(err => {
                console.error('Building CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8 bg-white rounded-3xl">建案資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderBuildingData(data) {
            const container = document.getElementById('buildings-list-container');
            const tagsContainer = document.getElementById('village-tags-container'); // 新增：抓取標籤容器
            if (!container) return;

            const groupedVillages = {};
            data.forEach(item => {
                const village = item.village;
                if (!groupedVillages[village]) groupedVillages[village] = [];
                groupedVillages[village].push(item);
            });

            // == 依照地圖照片顏色綁定各里別的專屬色彩 ==
            // 嚴格配置專屬的 Tailwind 色系，以精準對應上方地圖照片的區塊顏色。
            const fallbackPool = [
                { border: 'border-gray-200', textTitle: 'text-gray-600', icon: 'fa-building', bg: 'bg-gray-50', iconColor: 'text-gray-200', activeIcon: 'text-gray-400', hoverBg: 'hover:bg-gray-50' },
                { border: 'border-teal-200', textTitle: 'text-teal-600', icon: 'fa-building', bg: 'bg-teal-50', iconColor: 'text-teal-200', activeIcon: 'text-teal-500', hoverBg: 'hover:bg-teal-50' }
            ];
            let fallbackStyleIndex = 0;

            function getStyleForVillage(name) {
                if (name.includes('文青')) return { border: 'border-orange-200', textTitle: 'text-orange-500', icon: 'fa-building', bg: 'bg-orange-50', iconColor: 'text-orange-300', activeIcon: 'text-orange-500', hoverBg: 'hover:bg-orange-50' };
                if (name.includes('樂善')) return { border: 'border-yellow-200', textTitle: 'text-themeYellow', icon: 'fa-building', bg: 'bg-yellow-50', iconColor: 'text-yellow-200', activeIcon: 'text-themeYellow', hoverBg: 'hover:bg-yellow-50' };
                if (name.includes('長樂')) return { border: 'border-green-200', textTitle: 'text-themeGreen', icon: 'fa-building', bg: 'bg-green-50', iconColor: 'text-green-200', activeIcon: 'text-themeGreen', hoverBg: 'hover:bg-green-50' };
                if (name.includes('文桃')) return { border: 'border-pink-200', textTitle: 'text-themePink', icon: 'fa-building', bg: 'bg-pink-50', iconColor: 'text-pink-200', activeIcon: 'text-themePink', hoverBg: 'hover:bg-pink-50' };
                if (name.includes('文藝')) return { border: 'border-blue-200', textTitle: 'text-themeBlue', icon: 'fa-building', bg: 'bg-blue-50', iconColor: 'text-blue-200', activeIcon: 'text-themeBlue', hoverBg: 'hover:bg-blue-50' };
                if (name.includes('文樂')) return { border: 'border-purple-200', textTitle: 'text-themePurple', icon: 'fa-building', bg: 'bg-purple-50', iconColor: 'text-purple-200', activeIcon: 'text-themePurple', hoverBg: 'hover:bg-purple-50' };
                if (name.includes('長庚')) return { border: 'border-blue-200', textTitle: 'text-themeBlue', icon: 'fa-building', bg: 'bg-blue-50', iconColor: 'text-blue-200', activeIcon: 'text-themeBlue', hoverBg: 'hover:bg-blue-50' };
                
                // 找不到對應里別時，使用備用色彩輪替
                const style = fallbackPool[fallbackStyleIndex % fallbackPool.length];
                fallbackStyleIndex++;
                return style;
            }

            let html = '';
            let tagsHtml = ''; // 準備標籤的 HTML

            for (const [villageName, items] of Object.entries(groupedVillages)) {
                const style = getStyleForVillage(villageName);
                
                // 產生安全且唯一的 ID 供錨點跳轉使用
                const safeId = `village-${villageName.replace(/\s+/g, '')}`;

                // 生成各里的快速跳轉標籤 (手機版縮小 padding、字體、圖示及內部 gap)
                tagsHtml += `
                    <button onclick="document.getElementById('${safeId}').scrollIntoView({behavior: 'smooth', block: 'start'})"
                            class="py-1.5 px-3 sm:px-4 md:px-5 sm:py-2.5 md:py-3 bg-white border-2 ${style.border} ${style.textTitle} font-black rounded-full md:rounded-2xl ${style.hoverBg} transition-all shadow-sm text-xs sm:text-base md:text-lg flex items-center justify-center sm:justify-start gap-1 sm:gap-2 md:gap-3 hover:-translate-y-1 w-auto text-center sm:text-left group">
                        <div class="flex w-4 h-4 sm:w-6 sm:h-6 md:w-8 md:h-8 rounded-full ${style.bg} items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                            <i class="fa-solid ${style.icon} text-[9px] sm:text-xs md:text-sm"></i>
                        </div>
                        <span class="tracking-wide whitespace-nowrap">${villageName}</span>
                    </button>
                `;

                const itemsHtml = items.map(item => {
                    let imgContent = '';
                    if (item.img && item.img.startsWith('http')) {
                        imgContent = `<img src="${item.img}" class="w-full h-full object-cover" alt="${item.name}">`;
                    } else {
                        imgContent = `<i class="fa-solid ${style.icon} ${style.iconColor} text-2xl"></i>`;
                    }

                    // 修改為自適應寬度 (w-auto) 並設定最小與最大寬度，以符合名稱長度
                    return `
                    <div class="${style.bg} p-2 rounded-2xl border border-white shadow-sm flex items-center gap-3 hover:-translate-y-1 transition-transform cursor-default w-auto min-w-[120px] max-w-full">
                        <div class="w-12 h-12 shrink-0 rounded-xl overflow-hidden bg-white flex items-center justify-center border border-gray-100 shadow-inner">
                            ${imgContent}
                        </div>
                        <span class="font-bold text-gray-700 text-sm whitespace-nowrap overflow-hidden text-ellipsis">${item.name}</span>
                    </div>
                    `;
                }).join('');

                // 在外層 div 加上 id，並加上 scroll-mt 確保被固定的 Navbar 擋住
                // 修改內部容器為 flex-wrap 以支援自適應寬度項目的排列
                html += `
                    <div id="${safeId}" class="bg-white rounded-[2.5rem] shadow-cute p-6 border-4 ${style.border} hover:shadow-lg transition-shadow relative overflow-hidden scroll-mt-[100px]">
                        <div class="absolute -right-4 -bottom-4 text-6xl ${style.iconColor} opacity-50 pointer-events-none"><i class="fa-solid ${style.icon}"></i></div>
                        <div class="flex items-center justify-between mb-4 border-b-2 border-gray-100 pb-3 relative z-10">
                            <h3 class="text-xl font-black ${style.textTitle}">${villageName} <span class="text-sm font-bold text-gray-400 ml-1">(${items.length})</span></h3>
                            <i class="fa-solid ${style.icon} text-2xl ${style.activeIcon}"></i>
                        </div>
                        <div class="flex flex-wrap gap-3 relative z-10">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }
            
            // 渲染列表與標籤
            container.innerHTML = html;
            if (tagsContainer) {
                tagsContainer.innerHTML = tagsHtml;
            }
        }

    </script>
</body>
</html>
