    <style>
        body {
            background-color: #FDFBF7;
            background-image:

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF9EBB;
            border-radius: 10px;
            border: 2px solid #FDFBF7;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff7eb3;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(-3deg);
            }

            50% {
                transform: rotate(3deg);
            }
        }

        .animate-wiggle {
            animation: wiggle 3s ease-in-out infinite;
        }

        .num-counter {
            font-family: 'Nunito', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        /* Leaflet 客製化 */
        .leaflet-popup-content-wrapper {
            border-radius: 1.5rem !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1) !important;
            padding: 4px !important;
        }

        .leaflet-popup-close-button {
            top: 4px !important;
            right: 4px !important;
            color: white !important;
            background-color: #FF9EBB !important;
            border-radius: 50% !important;
            width: 24px !important;
            height: 24px !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            z-index: 100 !important;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 醫療系統雙欄動態延展排版 - 升級為側邊欄模式 */
        @media (min-width: 1024px) {
            #medical-list-container {
                display: grid;
                grid-template-columns: 280px 1fr;
                align-items: start;
                gap: 2rem;
            }

            .medical-sidebar {
                position: sticky;
                top: 100px;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .medical-content {
                min-width: 0;
            }
        }

        /* 可愛愛心動畫 */
        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.35);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.35);
            }

            70% {
                transform: scale(1);
            }
        }

        .heart-beat-active {
            animation: heartBeat 0.6s ease-in-out;
        }

        @keyframes flyUpFade {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-60px) scale(1.5) rotate(15deg);
                opacity: 0;
            }
        }

        .flying-heart {
            position: fixed;
            pointer-events: none;
            animation: flyUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            color: #FF4785;
            font-size: 1.5rem;
            z-index: 9999;
            text-shadow: 0 4px 8px rgba(255, 71, 133, 0.3);
        }

        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) { if (s && l === p) row[i] += l; s = !s; }
                else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = [l = '']; i = 0; }
                else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        function getAnonymousProfile(identifier) {
            let hash = 0;
            for (let i = 0; i < identifier.length; i++) {
                hash = identifier.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % ANIMAL_PROFILES.length;
            return ANIMAL_PROFILES[index];
        }

        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const payload = decodeJwtResponse(response.credential);
            currentUser = {
                name: payload.name,
                email: payload.email,
                picture: payload.picture
            };
            updateLoginUI();
        }

        function initGoogleAuth() {
            if (typeof google === 'undefined') return;
            google.accounts.id.initialize({

        async function loadAllComments() {
            try {
                const res = await fetch(COMMENTS_CSV_URL);
                const csvText = await res.text();
                const rows = parseCSV(csvText);

                let groupedComments = {};
                if (rows.length > 1) {
                    const headers = rows[0];
                    const sIdx = Math.max(0, headers.findIndex(k => k.includes('機構') || k.includes('店名') || k.includes('storeName')));
                    const nIdx = Math.max(1, headers.findIndex(k => k.includes('姓名') || k.includes('name')));
                    const eIdx = Math.max(2, headers.findIndex(k => k.includes('信箱') || k.includes('email')));
                    const aIdx = Math.max(3, headers.findIndex(k => k.includes('頭像') || k.includes('大頭貼') || k.includes('avatar')));
                    const cIdx = Math.max(4, headers.findIndex(k => k.includes('內容') || k.includes('留言') || k.includes('content')));
                    const tIdx = Math.max(5, headers.findIndex(k => k.includes('時間') || k.includes('timestamp')));

                    rows.slice(1).forEach(row => {
                        const store = row[sIdx]?.trim();
                        if (!store) return;
                        if (!groupedComments[store]) groupedComments[store] = [];
                        groupedComments[store].push({
                            name: row[nIdx]?.trim() || '匿名用戶',
                            email: row[eIdx]?.trim() || '',
                            avatar: row[aIdx]?.trim() || '',
                            content: row[cIdx]?.trim() || '',
                            timestamp: row[tIdx]?.trim() || ''
                        });
                    });
                }
                globalCommentsData = groupedComments;
            } catch (e) {
                console.warn("載入全部留言失敗", e);
                globalCommentsData = {};
            }
        }

        // 注意：記得把最上方原本宣告的 `const currentUserId = getUserId();` 刪除
// 我們已經將它改為在函式內動態呼叫了。

async function loadSharedLikesData() {
    // 1. 如果記憶體裡已經有抓好的資料，直接回傳
    if (Object.keys(globalLikesData).length > 0) return globalLikesData;

    // 先用本地快取墊檔，讓畫面不要空空的
    const localCache = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
    globalLikesData = localCache;

    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1295636704&single=true&output=csv';
    
    // 【升級 1：破除快取】加上隨機時間戳記，強迫瀏覽器每次都去雲端抓最新名單
    const fetchUrl = csvUrl + '&t=' + new Date().getTime();

    try {
        const res = await fetch(fetchUrl);
        const text = await res.text();
        const rows = parseCSV(text);
        let likesMap = {};

        if (rows.length > 1) {
            const headers = rows[0];
            
            // 【升級 2：擴充欄位關鍵字】不管你的表單標題寫什麼，盡量都抓得到
            const userIdx = headers.findIndex(k => k.includes('ID') || k.includes('使用者') || k.includes('帳號') || k.toLowerCase().includes('user'));
            const storeIdx = headers.findIndex(k => k.includes('店') || k.includes('機構') || k.includes('名稱') || k.toLowerCase().includes('store'));
            const actionIdx = headers.findIndex(k => k.includes('動作') || k.includes('狀態') || k.toLowerCase().includes('action'));

            // 除錯小幫手：如果真的對不上，會在開發者工具(F12)發出警告
            if (userIdx === -1 || storeIdx === -1) {
                console.warn("⚠️ 找不到愛心試算表的對應欄位！目前的欄位名稱是：", headers);
            }

            rows.slice(1).forEach(row => {
                const storeName = storeIdx !== -1 ? row[storeIdx]?.trim() : null;
                const userId = userIdx !== -1 ? row[userIdx]?.trim() : null;
                const action = actionIdx !== -1 ? row[actionIdx]?.trim() : 'like';

                if (!storeName || !userId) return;
                
                if (!likesMap[storeName]) likesMap[storeName] = { users: [] };

                // 處理收回讚 (unlike) 與按讚 (like) 的邏輯
                if (action && action.toLowerCase().includes('unlike')) {
                    const idx = likesMap[storeName].users.indexOf(userId);
                    if (idx !== -1) likesMap[storeName].users.splice(idx, 1);
                } else {
                    if (!likesMap[storeName].users.includes(userId)) {
                        likesMap[storeName].users.push(userId);
                    }
                }
            });
        }

        // 【保留關鍵機制：強制合併本地資料】確保剛點擊的愛心不會因為雲端延遲而消失
        let userId = getUserId();
        let myLikes = JSON.parse(localStorage.getItem('a7club_my_likes') || '{}');
        
        for (let store in likesMap) {
            let users = likesMap[store].users;
            let idx = users.indexOf(userId);
            
            // 本地有按，雲端沒有 -> 補上去
            if (myLikes[store] === true && idx === -1) users.push(userId);
            // 本地收回，雲端還有 -> 拔下來
            if (myLikes[store] === false && idx !== -1) users.splice(idx, 1);
        }
        
        for (let store in myLikes) {
            if (myLikes[store] === true && !likesMap[store]) {
                likesMap[store] = { users: [userId] };
            }
        }

        globalLikesData = likesMap;
        localStorage.setItem('a7club_likes_cache', JSON.stringify(likesMap));
        
    } catch (e) {
        console.error('讀取雲端愛心資料失敗：', e);
    }
    
    return globalLikesData;
}

        async function loadSharedMedicalData() {
            if (globalMedicalData) return globalMedicalData;
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) return [];
                const headers = rows[0];

                let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構'));
                if (nameIdx === -1) nameIdx = 0;
                let catIdx = headers.findIndex(k => k.includes('醫療分類'));
                if (catIdx === -1) catIdx = headers.length > 8 ? 8 : headers.length - 1;

                const addressIdx = headers.findIndex(k => k.includes('地址'));
                const phoneIdx = headers.findIndex(k => k.includes('電話'));
                const imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                const licenseIdx = 16;

                globalMedicalData = rows.slice(1).map(row => {
                    let rawImg = (imgIdx !== -1 && row.length > imgIdx && row[imgIdx]) ? row[imgIdx].trim() : '';
                    let finalImg = '';
                    const urlMatch = rawImg.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) finalImg = urlMatch[0];

                    let licenseData = '';
                    if (row.length > licenseIdx) {
                        licenseData = row[licenseIdx] ? row[licenseIdx].trim() : '';
                    }

                    return {
                        name: row[nameIdx]?.trim() || '',
                        category: row[catIdx]?.trim() || '其他醫療',
                        address: addressIdx !== -1 ? row[addressIdx]?.trim() : '',
                        phone: phoneIdx !== -1 ? row[phoneIdx]?.trim() : '',
                        img: finalImg,
                        license: licenseData
                    }
                }).filter(item => item.name);
                return globalMedicalData;
            } catch (e) { return []; }
        }

        function renderMedicalData(data) {

                const order = ['醫療中心', '牙', '小兒', '眼', '診所', '藥'];
                let aIdx = order.findIndex(o => a.includes(o));
                let bIdx = order.findIndex(o => b.includes(o));
                aIdx = aIdx === -1 ? 99 : aIdx;
                bIdx = bIdx === -1 ? 99 : bIdx;
                return aIdx - bIdx;
            });

            // 確保預設的分類存在，若不存在則取第一個

                        class="w-full flex items-center justify-between p-4 rounded-2xl font-black transition-all ${isActive ? activeColor : inactiveColor} group/nav active:scale-95">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${catIcon} text-lg ${isActive ? 'text-white' : 'text-gray-400 group-hover/nav:text-themeGreen'}"></i>
                            <span class="tracking-wide">${cat}</span>
                        </div>
                        <span class="text-[10px] ${isActive ? 'bg-white/20' : 'bg-gray-100'} px-2 py-0.5 rounded-full">${items.length}</span>
                    </button>
                `;
            });
            sidebarHtml += '</div>';

            // 2. 建立右側內容 (Content Area)
            const activeItems = grouped[currentMedicalCategory] || [];
            let catIcon = 'fa-stethoscope';
            let catColor = 'text-green-600';
            let catBg = 'bg-green-50';
            let catBorderColor = 'border-green-500';
            let btnColor = 'bg-green-500';
            let btnHoverColor = 'hover:bg-green-600';

        async function loadSharedEducationData() {
            if (globalEducationData) return globalEducationData;
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=530207071&single=true&output=csv';
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) return [];
                const headers = rows[0];
                const nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構')) === -1 ? 1 : headers.findIndex(k => k.includes('名稱') || k.includes('機構'));
                const catIdx = headers.findIndex(k => k.includes('分類') || k.includes('屬性')) === -1 ? 2 : headers.findIndex(k => k.includes('分類') || k.includes('屬性'));
                const addressIdx = headers.findIndex(k => k.includes('地址'));
                const phoneIdx = headers.findIndex(k => k.includes('電話'));
                const targetIdx = headers.findIndex(k => k.includes('對象') || k.includes('年齡'));
                const imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                const linkIdx = headers.findIndex(k => k.includes('連結') || k.includes('網址') || k.includes('粉專'));
                const mainCatIdx = 10;
                globalEducationData = rows.slice(1).map(row => {
                    let rawImg = (imgIdx !== -1 && row.length > imgIdx && row[imgIdx]) ? row[imgIdx].trim() : '';
                    let finalImg = '';
                    const urlMatch = rawImg.match(/https?:\/\/[^\s]+/);
                    if (urlMatch) finalImg = urlMatch[0];
                    return {
                        name: row[nameIdx]?.trim() || '',
                        category: catIdx !== -1 ? (row[catIdx]?.trim() || '綜合教育') : '綜合教育',
                        mainCategory: row.length > mainCatIdx && row[mainCatIdx] ? row[mainCatIdx].trim() : '其他推薦',
                        address: addressIdx !== -1 ? row[addressIdx]?.trim() : '',
                        phone: phoneIdx !== -1 ? row[phoneIdx]?.trim() : '',
                        target: targetIdx !== -1 ? row[targetIdx]?.trim() : '',
                        img: finalImg,
                        link: linkIdx !== -1 ? row[linkIdx]?.trim() : '',
                        license: row[16] ? row[16].trim() : ''
                    }
                }).filter(item => item.name);
                return globalEducationData;
            } catch (e) { return []; }
        }

            const currentUserId = getUserId(); // 補上這裡的 currentUserId

            }

            const grouped = {};
            data.forEach(item => {

                grouped[cat].push(item);
            });
            const commentsCache = JSON.parse(localStorage.getItem('a7club_comments_cache') || '{}');

            // 計算每個分類的總愛心數
            const catLikes = {};
            for (const catName in grouped) {

                grouped[catName].forEach(item => {
                    const storeLikes = globalLikesData[item.name] || { users: [] };
                    totalLikes += storeLikes.users.length;
                });
                catLikes[catName] = totalLikes;
            }

            // 依照總愛心數由多到少排序分類

        function toggleEducationForm() {

            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-chevron-up"></i> 收起表單';
                btn.classList.replace('bg-themeYellow', 'bg-gray-100');
                btn.classList.replace('text-gray-800', 'text-gray-400');
                setTimeout(() => {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

                btn.classList.replace('text-gray-400', 'text-gray-800');
            }
        }

        // 智慧解析引擎
        function searchVillage(input) {
            const cleanedInput = input.replace(/^\d{3,5}\s*/, '').replace(/台灣|臺灣|桃園市|桃園縣|龜山區|龜山鄉|林口區|林口鄉/g, '').trim();
            if (!cleanedInput) return [];
            let parsedStreet = "";
            let parsedNum = null;
            const match = cleanedInput.match(/([一-龥]+(?:路|街|大道|段))((?:\d+巷)?(?:\d+弄)?)(?:\s*(\d+)(?:[~-～－]\d+)?\s*(?:號|之))?/);
            if (match) {
                parsedStreet = match[1];
                if (match[2]) parsedStreet += match[2].trim();
                if (match[3]) parsedNum = parseInt(match[3], 10);
            } else {
                parsedStreet = cleanedInput.replace(/\d+[~-～－]?\d*號?/, '').trim();
            }
            let strongMatches = [];
            let weakMatches = [];
            for (const item of VILLAGE_DATA) {
                if (item.village === cleanedInput || item.village.replace('里', '') === cleanedInput) {
                    strongMatches.push({ ...item, matchType: 'village' });
                    continue;
                }
                if (item.tag && (item.tag.includes(cleanedInput) || cleanedInput.includes(item.tag.replace(/相關社區|社區/g, '')))) {
                    strongMatches.push({ ...item, matchType: 'tag' });
                    continue;
                }
                for (const streetStr of item.streets) {
                    if (!streetStr.includes(parsedStreet)) continue;
                    if (!parsedStreet.includes("巷") && (new RegExp(parsedStreet + "\\d+巷")).test(streetStr)) continue;
                    if (parsedNum !== null) {
                        let isMatch = false;
                        const hasGlobalEven = (streetStr.match(/雙/g) || []).length > 0 && (streetStr.match(/單/g) || []).length === 0;
                        const hasGlobalOdd = (streetStr.match(/單/g) || []).length > 0 && (streetStr.match(/雙/g) || []).length === 0;
                        const rangeRegex = /(\d+)\s*(?:號)?\s*(?:至|~|-|～|－)\s*(\d+)\s*(?:號)?(?:[^0-9,，]{0,10}?(單|雙))?/g;
                        let rMatch;
                        let rangeFound = false;
                        while ((rMatch = rangeRegex.exec(streetStr)) !== null) {
                            rangeFound = true;
                            let start = parseInt(rMatch[1], 10);
                            let end = parseInt(rMatch[2], 10);
                            if (start > end) { let temp = start; start = end; end = temp; }
                            if (parsedNum >= start && parsedNum <= end) {
                                const isEven = parsedNum % 2 === 0;
                                const localModifier = rMatch[3];
                                const requiresEven = localModifier === '雙' || (!localModifier && hasGlobalEven);
                                const requiresOdd = localModifier === '單' || (!localModifier && hasGlobalOdd);
                                if (requiresEven && !isEven) continue;
                                if (requiresOdd && isEven) continue;
                                isMatch = true;
                                break;
                            }
                        }
                        if (isMatch) {
                            strongMatches.push({ ...item, matchType: 'condition', matchedRule: streetStr });
                            continue;
                        }
                        if (!rangeFound || !isMatch) {
                            const stringWithoutRanges = streetStr.replace(/(\d+)\s*(?:號)?\s*(?:至|~|-|～|－)\s*(\d+)\s*(?:號)?/g, '');
                            const exactRegex = /(\d+)/g;
                            let exactMatch;
                            while ((exactMatch = exactRegex.exec(stringWithoutRanges)) !== null) {
                                if (parseInt(exactMatch[0], 10) === parsedNum) {
                                    isMatch = true;
                                    break;
                                }
                            }
                            if (!isMatch && !rangeFound) {
                                if (hasGlobalEven && parsedNum % 2 === 0) isMatch = true;
                                if (hasGlobalOdd && parsedNum % 2 === 1) isMatch = true;
                            }
                            const hasNumbers = /\d/.test(streetStr.replace(/第\d+鄰/g, ''));
                            if (!hasNumbers) {
                                strongMatches.push({ ...item, matchType: 'street_only', matchedRule: streetStr });
                                continue;
                            }
                            if (isMatch) strongMatches.push({ ...item, matchType: 'condition', matchedRule: streetStr });
                            else weakMatches.push({ ...item, matchType: 'street_only', matchedRule: streetStr });
                        }
                    } else {
                        weakMatches.push({ ...item, matchType: 'street_only', matchedRule: streetStr });
                    }
                }
            }
            const uniqueStrong = [];
            const seen = new Set();
            const hasConditionMatch = strongMatches.some(m => m.matchType === 'condition' || m.matchType === 'tag' || m.matchType === 'village');
            const filteredStrong = hasConditionMatch ? strongMatches.filter(m => m.matchType !== 'street_only') : strongMatches;
            for (const match of filteredStrong) {
                const key = match.village + (match.neighborhoods ? match.neighborhoods.join(',') : '');
                if (!seen.has(key)) { seen.add(key); uniqueStrong.push(match); }
            }
            return uniqueStrong.length > 0 ? uniqueStrong : weakMatches;
        }

        function checkSchoolDistrict() {
            const inputEl = document.getElementById('school-address-input');
            const msgBox = document.getElementById('school-result');
            if (!inputEl || !msgBox) return;
            const input = inputEl.value.trim();
            if (!input) {
                msgBox.innerHTML = '<div class="bg-red-50 text-red-500 text-sm font-bold p-4 rounded-xl border border-red-200 flex items-center justify-center w-full h-full shadow-sm"><i class="fa-solid fa-circle-exclamation mr-2 text-lg"></i>請輸入地址或路名！</div>';
                msgBox.classList.remove('hidden');
                resetSchoolHighlight();
                return;
            }

            const results = searchVillage(input);
            let newVillage = "";
            let neighborhood = null;
            let found = results.length > 0;
            let isPrecise = false;

            if (found) {
                isPrecise = results.some(r => r.matchType === 'condition' || r.matchType === 'tag' || r.matchType === 'village');
                if (isPrecise) {
                    const preciseMatch = results.find(r => r.matchType === 'condition' || r.matchType === 'tag' || r.matchType === 'village');
                    newVillage = preciseMatch.village;
                    if (preciseMatch.neighborhoods && preciseMatch.neighborhoods.length === 1) {
                        neighborhood = preciseMatch.neighborhoods[0];
                    }
                } else {
                    const uniqueVillages = [...new Set(results.map(r => r.village))];
                    if (uniqueVillages.length === 1) newVillage = uniqueVillages[0];
                    else newVillage = "AMBIGUOUS";
                }
            } else {
                const cleanedInput = input.replace(/桃園市|龜山區|林口區/g, '').trim();
                if (cleanedInput.includes('文青') || cleanedInput.includes('文藝') || cleanedInput.includes('青山路')) { newVillage = '文青里'; }
                else if (cleanedInput.includes('文桃') || cleanedInput.includes('體大') || cleanedInput.includes('牛角坡路') || cleanedInput.includes('樂善一路') || cleanedInput.includes('文信路')) { newVillage = '文桃里'; }
                else if (cleanedInput.includes('樂善') || cleanedInput.includes('文樂')) { newVillage = '樂善里'; }
                else if (cleanedInput.includes('長樂') || cleanedInput.includes('長慶')) { newVillage = '長樂里'; }
                else if (cleanedInput.includes('文德二路')) { newVillage = '樂善里'; }
                else if (cleanedInput.includes('長庚') || cleanedInput.includes('文德')) { newVillage = '長庚里'; }
            }

            if (newVillage === "AMBIGUOUS") {
                msgBox.innerHTML = `
                    <div class="bg-yellow-50 rounded-xl p-4 border border-yellow-200 shadow-sm flex flex-col items-center justify-center text-center h-full w-full">
                        <div class="text-sm text-gray-600 font-bold mb-1"><i class="fa-solid fa-triangle-exclamation text-orange-500 mr-1.5"></i>此路段涵蓋多個學區</div>
                        <div class="text-[11px] text-gray-500 font-bold leading-relaxed">由於政府尚未公告詳細門牌，無法精確定位您的學區。<br>請向戶政機關或學校確認。</div>
                    </div>
                `;
                msgBox.classList.remove('hidden');
                resetSchoolHighlight();
                return;
            }

            let schoolResult = "";
            let isFree = false;

            if (newVillage === '文青里' || newVillage === '文藝里') {
                schoolResult = "文青國中小、大埔國小";
                isFree = true;
            } else if (newVillage === '文桃里') {
                schoolResult = "文青國中小";
            } else if (newVillage === '樂善里' || newVillage === '文樂里') {
                schoolResult = "樂善國小、文青國中小";
                isFree = true;
            } else if (newVillage === '長樂里') {
                if (neighborhood !== null && neighborhood >= 10 && neighborhood <= 21) {
                    schoolResult = "樂善國小、長庚國小";
                    isFree = true;
                } else if (neighborhood !== null && neighborhood >= 1 && neighborhood <= 9) {
                    schoolResult = "樂善國小、文青國中小";
                    isFree = true;
                } else {
                    schoolResult = "需確認確切鄰別 (1-9鄰為樂善/文青；10-21鄰為樂善/長庚)";
                    isFree = true;
                }
            } else if (newVillage === '長庚里') {
                schoolResult = "長庚國小";
            }

            if (schoolResult) {
                msgBox.innerHTML = `
                    <div class="bg-white rounded-xl p-4 border border-blue-200 shadow-sm flex flex-col items-center justify-center text-center h-full w-full">
                        <div class="text-xs text-blue-500 font-bold mb-1">根據最新區劃 (${newVillage}${neighborhood ? ' ' + neighborhood + '鄰' : ''})</div>
                        <div class="text-lg md:text-xl font-black text-blue-800 mb-2 flex items-center justify-center flex-wrap gap-2">
                            ${schoolResult}
                            ${isFree ? `<span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-0.5 rounded border border-blue-200 shadow-sm ml-1"><i class="fa-solid fa-check text-blue-400 mr-1"></i>自由學區</span>` : ''}
                        </div>
                        <div class="text-[11px] text-gray-500 font-bold max-w-sm border-t border-gray-100 pt-2 mt-1 w-full">※ 實際入學資格與分發順序仍以當地學校當年度審查為準。</div>
                    </div>
                `;
                highlightSchoolsByVillage(newVillage);
            } else {
                msgBox.innerHTML = `
                    <div class="bg-yellow-50 rounded-xl p-4 border border-yellow-200 shadow-sm flex flex-col items-center justify-center text-center h-full w-full">
                        <div class="text-sm text-gray-600 font-bold"><i class="fa-solid fa-circle-exclamation text-yellow-500 mr-1.5"></i>無法精確判斷此地址的學區</div>
                        <div class="text-xs text-gray-500 mt-1">請輸入包含鄰別或完整路段門牌 (如: 文青路100號)，或參考下方總表。</div>
                    </div>
                `;
                resetSchoolHighlight();
            }
            msgBox.classList.remove('hidden');
        }

        function highlightSchoolsByVillage(village) {
            const schoolCards = document.querySelectorAll('#school .group');
            let found = false;
            schoolCards.forEach(card => {
                const text = card.textContent;
                if (text.includes(village) || text.includes(village.replace('里', ''))) {
                    card.classList.add('ring-4', 'ring-themeBlue', 'ring-offset-2');
                    card.classList.remove('opacity-50');
                    found = true;
                } else {
                    card.classList.remove('ring-4', 'ring-themeBlue', 'ring-offset-2');
                    card.classList.add('opacity-50');
                }
            });
            if (!found && village !== "AMBIGUOUS") {
                const msgEl = document.getElementById('school-result');
                if (msgEl) {
                    const originalHtml = msgEl.innerHTML;
                    msgEl.innerHTML = originalHtml + `<div class="mt-3 pt-3 border-t border-blue-100 text-sky-500 font-bold text-sm"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>目前清單中尚無明確標示屬於「${village}」的學區，建議直接聯繫區公所確認喔！</div>`;
                }
            }
        }


        function resetSchoolHighlight() {
            const schoolCards = document.querySelectorAll('#school .group');
            schoolCards.forEach(card => { card.classList.remove('ring-4', 'ring-themeBlue', 'ring-offset-2', 'opacity-50'); });
        }

        /**
         * --- GA 與導覽優化：根據 Hashtag 動態更換標題 ---
         * 這能幫助 GA 在「網頁標題」維度中區分出各區塊的點擊流向。
         */
        const hubTitleMap = {
            'section-dashboard': '儀表板總覽',
            'section-medical': '醫療院所資訊',
            'section-education-hall': '教育學習殿堂',
            'section-education-list': '學習照顧機構',
            'section-emergency': '救護與緊急通報'
        };

        function syncTitleWithHash() {
            const hash = window.location.hash.replace('#', '');
            if (hubTitleMap[hash]) {
                document.title = `A7 Club | 生活通 | ${hubTitleMap[hash]}`;
            } else {
                document.title = 'A7 Club | 生活通 - 醫療、教育、緊急救援';
            }
        }

        window.addEventListener('hashchange', syncTitleWithHash);
        window.addEventListener('load', syncTitleWithHash);

        // 🌟 新增：全域關鍵字高亮與捲動邏輯
        function highlightAndScrollTo(query) {
            if (!query) return;
            const q = query.toLowerCase();
            const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
            let node;
            const matches = [];
            while (node = walker.nextNode()) {
                const text = node.textContent;
                const parent = node.parentElement;
                if (text.toLowerCase().includes(q) && !['SCRIPT', 'STYLE', 'NAV', 'FOOTER', 'HEADER', 'BUTTON', 'I'].includes(parent.tagName)) {
                    matches.push(node);
                }
            }

            if (matches.length > 0) {
                const firstMatch = matches[0];
                const parent = firstMatch.parentElement;
                let p = parent;
                while (p && p !== document.body) {
                    if (p.tagName === 'DETAILS') p.open = true;
                    p = p.parentElement;
                }
                const text = firstMatch.textContent;
                const regex = new RegExp(`(${safeQ})`, 'gi');
                const span = document.createElement('span');
                span.innerHTML = text.replace(regex, '<mark class="bg-yellow-200 text-gray-900 px-1 rounded shadow-sm font-black">$1</mark>');
                parent.replaceChild(span, firstMatch);
                setTimeout(() => {
                    span.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 800);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const query = params.get('search');
            if (query) {
                // 等待資料載入與地圖初始化後再執行
                setTimeout(() => highlightAndScrollTo(query), 1200);
            }

            // 處理從 index.html 傳遞過來的學區查詢 (address 參數)
            const addressQuery = params.get('address');
            if (addressQuery) {
                const schoolInput = document.getElementById('school-address-input');
                if (schoolInput) {
                    schoolInput.value = addressQuery;
                    setTimeout(() => {
                        checkSchoolDistrict();
                    }, 500); // 延遲等待其他初始化完成
                }
            }
        });

        // 🌟 新增：捲動並開啟醫療分類面板
        function scrollToMedicalCategory(keyword) {
            // 支援傳入單一字串或陣列
            const keywords = Array.isArray(keyword) ? keyword : [keyword];
            
            if (globalMedicalData) {
                const grouped = {};
                globalMedicalData.forEach(i => {
                    const catName = i.category || '一般/其他醫療';
                    if (!grouped[catName]) grouped[catName] = [];
                    grouped[catName].push(i);
                });
                
                const cats = Object.keys(grouped);
                for (let c of cats) {
                    if (keywords.some(k => c.includes(k))) {
                        setMedicalFilter(c);
                        setTimeout(() => {
                            const target = document.getElementById('medical-list-container');
                            if (target) {
                                const headerOffset = 150;
                                const elementPosition = target.getBoundingClientRect().top;
                                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                            }
                        }, 100);
                        break;
                    }
                }
            }
        }

        // --- 手機選單切換 ---
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) {
                if (menu.classList.contains('hidden')) {
                    menu.classList.remove('hidden');
                    menu.classList.add('flex');
                } else {
                    menu.classList.remove('flex');
                    menu.classList.add('hidden');
                }
            }
        }
