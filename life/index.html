<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 1. HTML 最快跳轉：0 秒後自動導向目標網址 -->
    <meta http-equiv="refresh" content="0; url=https://a7club.github.io/">
    <title>頁面跳轉中...</title>
    
    <!-- 2. JavaScript 備份跳轉：防止 Meta 標籤在極少數瀏覽器失效 -->
    <script>
        window.location.replace("https://a7club.github.io/");
    </script>
</head>
<body>
    <!-- 3. 後備文字：萬一使用者瀏覽器完全不支援自動跳轉時顯示 -->
    <p>頁面正在跳轉中，若沒有自動跳轉，請點擊 <a href="https://a7club.github.io/">此處</a>。</p>
</body>
</html>
