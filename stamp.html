    <!-- 引入核心庫 (新增 Noto Sans TC 字體) -->

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'rounded': ['"M PLUS Rounded 1c"', 'sans-serif'] },
                    colors: {
                        macaron: { 
                            pink: '#FFD1DC', 
                            blue: '#B5EAD7', 
                            sky: '#AEDFF7', // 寶貝藍/天空藍
                            yellow: '#FFF5BA', 
                            purple: '#E2D1F9', 
                            mint: '#C7CEEA', 
                            text: '#4A4A4A' 
                        }
                    },
                    animation: {
                        'bounce-pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'scan-fast': 'scanning 1.2s ease-in-out infinite',
                    },
                    keyframes: {
                        pop: { '0%': { transform: 'scale(0.5)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-5px)' } },
                        scanning: { '0%': { top: '0%', opacity: '0' }, '10%': { opacity: '1' }, '90%': { opacity: '1' }, '100%': { top: '100%', opacity: '0' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background: linear-gradient(135deg, #fff0f5 0%, #e0f7fa 100%); color: #4A4A4A; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 2px dashed rgba(255, 209, 220, 0.8); }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* --- ⭐ 載入畫面專屬：日系文青網格與漸層融合背景 --- */
        .loading-bg-grid {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFFDF9; /* 柔和紙本底色 */
            background-image: 
                /* 第一層 & 第二層：日系手帳的柔和網格 */
                linear-gradient(#F0EAE1 1px, transparent 1px),
                linear-gradient(90deg, #F0EAE1 1px, transparent 1px),
                /* 第三層：與主畫面相同的粉黃藍漸層 (調低透明度以透出底色) */
                linear-gradient(135deg, rgba(255,209,220,0.45) 0%, rgba(255,245,186,0.45) 50%, rgba(174,223,247,0.45) 100%);
            background-size: 24px 24px, 24px 24px, 100% 100%;
            color: #5C5454; /* 溫柔深灰 */
        }
        
        /* --- 掃描器自訂樣式 --- */
        .scanner-laser { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #FF8C94; box-shadow: 0 0 12px #FF8C94; animation: scanning 2.5s ease-in-out infinite; z-index: 10; }
        .scan-corner { position: absolute; width: 24px; height: 24px; border-color: #FF8C94; border-width: 4px; z-index: 20; border-radius: 4px; }
        .corner-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .corner-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .corner-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .corner-br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
        #qr-shaded-region > div { display: none !important; }
    </style>
</head>

    <script>
        lucide.createIcons();

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzC8FV-VwFLwjv7N9jyn4xy8IrCMjZy24-xdCT9rVgpRP5bXSudababRhaAkQloVmU2LA/exec";
        const LIFF_ID = "2009930258-GNJpigEk"; 
        const MAX_STAMPS = 7; 
        
        let currentPoints = 0;
        let userData = { userId: null, displayName: '遊客', isAdmin: false, shopName: '' };
        let html5QrCode;
        let globalShopList = []; 
        let globalHistoryList = []; 

        // ⭐ 輔助：暫停函數 (用來製造視覺過渡)
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function getPrizeIcon(prizeName, prizeType) {
            if (prizeName.includes('地瓜')) return '🍠';
            return prizeType === '電子' ? '🎟️' : '🎁';
        }

        // --- 進度條與狀態控制系統 ---
        function updateLoadingState(percent, text) {
            const bar = document.getElementById('loading-progress');
            const textEl = document.getElementById('loading-text');
            if(bar) bar.style.width = percent + '%';
            if(textEl && text) textEl.innerText = text;
        }

        function showLoadingScreen(text = "處理中...") {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'flex';
            
            document.getElementById('loading-progress-container').classList.remove('hidden');
            document.getElementById('loading-ping').classList.remove('hidden');
            document.getElementById('loading-spin').classList.remove('hidden');
            document.getElementById('error-container').classList.add('hidden');
            document.getElementById('loading-text').classList.remove('text-red-500');
            
            void loadingEl.offsetWidth; 
            loadingEl.style.opacity = '1';
            updateLoadingState(60, text);
        }

        function showError(msg, title = "連線已中斷") {
            document.getElementById('loading-progress-container').classList.add('hidden');
            document.getElementById('loading-ping').classList.add('hidden');
            document.getElementById('loading-spin').classList.add('hidden');
            
            const textEl = document.getElementById('loading-text');
            textEl.innerText = title;
            textEl.classList.add('text-red-500');
            textEl.classList.remove('animate-pulse');

            document.getElementById('error-container').classList.remove('hidden');
            document.getElementById('error-display').innerText = msg;
        }

        // --- 初始化流程 (加入多重過渡步驟) ---
        async function init() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (!isMobile) {
                showError("此活動為 A7ᴄʟᴜʙ|柒楽部 社群優惠，\n請透過 柒樂部LINE社群 開啟集點哦！", "裝置不支援");
                document.getElementById('retry-btn').classList.add('hidden');
                return;
            }

            updateLoadingState(10, "啟動驗票閘門...");
            await sleep(400); // 讓使用者看到進度條前進

            try {
                if (LIFF_ID === "您的_LIFF_ID" || LIFF_ID === "") {
                    updateLoadingState(0, "系統設定異常");
                    showError("尚未完成 LIFF ID 設定，無法連線。");
                    document.getElementById('setup-hint').classList.remove('hidden');
                    return;
                }
                
                updateLoadingState(25, "建立安全連線...");
                await sleep(300);
                
                updateLoadingState(40, "呼叫 LINE 快速通關...");
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    updateLoadingState(45, "等待遊客授權...");
                    liff.login(); 
                    return;
                }
                
                updateLoadingState(55, "掃描護照身分...");
                const profile = await liff.getProfile();
                userData.userId = profile.userId;
                userData.displayName = profile.displayName;
                document.getElementById('user-avatar').src = profile.pictureUrl || document.getElementById('user-avatar').src;

                await syncData(true);
            } catch (err) {
                console.error("LIFF/Init Error:", err);
                let errorMsg = "請從 LINE App 內開啟此網址進行驗證。";
                if (err.message.includes("channel not found")) {
                    errorMsg = "安全驗證失敗：無效的 LIFF ID。請確認開發者後台設定。";
                }
                showError(errorMsg);
            }
        }

        // --- 與後端同步資料 ---
        async function syncData(isInit = false) {
            if (!userData.userId) return;
            
            if (!isInit) {
                showLoadingScreen("同步最新遊玩紀錄...");
            } else {
                updateLoadingState(70, "核對入園名單...");
                await sleep(300);
                updateLoadingState(85, "載入集點紀錄...");
            }
            
            const result = await callGAS({ 
                action: 'getPoints', 
                userId: userData.userId, 
                displayName: userData.displayName 
            });
            
            if (result.status === 'success') {
                currentPoints = result.points;
                globalShopList = result.shops || []; 
                globalHistoryList = result.history || []; 
                userData.isAdmin = !!result.isAdmin; 
                userData.shopName = result.shopName || ''; 

                renderUI(result.prizes || []);
                renderMapShops(); 
                renderHistoryList(); 
                
                if (isInit) {
                    updateLoadingState(100, "驗票完成！歡迎進入集點🎉");
                    await sleep(600); // 停頓一下讓使用者看見成功狀態
                }
                
                const loadingEl = document.getElementById('loading');
                loadingEl.style.opacity = '0';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 400);
                
                if(result.isNewUser && isInit) {
                    setTimeout(() => showCustomAlert("歡迎加入柒樂部！已贈送您入園禮 1 點！", "新朋友加入", "🎉"), 500);
                }

            } else {
                showError(result.message);
            }
        }

        async function callGAS(payload) {
            try {
                const response = await fetch(GAS_URL, {
                    method: "POST", mode: "cors", redirect: "follow",
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error("網路請求失敗");
                return await response.json();
            } catch (e) {
                return { status: "error", message: "無法連線至雲端資料庫，請檢查網路連線。" };
            }
        }

        // --- 自訂精美對話視窗系統 ---
        function showCustomAlert(message, title = "提示", icon = "🎡") {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-alert-modal');
                const content = document.getElementById('custom-alert-content');
                
                document.getElementById('custom-alert-title').innerText = title;
                document.getElementById('custom-alert-message').innerText = message;
                document.getElementById('custom-alert-icon').innerText = icon;
                
                const btnContainer = document.getElementById('custom-alert-buttons');
                btnContainer.innerHTML = '';
                
                const okBtn = document.createElement('button');
                okBtn.className = 'w-full bg-macaron-sky text-[#4A4A4A] font-extrabold py-3 rounded-2xl shadow-sm active-scale';
                okBtn.innerText = '好的';
                okBtn.onclick = () => { closeCustomAlert(); resolve(true); };
                btnContainer.appendChild(okBtn);
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.replace('scale-95', 'scale-100');
                    content.classList.replace('opacity-0', 'opacity-100');
                }, 10);
            });
        }

        function showCustomConfirm(message, title = "確認動作", icon = "❓") {
            return new Promise((resolve) => {
                const modal = document.getElementById('custom-alert-modal');
                const content = document.getElementById('custom-alert-content');
                
                document.getElementById('custom-alert-title').innerText = title;
                document.getElementById('custom-alert-message').innerText = message;
                document.getElementById('custom-alert-icon').innerText = icon;
                
                const btnContainer = document.getElementById('custom-alert-buttons');
                btnContainer.innerHTML = '';
                
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'w-1/2 bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl active-scale';
                cancelBtn.innerText = '取消';
                cancelBtn.onclick = () => { closeCustomAlert(); resolve(false); };
                
                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'w-1/2 bg-macaron-sky text-[#4A4A4A] font-extrabold py-3 rounded-2xl shadow-sm active-scale';
                confirmBtn.innerText = '確定';
                confirmBtn.onclick = () => { closeCustomAlert(); resolve(true); };
                
                btnContainer.appendChild(cancelBtn);
                btnContainer.appendChild(confirmBtn);
                
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.replace('scale-95', 'scale-100');
                    content.classList.replace('opacity-0', 'opacity-100');
                }, 10);
            });
        }

        function closeCustomAlert() {
            const modal = document.getElementById('custom-alert-modal');
            const content = document.getElementById('custom-alert-content');
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- UI 渲染區塊 ---
        function renderUI(prizes = []) {
            const grid = document.getElementById('stamp-grid');
            const stampIcons = ['🎠', '🎡', '🎪', '🎢', '🎫', '🍿', '🎈'];
            grid.innerHTML = '';
            
            const displayPoints = currentPoints % MAX_STAMPS === 0 && currentPoints > 0 ? MAX_STAMPS : currentPoints % MAX_STAMPS;
            
            for (let i = 0; i < MAX_STAMPS; i++) {
                const slot = document.createElement('div');
                slot.className = 'w-12 h-12 rounded-full flex items-center justify-center relative transition-all border-2 border-dashed border-gray-200 bg-gray-50/50';
                if (i < displayPoints) {
                    slot.className = 'w-12 h-12 rounded-full flex items-center justify-center relative bg-white shadow-sm border border-[#FFD1DC]';
                    slot.innerHTML = `<span class="text-2xl animate-bounce-pop">${stampIcons[i]}</span>`;
                } else {
                    slot.innerHTML = `<span class="text-gray-300 font-bold text-xs">${i + 1}</span>`;
                }
                grid.appendChild(slot);
            }

            document.getElementById('points-status').innerHTML = `目前擁有 <span class="text-[#FF8C94] text-lg font-black">${currentPoints}</span> 點`;

            const listEl = document.getElementById('prize-list');
            listEl.innerHTML = '';
            
            if (prizes.length === 0) {
                listEl.innerHTML = '<p class="text-center text-xs text-gray-300 py-6">獎品補貨中，敬請期待！</p>';
                return;
            }

            prizes.forEach(prize => {
                const isOutOfStock = prize.type === '實體' && parseInt(prize.stock) <= 0;
                const canRedeem = currentPoints >= prize.points && !isOutOfStock;
                const displayIcon = getPrizeIcon(prize.name, prize.type); 
                
                const item = document.createElement('div');
                item.className = `flex justify-between items-center p-4 rounded-2xl border transition-all ${canRedeem ? 'bg-white border-macaron-sky shadow-sm' : 'bg-gray-100/30 border-gray-200 opacity-60'}`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-macaron-yellow/20 flex items-center justify-center text-xl">${displayIcon}</div>
                        <div>
                            <p class="font-bold text-[#4A4A4A] text-sm">${prize.name}</p>
                            <p class="text-[10px] text-gray-400 font-medium">${prize.points} 點 • ${prize.type}獎勵 ${isOutOfStock ? '(庫存不足)' : ''}</p>
                        </div>
                    </div>
                    <button onclick="handleRedeem('${prize.name}', '${prize.type}')" ${!canRedeem ? 'disabled' : ''} 
                        class="px-5 py-2 rounded-xl font-bold text-xs transition-colors ${canRedeem ? 'bg-macaron-sky text-[#4A4A4A] active-scale' : 'bg-gray-200 text-gray-400'}">
                        ${isOutOfStock ? '兌換完畢' : '兌換'}
                    </button>
                `;
                listEl.appendChild(item);
            });
        }

        function renderHistoryList() {
            const container = document.getElementById('history-list-container');
            container.innerHTML = '';

            if (globalHistoryList.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 opacity-50">
                        <i data-lucide="file-question" class="w-12 h-12 text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-500 font-bold">目前尚無任何紀錄</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            globalHistoryList.forEach(item => {
                const isStamp = item.type === 'stamp';
                const icon = isStamp ? '🎈' : getPrizeIcon(item.prizeName, '實體'); 
                const title = isStamp ? '集點成功' : '兌換獎品';
                const detail = isStamp ? `於 ${item.shopName} 集點` : `兌換 ${item.prizeName}`;
                const pointChange = isStamp ? '+1 點' : `-${item.points} 點`;
                const pointColorClass = isStamp ? 'text-macaron-blue' : 'text-[#FF8C94]';
                
                const d = new Date(item.time);
                const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

                const el = document.createElement('div');
                el.className = 'bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex items-center justify-between';
                el.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-xl shrink-0">${icon}</div>
                        <div>
                            <h4 class="font-bold text-[#4A4A4A] text-sm">${title}</h4>
                            <p class="text-[11px] text-gray-500 mt-0.5">${detail}</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">${dateStr}</p>
                        </div>
                    </div>
                    <div class="font-black text-sm ${pointColorClass}">${pointChange}</div>
                `;
                container.appendChild(el);
            });
            lucide.createIcons();
        }

        function renderMapShops() {
            const listContainer = document.getElementById('shop-list-container');
            listContainer.innerHTML = '';

            if (globalShopList.length === 0) {
                listContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-12 opacity-50">
                        <i data-lucide="map-x" class="w-12 h-12 text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-500 font-bold">目前尚無店家地圖資訊</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            globalShopList.forEach(shop => {
                const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.address)}`;
                const item = document.createElement('div');
                item.className = 'bg-white rounded-2xl p-4 border border-gray-100 shadow-sm flex justify-between items-center';
                item.innerHTML = `
                    <div class="flex-1 pr-3">
                        <h4 class="font-bold text-[#4A4A4A] text-sm">${shop.name}</h4>
                        <p class="text-[11px] text-gray-500 mt-1.5 flex items-start gap-1">
                            <i data-lucide="map-pin" class="w-3.5 h-3.5 mt-0.5 shrink-0 text-macaron-sky"></i>
                            <span class="leading-relaxed text-left">${shop.address}</span>
                        </p>
                    </div>
                    <a href="${mapLink}" target="_blank" class="w-10 h-10 bg-macaron-sky/20 text-[#6B5B95] rounded-full flex items-center justify-center shrink-0 active-scale transition-all">
                        <i data-lucide="navigation" class="w-4 h-4"></i>
                    </a>
                `;
                listContainer.appendChild(item);
            });
            lucide.createIcons();
        }

        function openHistoryModal() {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
        }

        function closeHistoryModal() {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-modal-content');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function openMapModal() {
            const modal = document.getElementById('map-modal');
            const content = document.getElementById('map-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
        }

        function closeMapModal() {
            const modal = document.getElementById('map-modal');
            const content = document.getElementById('map-modal-content');
            content.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- 兌換與核銷核心邏輯 ---
        async function handleRedeem(prizeName, prizeType) {
            const displayIcon = getPrizeIcon(prizeName, prizeType); 

            if (prizeType === '實體') {
                const qrData = `REDEEM:::${userData.userId}:::${userData.displayName}:::${prizeName}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=6B5B95&data=${encodeURIComponent(qrData)}`;
                document.getElementById('physical-qr-img').src = qrUrl;
                document.getElementById('physical-qr-prize').innerText = prizeName;
                document.getElementById('physical-qr-icon').innerText = displayIcon; 

                const modal = document.getElementById('physical-qr-modal');
                const content = document.getElementById('physical-qr-content');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.replace('scale-95', 'scale-100');
                    content.classList.replace('opacity-0', 'opacity-100');
                }, 10);
                return;
            }

            const confirmed = await showCustomConfirm(`確定要兌換「${prizeName}」嗎？`, "兌換確認", displayIcon);
            if (!confirmed) return;

            showLoadingScreen("兌換處理中...");
            
            const result = await callGAS({ action: 'redeem', userId: userData.userId, displayName: userData.displayName, prizeName });
            
            if (result.status === 'success') {
                const modal = document.getElementById('redeem-modal');
                const content = document.getElementById('redeem-modal-content');
                document.getElementById('redeem-modal-icon').innerText = displayIcon; 
                modal.classList.remove('hidden');
                setTimeout(() => {
                    content.classList.replace('scale-95', 'scale-100');
                    content.classList.replace('opacity-0', 'opacity-100');
                }, 10);
                document.getElementById('redeem-msg').innerText = `恭喜獲得電子序號！您可以直接複製：`;
                document.getElementById('redeem-code-box').classList.remove('hidden');
                document.getElementById('redemption-code').innerText = result.code;
                await syncData();
            } else {
                showError(result.message);
            }
        }

        async function closePhysicalQrModal() {
            const content = document.getElementById('physical-qr-content');
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => document.getElementById('physical-qr-modal').classList.add('hidden'), 300);
            await syncData();
        }

        async function handleAdminRedeem(text) {
            if (html5QrCode) await html5QrCode.stop().catch(e => console.log(e));
            document.getElementById('scanner-modal').classList.add('hidden');
            
            if (!userData.isAdmin) {
                showCustomAlert("此功能僅限「柒樂部授權店家」使用，一般用戶無法執行核銷作業哦！", "權限不足", "🚫");
                return;
            }

            const parts = text.split(":::");
            if (parts.length !== 4) return;
            const [prefix, targetUserId, targetDisplayName, targetPrizeName] = parts;
            const displayIcon = getPrizeIcon(targetPrizeName, '實體'); 

            const confirmed = await showCustomConfirm(
                `【${userData.shopName} 核銷確認】\n確定要為「${targetDisplayName}」核銷實體獎品「${targetPrizeName}」嗎？\n\n確認後將自動扣除該用戶之集點點數。`, 
                "店家核銷確認", 
                displayIcon
            );
            if (!confirmed) return;

            showLoadingScreen("核銷處理中...");
            
            const result = await callGAS({ 
                action: 'redeem', userId: targetUserId, displayName: targetDisplayName, 
                prizeName: targetPrizeName, adminId: userData.userId 
            });

            if (result.status === 'success') {
                // 等待畫面淡出後再顯示成功 Alert，避免視覺重疊
                setTimeout(async () => {
                    await showCustomAlert(`✅ 核銷成功！\n\n用戶：${targetDisplayName}\n獎品：${targetPrizeName}\n系統紀錄碼：${result.code}\n\n請現場發放實體禮品。`, "核銷成功", "🎉");
                    await syncData(); 
                }, 500);
            } else {
                showError(result.message);
            }
        }

        async function handleScanSuccess(scannedCode) {
            if (html5QrCode) await html5QrCode.stop().catch(e => console.log(e));
            document.getElementById('scanner-modal').classList.add('hidden');
            showLoadingScreen("驗證集點碼中...");
            
            const result = await callGAS({ 
                action: 'addStamp', userId: userData.userId, 
                displayName: userData.displayName, shopCode: scannedCode 
            });
            
            if (result.status === 'success') {
                await syncData();
                if (navigator.vibrate) navigator.vibrate(200);
            } else {
                showError(result.message);
            }
        }

        function closeModal() {
            const content = document.getElementById('redeem-modal-content');
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => document.getElementById('redeem-modal').classList.add('hidden'), 300);
        }

        function copyCode() {
            const code = document.getElementById('redemption-code').innerText;
            const el = document.createElement('textarea');
            el.value = code; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showCustomAlert("序號已成功複製到剪貼簿！", "複製成功", "📋");
        }

        async function startScanning() {
            document.getElementById('scanner-modal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: 260, aspectRatio: 1.0 }, 
                    (text) => { 
                        if (text.startsWith("REDEEM:::")) {
                            handleAdminRedeem(text);
                        } else {
                            handleScanSuccess(text); 
                        }
                    }
                );
            } catch (err) {
                showCustomAlert("相機開啟失敗，請確認手機設定中是否已授予 LINE / 網頁瀏覽器的相機使用權限。", "相機權限錯誤", "📷");
                stopScanning();
            }
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => document.getElementById('scanner-modal').classList.add('hidden')).catch(() => document.getElementById('scanner-modal').classList.add('hidden'));
            } else {
                document.getElementById('scanner-modal').classList.add('hidden');
            }
        }

        document.getElementById('start-scan').addEventListener('click', startScanning);
        window.onload = init;
    </script>
