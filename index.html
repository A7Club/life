<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>機捷柒號 - A7 重劃區生活指南</title>
  <meta name="description" content="桃園龜山 A7 重劃區美食、購物、生活、社群指南"/>

  <!-- Tailwind CSS Play CDN (僅限開發/原型，正式站建議 build 後用純 CSS) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#7C3AED',    // purple-600
            secondary: '#4F46E5',  // indigo-600
          }
        }
      }
    }
  </script>

  <!-- Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 自訂樣式補充 */
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">
          A7
        </div>
        <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-700 to-blue-600">
          機捷柒號
        </span>
      </div>
      <nav class="hidden md:flex gap-6">
        <a href="#home" class="text-sm font-medium text-slate-600 hover:text-purple-600">首頁</a>
        <a href="#food"  class="text-sm font-medium text-slate-600 hover:text-purple-600">美食攻略</a>
        <a href="#shopping" class="text-sm font-medium text-slate-600 hover:text-purple-600">逛街購物</a>
        <a href="#community" class="text-sm font-medium text-slate-600 hover:text-purple-600">社群互動</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section id="home" class="py-16 md:py-32 bg-gradient-to-br from-purple-900 to-indigo-900 text-white relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('https://www.farglory-realty.com.tw/wp-content/uploads/2025/11/%E8%8F%AF%E4%BA%9E%E5%9C%92%E5%8D%801-1-1367x1024.jpg')] bg-cover bg-center opacity-30"></div>
    <div class="container mx-auto px-4 relative z-10 text-center">
      <h1 class="text-4xl md:text-5xl font-bold mb-6">發現 A7 新生活</h1>
      <p class="text-xl md:text-2xl mb-10 max-w-3xl mx-auto opacity-90">
        整合交通、美食、購物與社區資訊，你的 A7 重劃區智慧指南
      </p>
      <div class="inline-flex gap-4">
        <a href="#food" class="bg-white text-purple-700 px-8 py-4 rounded-xl font-bold hover:bg-purple-50 transition">
          探索美食
        </a>
        <a href="#shopping" class="bg-transparent border-2 border-white text-white px-8 py-4 rounded-xl font-bold hover:bg-white/10 transition">
          逛街購物
        </a>
      </div>
    </div>
  </section>

  <!-- 快速入口 -->
  <section class="container mx-auto px-4 py-12">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <a href="#food" class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md hover:border-purple-300 transition text-center border border-slate-200">
        <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center">
          <i data-lucide="utensils" class="w-6 h-6"></i>
        </div>
        <h3 class="font-bold">美食攻略</h3>
        <p class="text-sm text-slate-500 mt-1">早餐到宵夜</p>
      </a>
      <!-- 其他三個類似卡片：採買、服務、概覽 … 可自行複製 -->
    </div>
  </section>

  <!-- 美食區塊（靜態範例） -->
  <section id="food" class="container mx-auto px-4 py-16 bg-white">
    <h2 class="text-3xl font-bold mb-8 text-center">A7 美食攻略</h2>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
        <div class="h-48 bg-slate-200 flex items-center justify-center">照片位置</div>
        <div class="p-5">
          <h3 class="font-bold text-lg">店名範例</h3>
          <p class="text-sm text-slate-500 mt-1">地址：桃園市龜山區...</p>
          <span class="inline-block mt-3 px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-xs">早午餐</span>
        </div>
      </div>
      <!-- 多加幾個卡片 … -->
    </div>
  </section>

  <!-- 購物、社群區塊類似結構，可複製上面區塊改內容 -->

  <!-- Footer -->
  <footer class="bg-slate-800 text-slate-300 py-12 mt-16">
    <div class="container mx-auto px-4 text-center">
      <p class="text-lg font-bold mb-2">機捷柒號</p>
      <p class="text-sm opacity-80">© 2025 A7 Life Portal. 非官方資訊平台，僅供參考。</p>
    </div>
  </footer>

  <!-- Lucide 初始化 -->
  <script>
    lucide.createIcons();
  </script>

</body>
</html>
