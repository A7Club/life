    <style>
        body { 
            background-color: #FDFBF7; 
            /* 可愛的圓點背景 */
            background-image: radial-gradient(#FF9EBB 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        /* 自訂可愛滾動條 (加入 height 以支援橫向滾動條) */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FF9EBB; border-radius: 10px; border: 2px solid #FDFBF7; }
        ::-webkit-scrollbar-thumb:hover { background: #ff7eb3; }

        /* 在地新商家專屬橘色捲動條 */
        .scrollbar-orange::-webkit-scrollbar { width: 10px; height: 10px; }
        .scrollbar-orange::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-orange::-webkit-scrollbar-thumb { background: #FECF7A; border-radius: 10px; border: 2px solid #FDFBF7; }
        .scrollbar-orange::-webkit-scrollbar-thumb:hover { background: #FFD166; }

        /* 隱藏橫向滾動條(強制一列時使用) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 頁面切換動畫 */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 標籤氣球動畫 */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        
        /* 數字跳動的字體強調 */
        .num-counter { font-family: 'Nunito', sans-serif; font-variant-numeric: tabular-nums; }

        /* --- Leaflet 客製化樣式 --- */
        .leaflet-popup-content-wrapper { border-radius: 1.5rem !important; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1) !important; padding: 4px !important; }
        .leaflet-popup-content { margin: 10px !important; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        
        /* 為 Leaflet Popup 關閉按鈕加上粉紅底圖與白色X (上移並靠右) */
        .leaflet-popup-close-button { 
            top: 4px !important; 
            right: 4px !important; 
            color: white !important; 
            background-color: #FF9EBB !important; 
            border-radius: 50% !important; 
            width: 24px !important; 
            height: 24px !important; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
            text-align: center !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }
        .leaflet-popup-close-button:hover { background-color: #ff7eb3 !important; color: white !important; transform: scale(1.1); transition: transform 0.2s ease;}
        
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(255, 158, 187, 0.5) !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important; color: white !important; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important;
        }

        .custom-leaflet-icon-dynamic .fa-solid { margin-bottom: 2px; margin-right: 1px; }

        .leaflet-tooltip.custom-tooltip { background-color: white; color: #FF9EBB; font-weight: 900; border-radius: 0.5rem; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 4px 10px; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        .leaflet-tooltip.custom-tooltip::before { border-top-color: white; }

        /* 水滴圖標動畫 */
        .floating-marker { animation: floatMarker 2.5s ease-in-out infinite; }
        @keyframes floatMarker {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        
        /* 恢復圖標彈跳動畫 */
        .bounce-marker { animation: bounceMarker 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite; }
        @keyframes bounceMarker {
            0% { transform: translateY(0px) scale(1, 1); }
            45% { transform: translateY(-12px) scale(0.95, 1.05); }
            100% { transform: translateY(0px) scale(1, 1); }
        }

        /* 可愛愛心動畫 */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.35); }
            28% { transform: scale(1); }
            42% { transform: scale(1.35); }
            70% { transform: scale(1); }
        }
        .heart-beat-active {
            animation: heartBeat 0.6s ease-in-out;
        }
        @keyframes flyUpFade {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-60px) scale(1.5) rotate(15deg); opacity: 0; }
        }
        .flying-heart {
            position: fixed;
            pointer-events: none;
            animation: flyUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            color: #FF4785;
            font-size: 1.5rem;
            z-index: 9999;
            text-shadow: 0 4px 8px rgba(255, 71, 133, 0.3);
        }

    <script>
        // 手機版選單開關
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu) {
                menu.classList.toggle('hidden');
                menu.classList.toggle('flex');
            }
        }

        // 用於存放全域 setInterval 以便切換頁面時清除
        let globalMrtInterval = null;
        
        // --- Leaflet 全域變數 ---
        let foodMapInstance = null;
        let foodClusterGroup = null;
        let foodMarkersMap = {}; 
        let activeFoodMarkerName = null; 

        // 購物與生活的全域地圖變數
        let shoppingMaps = {};
        let shoppingClusterGroups = {};
        let shoppingMarkersMap = {};

        // 初始化與路由監聽 
        document.addEventListener('DOMContentLoaded', () => {
            handleRoute();
        });

        window.addEventListener('hashchange', handleRoute);

        // 核心路由控制處理器
        function handleRoute(customRoute) {
            let hash = 'home';
            if (typeof customRoute === 'string') {
                hash = customRoute;
            } else {
                try {
                    hash = window.location.hash.substring(1) || 'home';
                } catch(e) {
                    hash = 'home';
                }
            }
            
            // 處理搜尋的特殊路由
            if (hash.startsWith('search=')) {
                const query = decodeURIComponent(hash.substring(7));
                renderPage('search');
                executeSearchLogic(query);
            } else if (hash === 'buildings' || hash === 'explore') {
                // 原本 explore 頁面的錨點或路由，直接導向新的獨立頁面
                window.location.href = 'explore.html' + (hash === 'buildings' ? '#buildings' : '');
            } else {
                renderPage(hash);
            }
        }

        // 修改原本的 loadPage，改為推播網址 Hash
        function loadPage(pageId) {
            try {
                history.pushState(null, '', '#' + pageId);
            } catch (e) {
            }
            handleRoute(pageId);
        }

        // 打開店家詳細資訊 Modal
        function openStoreModal(name, tag, tagColor, desc, address, hours, imgUrl, mapQuery) {
            document.getElementById('store-modal-title').innerText = name;
            
            const tagEl = document.getElementById('store-modal-tag');
            tagEl.innerText = tag;
            tagEl.className = `text-xs font-black px-2.5 py-1 rounded-lg text-white shadow-sm ${tagColor}`;
            
            document.getElementById('store-modal-desc').innerText = desc;
            document.getElementById('store-modal-hours').innerText = hours;
            
            const imgContainer = document.getElementById('store-modal-img-container');
            imgContainer.innerHTML = `
                <img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent z-10"></div>
            `;
            
            const mapBtn = document.getElementById('store-modal-map-btn');
            const qrContainer = document.getElementById('store-modal-qr-container');
            const qrImg = document.getElementById('store-modal-qr-img');
            const lineBtn = document.getElementById('store-modal-line-btn');
            const ratingContainer = document.getElementById('store-modal-rating-container');
            const addressEl = document.getElementById('store-modal-address');
            
            if (mapQuery && mapQuery.startsWith('http') && (mapQuery.includes('line.me') || mapQuery.includes('lin.ee'))) {
                mapBtn.classList.add('hidden');
                qrContainer.classList.remove('hidden');
                qrContainer.classList.add('flex');
                
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(mapQuery)}`;
                lineBtn.href = mapQuery;
                
                if (ratingContainer) ratingContainer.classList.add('hidden');
                addressEl.innerHTML = `<span class="text-[#00B900]">官方 LINE 帳號諮詢</span>`;
                
            } else {
                qrContainer.classList.add('hidden');
                qrContainer.classList.remove('flex');
                mapBtn.classList.remove('hidden');
                
                if (ratingContainer) ratingContainer.classList.remove('hidden');
                addressEl.innerText = address;

                let validQuery = mapQuery || name;
                mapBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(validQuery)}`;
                mapBtn.innerHTML = `<i class="fa-solid fa-map-location-dot text-xl"></i> 前往 Google Map 查看詳細資訊`;
                mapBtn.className = "w-full text-white bg-blue-500 hover:bg-blue-600 font-black py-3.5 rounded-xl shadow-md flex items-center justify-center gap-2 transition-transform hover:scale-[1.02] text-lg";
            }

            const modal = document.getElementById('store-modal');
            const content = document.getElementById('store-modal-content');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        // 關閉店家詳細資訊 Modal
        function closeStoreModal() {
            const modal = document.getElementById('store-modal');
            const content = document.getElementById('store-modal-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        // 頁面動態注入核心函數 
        function renderPage(pageId, skipScrollTop = false) {
            const root = document.getElementById('app-root');
            const template = document.getElementById('tpl-' + pageId);
            
            if (template) {
                // --- 1. 網頁標題動態更新 ---
                const pageTitles = {
                    'home': 'A7 柒樂部🎡｜生活地圖指南',
                    'food': 'A7 柒樂部🎡｜美食販賣部',
                    'shopping': 'A7 柒樂部🎡｜購物與生活',
                    'medical': 'A7 柒樂部🎡｜樂園救護站',
                    'search': 'A7 柒樂部🎡｜全站搜尋'
                };
                document.title = pageTitles[pageId] || 'A7 柒樂部🎡｜林口、龜山美食生活地圖指南';

                // --- 2. 觸發 GA 虛擬頁面追蹤 ---
                const pagePaths = {
                    'home': '/index',
                    'food': '/food',
                    'shopping': '/shop',
                    'medical': '/medical'
                };
                
                if (typeof gtag === 'function') {
                    gtag('event', 'page_view', {
                        page_title: document.title,
                        page_location: window.location.origin + window.location.pathname + '#' + pageId,
                        page_path: pagePaths[pageId] || ('/' + pageId)
                    });
                }

                // 3. 完全清空容器
                root.innerHTML = '';
                
                // 4. 複製 Template 內容並注入
                root.appendChild(template.content.cloneNode(true));
                
                // 更新導航列樣式
                updateNavStyles(pageId);
                
                // 平滑滾動到頂部
                if (!skipScrollTop) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });

                // 首頁各種動態載入
                if (pageId === 'home') {
                    setTimeout(() => {
                        fetchAndUpdateHomeCounts(); 
                        fetchAttractionsData(); 
                        fetchLocalNews(); 
                        
                        updateMRTStatus();

                        globalMrtInterval = setInterval(updateMRTStatus, 1000);

                    setTimeout(() => {

                if (pageId === 'medical') {
                    fetchMedicalData();
                }

                console.error("找不到對應的模板: ", pageId);
            }

        function doSearch() {
            const input = document.getElementById('home-search-input');
            if(!input) return;
            const query = input.value.trim();
            if(!query) return;
            
            const route = 'search=' + encodeURIComponent(query);
            try {
                history.pushState(null, '', '#' + route);
            } catch (e) {
            }
            handleRoute(route);
        }

        async function executeSearchLogic(query) {
            const display = document.getElementById('search-query-display');
            const container = document.getElementById('search-results-container');

                gtag('event', 'search', { search_term: query });

                    page_path: '/search?q=' + encodeURIComponent(query)

            try {
                // 等待所有資料庫完整載入 (保留載入建案與社群以供搜尋)

                    (item.category && item.category.toLowerCase().includes(q)) ||
                    (item.address && item.address.toLowerCase().includes(q))
                ).sort((a, b) => {
                    if ((b.likesCount || 0) !== (a.likesCount || 0)) {
                        return (b.likesCount || 0) - (a.likesCount || 0);
                    }
                    return (b.timestamp || 0) - (a.timestamp || 0);
                });

                const matchedShopping = shoppingData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.category && item.category.toLowerCase().includes(q)) ||
                    (item.address && item.address.toLowerCase().includes(q))
                ).sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));

                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.category && item.category.toLowerCase().includes(q))
                );

                const matchedBuildings = buildingData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.village && item.village.toLowerCase().includes(q))

                    (item.name && item.name.toLowerCase().includes(q)) ||

                    (item.address && item.address.toLowerCase().includes(q))

                                    return `
                                        <a href="https://www.google.com/maps/dir/?api=1&destination=${navTarget}" target="_blank" class="bg-pink-50 p-3 rounded-2xl shadow-sm border border-white flex items-center gap-3 hover:-translate-y-1 hover:shadow-md transition-all group">

        // --- 機捷動態模擬更新函數 ---
        function updateMRTStatus() {
            const container = document.getElementById('mrt-track-container');
            const nbEl = document.getElementById('mrt-time-north');
            const sbEl = document.getElementById('mrt-time-south');
            if (!container || !nbEl || !sbEl) return;

            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const currentTotalMinutes = minutes + seconds / 60;

            // 假設北上列車 (往台北) 在每個小時的 5, 20, 35, 50 分抵達 A7
            const baseNbArrivals = [5, 20, 35, 50]; 
            // 假設南下列車 (往機場) 在每個小時的 10, 25, 40, 55 分抵達 A7
            const baseSbArrivals = [10, 25, 40, 55]; 

            let nbTrainsHTML = '';
            let minNbDiff = 999;
            
            // 處理北上列車 
            baseNbArrivals.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - currentTotalMinutes;
                    if (diff > 0 && diff < minNbDiff) minNbDiff = diff;
                    
                    if (diff >= -9 && diff <= 9) {
                        let pos = 50 + (diff * (50/9));
                        pos = Math.max(0, Math.min(100, pos));
                        
                        nbTrainsHTML += `<div class="absolute top-[0px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;">
                            <div class="bg-white text-themePurple rounded-full shadow-md border-2 border-purple-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse">
                                <i class="fa-solid fa-caret-left text-[10px]"></i>
                                <i class="fa-solid fa-train-subway text-xs sm:text-sm"></i>
                            </div>
                        </div>`;
                    }
                });
            });

            let sbTrainsHTML = '';
            let minSbDiff = 999;
            
            // 處理南下列車 
            baseSbArrivals.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - currentTotalMinutes;
                    if (diff > 0 && diff < minSbDiff) minSbDiff = diff;
                    
                    if (diff >= -9 && diff <= 9) {
                        let pos = 50 - (diff * (50/9));
                        pos = Math.max(0, Math.min(100, pos));
                        
                        sbTrainsHTML += `<div class="absolute top-[26px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;">
                            <div class="bg-purple-500 text-white rounded-full shadow-md border-2 border-white flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse" style="animation-delay: 0.5s;">
                                <i class="fa-solid fa-train-subway text-xs sm:text-sm"></i>
                                <i class="fa-solid fa-caret-right text-[10px]"></i>
                            </div>
                        </div>`;
                    }
                });
            });

            container.innerHTML = nbTrainsHTML + sbTrainsHTML;

            const updateText = (el, diff, unitId) => {
                const unitEl = document.getElementById(unitId);
                if (Math.ceil(diff) <= 1 && Math.ceil(diff) >= 0) {
                    el.innerText = '進站中';
                    el.className = 'text-2xl sm:text-3xl font-black text-red-400 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest';
                    if(unitEl) unitEl.style.display = 'none';
                } else {
                    el.innerText = Math.ceil(diff);
                    el.className = el.id.includes('north') ? 'text-3xl sm:text-4xl font-black text-purple-400 font-mono w-10 text-center' : 'text-3xl sm:text-4xl font-black text-white font-mono w-10 text-center';
                    if(unitEl) unitEl.style.display = 'inline';

            updateText(nbEl, minNbDiff, 'mrt-unit-north');

        function animateSingleCounter(counter, target) {
            const duration = 2000; 
            const frameRate = 1000 / 60; 
            const totalFrames = Math.round(duration / frameRate);
            let currentFrame = 0;

            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

            const updateCounter = () => {
                currentFrame++;
                const progress = easeOutExpo(currentFrame / totalFrames);
                const currentVal = Math.round(target * progress);
                counter.innerText = currentVal;

                if (currentFrame < totalFrames) {
                    requestAnimationFrame(updateCounter);
                } else {
                    counter.innerText = target; 
                }
            };
            
            counter.innerText = '0';
            requestAnimationFrame(updateCounter);
        }

        // --- 景點車程計算邏輯 ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        async function calculateCarTime() {
            const timeElements = document.querySelectorAll('.location-time');
            if(!timeElements.length) return;

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    for (let el of timeElements) {
                        let targetLat = parseFloat(el.getAttribute('data-lat'));
                        let targetLng = parseFloat(el.getAttribute('data-lng'));
                        const address = el.getAttribute('data-address');

                        if ((isNaN(targetLat) || isNaN(targetLng)) && address) {
                            try {
                                let searchAddress = address;
                                if(!searchAddress.includes('市') && !searchAddress.includes('區')) {
                                    searchAddress = '桃園市龜山區 ' + searchAddress;
                                }
                                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                                const data = await response.json();
                                if (data && data.length > 0) {
                                    targetLat = parseFloat(data[0].lat);
                                    targetLng = parseFloat(data[0].lon);
                                    el.setAttribute('data-lat', targetLat);
                                    el.setAttribute('data-lng', targetLng);
                                }
                            } catch (e) {
                                console.error("座標換算失敗:", address);
                            }
                            await new Promise(r => setTimeout(r, 1000));
                        }

                        if (!isNaN(targetLat) && !isNaN(targetLng)) {
                            const dist = calculateDistance(userLat, userLng, targetLat, targetLng);
                            let estimatedMins = Math.round((dist / 30) * 60 + 5);
                            if(estimatedMins < 2) estimatedMins = 2;
                            el.innerHTML = `<i class="fa-solid fa-car-side"></i> 車程約 ${estimatedMins} 分鐘`;
                            el.classList.replace('text-gray-400', 'text-themePurple');
                        } else {
                            el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 無法估算車程`;
                            el.classList.replace('text-themePurple', 'text-gray-400');
                        }
                    }
                }, function(error) {
                    timeElements.forEach(el => {
                        el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 未授權定位 (無法估算)`;
                        el.classList.replace('text-themePurple', 'text-gray-400');
                    });
                });
            } else {
                timeElements.forEach(el => {
                    el.innerHTML = `<i class="fa-solid fa-car-side"></i> 瀏覽器不支援定位`;
                });
            }
        }

        // CSV 解析器
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

                fetch(csvUrl).then(res => res.text()).then(csvText => {

                    let likesMap = {};
                    
                    if (rows.length > 1) {
                        const headers = rows[0];
                        const isLogFormat = headers.some(h => h.includes('時間')) && headers.some(h => h.includes('ID')) && headers.some(h => h.includes('店'));

                        if (isLogFormat) {
                            const userIdx = headers.findIndex(k => k.includes('ID') || k.includes('使用者'));

                            rows.slice(1).forEach(row => {

                                if (!storeName || !userId) return;

                                if (!likesMap[storeName]) {

                                if (!likesMap[storeName].users.includes(userId)) {
                                    likesMap[storeName].users.push(userId);
                                }
                            });

                    }
                    
                    const localCache = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');

                        });
                    }
                    
                    globalLikesData = likesMap;
                    resolve(globalLikesData);
                }).catch(err => {

    function getCategoryStyle(categoryName, storeName = '') {
        if (storeName && storeName.includes('五金')) {
            return { iconClass: 'fa-scissors', bgColor: 'bg-green-400', textColor: 'text-green-500', emoji: '✂️' };
        }
        if (storeName && (storeName.includes('康是美') || storeName.includes('藥'))) {
            return { iconClass: 'fa-pills', bgColor: 'bg-orange-400', textColor: 'text-orange-500', emoji: '💊' };
        }

        if (!categoryName) return CATEGORY_STYLES[CATEGORY_STYLES.length - 1]; 
        
        for (let style of CATEGORY_STYLES) {
            if (style.keywords.some(kw => categoryName.includes(kw))) {
                return style;
            }
        }
        return CATEGORY_STYLES[CATEGORY_STYLES.length - 1]; 
    }

    function loadSharedFoodData() {
        return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const timeIdx = Math.max(0, headers.findIndex(k => k.includes('時間') || k.toLowerCase().includes('timestamp')));
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點') || k.includes('網址')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                        let finalImg = rawImg.startsWith('http') ? rawImg : '';
                        
                        let rawTime = timeIdx !== -1 && row[timeIdx] ? row[timeIdx].trim() : '';
                        let cleanTime = rawTime.replace('上午', 'AM').replace('下午', 'PM');
                        let parsedTime = new Date(cleanTime).getTime();

                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                            img: finalImg,
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                            likesCount: parseInt(row[14]) || 0, 
                            timestamp: isNaN(parsedTime) ? 0 : parsedTime 
                        };
                    }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(err => {
                    console.error('Fetch Food Data Error:', err);
                    resolve([]); 
                });
            });
        }

        function locateUserOnFoodMap() {
            if (!foodMapInstance) return;
            const btnIcon = document.getElementById('location-btn-icon');

            if ("geolocation" in navigator) {

                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    foodMapInstance.flyTo([lat, lng], 18, { animate: true, duration: 1 });
                    
                    if (userLocationMarker) {

            }
        }

        async function updateFoodMap(address, name, preLat, preLng, category) {
            if (foodMarkersMap[name]) {
                const marker = foodMarkersMap[name];
                
                if (activeFoodMarkerName && activeFoodMarkerName !== name && foodMarkersMap[activeFoodMarkerName]) {
                    const prevMarker = foodMarkersMap[activeFoodMarkerName];
                    if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                    prevMarker.setIcon(getCategoryIcon(prevMarker.category, activeFoodMarkerName, 'normal', false));
                }
                activeFoodMarkerName = name; 
                
                const targetZoom = 18;
                const pt = foodMapInstance.project(marker.getLatLng(), targetZoom);
                pt.y -= foodMapInstance.getSize().y / 3.5; 
                const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);
                
                foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });
                
                foodMapInstance.once('moveend', () => {
                    foodClusterGroup.zoomToShowLayer(marker, () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(category, name, 'clicked', true));
                        
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => {
                            if (foodMarkersMap[name] && activeFoodMarkerName === name) {
                                marker.setIcon(getCategoryIcon(category, name, 'clicked', false));
                            }
                        }, 5000);
                    });
                });
                return;
            }

            const overlay = document.getElementById('food-map-overlay');
            const overlayText = document.getElementById('food-map-overlay-text');
            
            if (overlay) {
                overlayText.className = "text-sm font-bold text-gray-600";
                overlayText.innerText = `正在為您定位 ${name}...`;
                overlay.style.display = 'flex';
            }

            try {
                let targetLat = preLat;
                let targetLng = preLng;

                if (!targetLat || !targetLng) {
                    let searchAddress = address.includes('市') ? address : '桃園市龜山區 ' + address;
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        targetLat = parseFloat(data[0].lat);
                        targetLng = parseFloat(data[0].lon);
                    }
                }

                if (targetLat && targetLng) {
                    const targetZoom = 18;
                    const pt = foodMapInstance.project([targetLat, targetLng], targetZoom);
                    pt.y -= foodMapInstance.getSize().y / 3.5;
                    const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);

                    foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });
                    setTimeout(() => {
                        L.popup({ className: 'custom-popup-temporary' })
                            .setLatLng([targetLat, targetLng])
                            .setContent(`<div class="font-black text-themePink p-2 pt-6 text-center text-lg leading-[1.1]"><i class="fa-solid fa-location-dot mr-1"></i> ${formatStoreName(name)}</div>`)
                            .openOn(foodMapInstance);
                    }, 1000);
                } else {
                    if (overlay) {
                        overlayText.innerHTML = `地圖無法精確定位此地址<br><span class="text-xs text-gray-400 mt-1">${address}</span>`;
                        overlayText.className = "text-sm font-bold text-red-400 text-center";
                        setTimeout(() => overlay.style.display = 'none', 2000);
                        return;
                    }
                }
            } catch (error) { 
                console.error("Geocoding error:", error); 
                if (overlay) {
                    overlayText.innerText = `地圖服務暫時無法連線`;
                    overlayText.className = "text-sm font-bold text-red-400";
                    setTimeout(() => overlay.style.display = 'none', 2000);
                    return;
                }
            }

            if(overlay) setTimeout(() => overlay.style.display = 'none', 800);
        }

        async function showShoppingMap(safeCatId, catName, storeName, preLat, preLng, address) {
            document.querySelectorAll('[id^="map-wrapper-"]').forEach(wrapper => {
                if (wrapper.id !== 'map-wrapper-' + safeCatId) {
                    wrapper.classList.add('hidden');
                    wrapper.classList.remove('opacity-100');
                    wrapper.classList.add('opacity-0');
                }
            });

            const mapWrapper = document.getElementById('map-wrapper-' + safeCatId);
            if (!mapWrapper) return;
            
            if (mapWrapper.classList.contains('hidden')) {
                mapWrapper.classList.remove('hidden');
                void mapWrapper.offsetWidth;
                mapWrapper.classList.remove('opacity-0');
                mapWrapper.classList.add('opacity-100');
            }

            if (!shoppingMaps[safeCatId]) {
                shoppingMaps[safeCatId] = L.map('map-' + safeCatId, { zoomControl: false }).setView([25.0425, 121.3870], 14);
                L.control.zoom({ position: 'bottomright' }).addTo(shoppingMaps[safeCatId]);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap', maxZoom: 20
                }).addTo(shoppingMaps[safeCatId]);
                
                shoppingClusterGroups[safeCatId] = L.markerClusterGroup({
                    chunkedLoading: true, spiderfyOnMaxZoom: true, showCoverageOnHover: false, maxClusterRadius: 40
                });
                shoppingMaps[safeCatId].addLayer(shoppingClusterGroups[safeCatId]);
                shoppingMarkersMap[safeCatId] = {};
                shoppingMaps[safeCatId].activeMarker = null; // 初始化紀錄點擊的 marker

                const catStores = globalShoppingData.filter(s => s.category === catName);
                for (let store of catStores) {
                    if (store.lat && store.lng) {
                        const marker = L.marker([store.lat, store.lng], { icon: getCategoryIcon(store.category, store.name, 'normal') });
                        marker.category = store.category;
                        marker.storeName = store.name; // 儲存店名
                        marker.bindTooltip(store.name, { direction: 'top', offset: [0, -50], className: 'custom-tooltip' });
                        
                        let popupContent = `
                            <div class="text-center p-1 pt-5 w-50">
                                <h4 class="font-black text-themeYellow text-sm leading-[1.1] mb-1">${formatStoreName(store.name)}</h4>
                                <p class="text-xs text-gray-500 font-bold leading-snug"><i class="fa-solid fa-location-dot mr-1"></i>${store.address}</p>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${store.lat},${store.lng}" target="_blank" class="mt-2.5 block w-full bg-blue-100 text-blue-600 font-black py-1.5 rounded-lg text-xs hover:bg-blue-500 hover:text-white transition-colors shadow-sm">導航去</a>
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                        
                        marker.on('click', () => {
                            marker.setIcon(getCategoryIcon(store.category, store.name, 'clicked', true));
                            if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                            marker.bounceTimeout = setTimeout(() => {
                                marker.setIcon(getCategoryIcon(store.category, store.name, 'clicked', false));
                            }, 5000);
                        });

                        shoppingClusterGroups[safeCatId].addLayer(marker);
                        shoppingMarkersMap[safeCatId][store.name] = marker;
                    }
                }
            }
            
            const map = shoppingMaps[safeCatId];
            const clusterGroup = shoppingClusterGroups[safeCatId];
            
            setTimeout(() => {
                map.invalidateSize();
                
                let targetLat = preLat;
                let targetLng = preLng;
                
                const marker = shoppingMarkersMap[safeCatId][storeName];

                if (marker) {
                    // 如果有上一個被點擊的 marker，將它放回群聚(Cluster)中
                    if (map.activeMarker && map.activeMarker !== marker) {
                        map.removeLayer(map.activeMarker);
                        clusterGroup.addLayer(map.activeMarker);
                        map.activeMarker.setIcon(getCategoryIcon(map.activeMarker.category, map.activeMarker.storeName, 'normal', false));
                    }

                    // 把當前點擊的 marker 從群聚中移出，直接加到地圖上（確保它在群聚上方顯示且不會被合併）
                    map.activeMarker = marker;
                    clusterGroup.removeLayer(marker);
                    map.addLayer(marker);
                    marker.setZIndexOffset(1000); // 確保在最上層

                    // 取得全部標記的邊界範圍 (包含群聚和獨立出來的 marker)
                    let bounds;
                    if (clusterGroup.getLayers().length === 0) {
                        bounds = L.latLngBounds([marker.getLatLng(), marker.getLatLng()]);
                    } else {
                        bounds = clusterGroup.getBounds();
                        bounds.extend(marker.getLatLng());
                    }

                    // 鎖定較廣的範圍 (maxZoom: 15)
                    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15, animate: true, duration: 1.5 });

                    map.once('moveend', () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', true));
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', false)), 5000);
                    });
                } else {
                    if (clusterGroup.getLayers().length > 0) {
                        map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40], maxZoom: 15, animate: true, duration: 1.5 });
                    } else if (targetLat && targetLng) {
                        map.setView([targetLat, targetLng], 15);
                    }
                }
            }, 300); 

            setTimeout(() => {
                mapWrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 150);
        }

        function loadSharedShoppingData() {
            return new Promise((resolve, reject) => {
                if (globalShoppingData) {
                    resolve(globalShoppingData);
                    return;
                }
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1279676556&single=true&output=csv';

                fetch(csvUrl)
                    .then(res => res.text())
                    .then(csvText => {
                        const rows = parseCSV(csvText);
                        if (rows.length < 2) {
                            globalShoppingData = [];
                            resolve(globalShoppingData);
                            return;
                        }

                        const headers = rows[0];
                        let nameIdx = headers.findIndex(k => k.includes('店') || k.includes('名'));
                        if (nameIdx === -1) nameIdx = 1; 
                        
                        let catIdx = headers.findIndex(k => k === '生活分類' || k.includes('生活分類'));
                        if (catIdx === -1) catIdx = 6; 

                        let addressIdx = headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點'));
                        let statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                        let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')); 
                        let latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                        let lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                        let parsedData = rows.slice(1).map(row => {
                            let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                            let finalImg = rawImg.startsWith('http') ? rawImg : '';

                            return {
                                name: row[nameIdx] || '未命名',
                                category: row[catIdx] || '未分類',
                                address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                                status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                                img: finalImg,
                                lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                                lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                                likesCount: parseInt(row[14]) || 0 
                            };
                        }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                        globalShoppingData = parsedData.filter(item => {
                            if (statusIdx === -1) return true;
                            const s = String(item.status).toUpperCase().trim();
                            return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                        });

                        resolve(globalShoppingData);
                    })
                    .catch(err => {
                        console.error('Fetch Shopping Data Error:', err);
                        resolve([]); 
                    });
            });
        }

        function fetchShoppingData() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;

            for (let key in shoppingMaps) {
                if (shoppingMaps[key]) shoppingMaps[key].remove();
            }
            shoppingMaps = {};
            shoppingClusterGroups = {};
            shoppingMarkersMap = {};

            Promise.all([loadSharedShoppingData(), loadSharedLikesData()]).then(([data, likes]) => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold py-8">目前沒有店家資料</div>';
                } else {
                    renderShoppingData(data, '全部');
                }
            }).catch(err => {
                console.error('CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8">資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderShoppingData(data, activeCategory = '全部') {
            const container = document.getElementById('shopping-list-container');
            const tagsContainer = document.getElementById('shopping-tags-container');
            if (!container) return;

            container.className = "flex flex-col gap-6 w-full";

            if (tagsContainer) {
                const allCategories = ['全部', ...new Set(globalShoppingData.map(item => item.category).filter(c => c))];
                tagsContainer.innerHTML = allCategories.map(cat => {
                    const isActive = cat === activeCategory;
                    const activeClass = isActive 
                        ? 'bg-themeYellow text-white shadow-md scale-[1.02] md:scale-105 z-10' 
                        : 'bg-white text-gray-600 hover:bg-yellow-50 shadow-sm border-2 border-transparent hover:-translate-y-1';
                    
                    let icon = '🛍️';
                    if(cat.includes('生鮮') || cat.includes('超市') || cat.includes('食品') || cat.includes('市場') || cat.includes('便利')) icon = '🛒';
                    if(cat.includes('居家') || cat.includes('寵物') || cat.includes('五金') || cat.includes('電器')) icon = '🏠';
                    if(cat.includes('服務') || cat.includes('洗') || cat.includes('美容') || cat.includes('修繕')) icon = '🤝';
                    if(cat.includes('觀光') || cat.includes('景點') || cat.includes('公園')) icon = '🌲';
                    if(cat.includes('捷運') || cat.includes('機捷') || cat.includes('交通')) icon = '🚇';
                    if(cat === '全部') icon = '🎡';
                    
                    return `<button onclick="renderShoppingData(globalShoppingData, '${cat.replace(/'/g, "\\'")}')" class="flex-auto lg:flex-1 w-auto py-2.5 md:py-3 px-4 md:px-6 rounded-full font-black text-xs md:text-sm transition-all transform flex items-center justify-center gap-1 md:gap-2 border border-yellow-100 whitespace-nowrap ${activeClass}">
                                <span class="hidden md:inline-block shrink-0">${icon}</span>
                                <span>${cat}</span>
                            </button>`;
                }).join('');
            }

            const filteredData = activeCategory === '全部' ? data : data.filter(item => item.category === activeCategory);
            if (filteredData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有審核通過的店家喔！</div>';
                return;
            }

            const groupedCategories = {};
            filteredData.forEach(item => {
                const cat = item.category || '未分類';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            const catLikes = {};
            for (const [catName, items] of Object.entries(groupedCategories)) {
                items.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
                catLikes[catName] = items.reduce((sum, item) => sum + (item.likesCount || 0), 0);
            }

            let mrtCat = null;
            let mainCats = []; 
            let sideCats = []; 

            for (const [catName, items] of Object.entries(groupedCategories)) {
                if (catName.includes('捷運') || catName.includes('機捷') || catName.includes('交通')) {
                    mrtCat = { name: catName, items: items };
                } else {
                    const isPhoto = catName.includes('購物中心') || catName.includes('觀光景點') || catName.includes('百貨') || catName.includes('商場') || catName.includes('公園');
                    const isLargeText = catName.includes('生鮮') || catName.includes('超市') || catName.includes('便利');
                    
                    if (isPhoto || isLargeText) {
                        mainCats.push({ name: catName, items: items, isPhoto: isPhoto, isLargeText: isLargeText });
                    } else {
                        sideCats.push({ name: catName, items: items, isPhoto: false, isLargeText: false });
                    }
                }
            }

            mainCats.sort((a, b) => catLikes[b.name] - catLikes[a.name]);
            sideCats.sort((a, b) => catLikes[b.name] - catLikes[a.name]);

            const stylePool = [
                { border: 'border-yellow-50', textBig: 'text-yellow-100', textTitle: 'text-themeYellow', icon: 'fa-cart-shopping', emoji: '🛒' }, 
                { border: 'border-blue-50', textBig: 'text-blue-100', textTitle: 'text-themeBlue', icon: 'fa-house-chimney', emoji: '🏠' }, 
                { border: 'border-purple-50', textBig: 'text-purple-100', textTitle: 'text-themePurple', icon: 'fa-hand-holding-heart', emoji: '🤝' }, 
                { border: 'border-green-50', textBig: 'text-green-100', textTitle: 'text-themeGreen', icon: 'fa-tree-city', emoji: '🌲' }, 
                { border: 'border-pink-50', textBig: 'text-pink-100', textTitle: 'text-themePink', icon: 'fa-bag-shopping', emoji: '🛍️' }, 
                { border: 'border-orange-50', textBig: 'text-orange-100', textTitle: 'text-orange-500', icon: 'fa-gift', emoji: '🎁' } 
            ];

            const generateItemHTML = (item, catName, safeCatId, isPhotoCategory) => {
                const itemStyle = getCategoryStyle(catName, item.name);
                const navTarget = encodeURIComponent((item.address && item.address.trim() !== '') ? item.address : item.name);
                const storeLikes = globalLikesData[item.name] || { users: [] };
                const isLiked = storeLikes.users.includes(currentUserId);
                const likeCount = item.likesCount || 0;
                const isMRT = catName.includes('捷運') || catName.includes('機捷');

                if (isPhotoCategory) {
                    const imgContent = item.img

                            <div class="w-full h-24 sm:h-32 rounded-[1rem] mb-2 overflow-hidden bg-white relative flex items-center justify-center shrink-0 border border-gray-100 shadow-inner">

                else if (catName.includes('服務') || catName.includes('洗') || catName.includes('寄') || catName.includes('修') || catName.includes('美容')) style = stylePool[2];

                            </h3>

                                </div>
                            </div>
                        </div>
                    </div>
                `;
            };

            let finalOutput = '';

            if (mrtCat) {
                const { name: catName, items } = mrtCat;
                const style = { border: 'border-purple-50', textBig: 'text-purple-100', textTitle: 'text-themePurple', icon: 'fa-train-subway', emoji: '🚇' };
                const safeCatId = btoa(encodeURIComponent(catName)).replace(/[^a-zA-Z0-9]/g, '');

                let a7Items = items.filter(i => i.name.includes('A7') || i.name.includes('體育大學'));
                let otherItems = items.filter(i => !i.name.includes('A7') && !i.name.includes('體育大學'));
                
                if (a7Items.length === 0 && items.length > 0) {
                    a7Items = [items[0]];
                    otherItems = items.slice(1);
                }

                let a7Html = a7Items.map(item => generateItemHTML(item, catName, safeCatId, false)).join('');
                let otherHtml = otherItems.map(item => generateItemHTML(item, catName, safeCatId, false)).join('');

                finalOutput += `
                    <div class="bg-white rounded-[2rem] p-6 md:p-8 shadow-cute border-4 ${style.border} relative flex flex-col w-full break-inside-avoid overflow-hidden mb-6">
                        <div class="absolute -top-5 -right-5 text-6xl ${style.textBig} floating pointer-events-none"><i class="fa-solid ${style.icon}"></i></div>
                        <h3 class="text-xl md:text-2xl font-black ${style.textTitle} mb-5 border-b-2 border-gray-100 pb-3 relative z-10 shrink-0 flex items-center">
                            <span class="mr-2">${style.emoji}</span> ${catName} <span class="text-sm font-bold text-gray-400 ml-2">(${items.length})</span>
                        </h3>

                        <div class="flex flex-col gap-4 relative z-10 items-stretch w-full">
                            <div class="flex flex-col lg:flex-row gap-6 w-full">
                                
                                <div class="w-full lg:w-1/2 flex flex-col gap-3">
                                    <div class="text-xs font-black text-purple-500 bg-purple-50 px-3 py-1.5 rounded-lg w-fit flex items-center shadow-sm border border-purple-100">
                                        <i class="fa-solid fa-location-dot mr-1.5"></i> 核心站點
                                    </div>
                                    <ul class="grid grid-cols-1 gap-3 font-bold text-gray-600 relative z-10 content-start">
                                        ${a7Html}
                                    </ul>
                                </div>

                                ${otherItems.length > 0 ? `
                                <div class="w-full lg:w-1/2 flex flex-col gap-3 lg:border-l-2 lg:border-t-0 border-t-2 border-dashed border-purple-100 lg:pl-6 pt-4 lg:pt-0">
                                    <details class="group transition-all duration-300 w-full">
                                        <summary class="cursor-pointer text-purple-500 hover:text-purple-600 font-bold text-sm bg-purple-50 hover:bg-purple-100 px-4 py-2.5 rounded-xl flex items-center justify-between outline-none transition-colors w-full shadow-sm border border-purple-100">
                                            <span>顯示沿線其他站點 (${otherItems.length})</span>
                                            <i class="fa-solid fa-chevron-down group-open:rotate-180 transition-transform ml-2"></i>
                                        </summary>
                                        <ul class="grid grid-cols-1 gap-3 font-bold text-gray-600 relative z-10 content-start mt-3">
                                            ${otherHtml}
                                        </ul>
                                    </details>
                                </div>
                                ` : ''}
                            </div>

                            <div id="map-wrapper-${safeCatId}" class="hidden w-full shrink-0 transition-all duration-300 opacity-0 flex-col mt-2">
                                
                                <div id="map-${safeCatId}" class="w-full h-[250px] min-h-[250px] rounded-b-[1rem] border-2 border-gray-100 shadow-inner overflow-hidden relative z-10 flex-1"></div>
                            </div>
                        </div>
                    </div>
                `;
            }

            const maxLen = Math.max(mainCats.length, sideCats.length);
            
            for (let i = 0; i < maxLen; i++) {
                const mainCat = mainCats[i];
                const sideCat = sideCats[i];

                let rowHtml = `<div class="flex flex-col lg:flex-row gap-6 w-full mb-6 items-stretch">`;

                if (mainCat) {
                    let widthClass = mainCat.isLargeText ? 'lg:w-2/3' : 'lg:w-1/2';
                    if (!sideCat) widthClass = 'w-full'; 
                    rowHtml += renderBlock(mainCat, widthClass);
                }

                if (sideCat) {
                    let widthClass = (mainCat && mainCat.isLargeText) ? 'lg:w-1/3' : 'lg:w-1/2';
                    if (!mainCat) widthClass = 'w-full'; 
                    rowHtml += renderBlock(sideCat, widthClass);
                }

                rowHtml += `</div>`;
                finalOutput += rowHtml;
            }

            container.innerHTML = finalOutput;
        }

        // --- 首頁景點功能 ---
        function fetchAttractionsData() {
            const container = document.getElementById('attractions-list-container');
            if (!container) return;

            loadSharedShoppingData().then(data => {
                renderAttractionsData(data);
            }).catch(err => {
                console.error('Attractions Fetch Error:', err);
                container.innerHTML = '<div class="text-center text-red-500 font-bold py-4 w-full">載入失敗</div>';
            });
        }

        function renderAttractionsData(data) {
            const container = document.getElementById('attractions-list-container');
            if (!container) return;

            const attractions = data.filter(item => item.category === '購物中心' || item.category === '觀光景點');

            if (attractions.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 font-bold py-4 w-full">目前還沒有推薦景點喔！</div>';
                return;
            }

            container.innerHTML = attractions.map(item => {
                const navTarget = encodeURIComponent((item.address && item.address.trim() !== '') ? item.address : item.name);
                const imgContent = item.img 
                    ? `<img src="${item.img}" onerror="this.style.display='none'" class="w-full h-full object-cover group-hover:scale-105 transition-transform">` 
                    : `<i class="fa-solid fa-camera-retro text-3xl sm:text-4xl text-purple-200"></i>`;

                return `
                    <div onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${navTarget}', '_blank')" class="w-[135px] sm:w-[220px] bg-white rounded-[1.2rem] sm:rounded-[2rem] p-2 sm:p-3 shadow-sm border-2 border-purple-50 shrink-0 hover:-translate-y-2 transition-transform cursor-pointer group flex flex-col snap-start">
                        <div class="w-full h-20 sm:h-32 rounded-[1rem] sm:rounded-[1.5rem] mb-2 overflow-hidden bg-purple-50 flex items-center justify-center shrink-0">
                            ${imgContent}
                        </div>
                        <div class="flex flex-col flex-1 justify-between gap-1">
                            <div class="px-1 sm:px-2">
                                <h4 class="font-black text-gray-800 line-clamp-1 text-xs sm:text-base" title="${item.name}">${item.name}</h4>
                                ${item.address ? `<p class="text-[10px] sm:text-xs text-gray-400 font-bold mt-0.5 line-clamp-1" title="${item.address}"><i class="fa-solid fa-location-dot mr-1"></i>${item.address}</p>` : ''}
                            </div>
                            <p class="text-[10px] sm:text-sm text-themePurple font-bold px-1 sm:px-2 mt-auto location-time" data-address="${item.address || item.name}">
                                <i class="fa-solid fa-spinner fa-spin"></i> 載入車程中...
                            </p>
                        </div>
                    </div>
                `;
            }).join('');

            calculateCarTime();
        }

        // ==========================================
        // 🩺 樂園救護站 (Medical) 模組
        // ==========================================
        function loadSharedMedicalData() {
            return new Promise((resolve, reject) => {
                if (globalMedicalData) return resolve(globalMedicalData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
                
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構') || k.includes('店名'));
                    if (nameIdx === -1) nameIdx = 0; 
                    let catIdx = headers.findIndex(k => k.includes('醫療分類'));
                    if (catIdx === -1) catIdx = 8; 
                    let addressIdx = headers.findIndex(k => k.includes('地址'));
                    let phoneIdx = headers.findIndex(k => k.includes('電話'));
                    
                    let licenseIdx = 14; 

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他醫療',
                            address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                            phone: phoneIdx !== -1 && row[phoneIdx] ? row[phoneIdx].trim() : '',
                            license: row[licenseIdx] ? row[licenseIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalMedicalData = parsedData;
                    resolve(globalMedicalData);
                }).catch(reject);
            });
        }

        function fetchMedicalData() {
            const container = document.getElementById('medical-list-container');
            if (!container) return;

            loadSharedMedicalData().then(data => {
                renderMedicalData(data);
            }).catch(err => {
                console.error('Medical CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8 bg-white rounded-3xl">醫療資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderMedicalData(data) {
            const container = document.getElementById('medical-list-container');
            if (!container) return;

            container.className = "flex flex-col gap-6 w-full";

            const groupedCategories = {};
            data.forEach(item => {
                const cat = item.category || '其他醫療';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            const stylePool = [
                { border: 'border-green-50', textBig: 'text-green-100', textTitle: 'text-themeGreen', badgeBg: 'bg-themeGreen', icon: 'fa-stethoscope' },
                { border: 'border-purple-50', textBig: 'text-purple-100', textTitle: 'text-themePurple', badgeBg: 'bg-themePurple', icon: 'fa-tooth' },
                { border: 'border-orange-50', textBig: 'text-orange-100', textTitle: 'text-orange-400', badgeBg: 'bg-orange-400', icon: 'fa-baby' },
                { border: 'border-blue-50', textBig: 'text-blue-100', textTitle: 'text-themeBlue', badgeBg: 'bg-themeBlue', icon: 'fa-eye' },
                { border: 'border-yellow-50', textBig: 'text-yellow-100', textTitle: 'text-themeYellow', badgeBg: 'bg-themeYellow', icon: 'fa-bone' },
                { border: 'border-pink-50', textBig: 'text-pink-100', textTitle: 'text-themePink', badgeBg: 'bg-themePink', icon: 'fa-pills' }
            ];

            let html = '';

            for (const [catName, items] of Object.entries(groupedCategories)) {
                let style;
                if (catName.includes('牙')) style = stylePool[1];
                else if (catName.includes('小兒') || catName.includes('婦產') || catName.includes('兒童')) style = stylePool[2];
                else if (catName.includes('眼')) style = stylePool[3];
                else if (catName.includes('骨') || catName.includes('復健')) style = stylePool[4];
                else if (catName.includes('藥')) style = stylePool[5];
                else style = stylePool[0]; // 預設(長庚、診所、醫院)為綠色

                const itemsHtml = items.map(item => {
                    const navTarget = encodeURIComponent((item.address && item.address.trim() !== '') ? item.address : item.name);
                    return `
                        <li class="bg-gray-50 p-4 rounded-2xl hover:bg-white hover:shadow-md transition-all group flex flex-col gap-2 border border-transparent hover:border-gray-100 h-full justify-between">
                            <div class="flex items-start justify-between w-full">
                                <div class="flex flex-col flex-1 pr-2">
                                    <div class="flex items-start">
                                        <i class="fa-solid fa-notes-medical ${style.textTitle} mr-2 mt-1 shrink-0 group-hover:scale-125 transition-transform"></i>
                                        <span class="font-black text-gray-800 text-lg leading-snug">${item.name}</span>
                                    </div>
                                    ${item.license ? `<div class="ml-6 mt-1.5 text-[10px] text-white ${style.badgeBg} px-2 py-1 rounded-md font-black w-fit shadow-sm flex items-center"><i class="fa-regular fa-id-badge mr-1"></i>桃衛醫字第：${item.license} 號</div>` : ''}
                                </div>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${navTarget}" target="_blank" title="導航至 ${item.name}" class="shrink-0 bg-blue-100 text-blue-600 hover:bg-blue-500 hover:text-white px-2.5 py-1.5 rounded-lg text-xs font-black transition-colors shadow-sm flex items-center gap-1.5 cursor-pointer mt-0.5">
                                    <i class="fa-solid fa-location-arrow"></i> 導航
                                </a>
                            </div>
                            <div class="mt-1 space-y-1.5">
                                ${item.phone ? `<div class="text-xs md:text-sm text-gray-500 font-bold ml-6 flex items-center"><i class="fa-solid fa-phone mr-1.5 text-gray-300"></i>${item.phone}</div>` : ''}
                                ${item.address ? `<div class="text-xs md:text-sm text-gray-500 font-bold ml-6 flex items-start"><i class="fa-solid fa-location-dot mr-1.5 text-gray-300 mt-0.5"></i><span class="line-clamp-2">${item.address}</span></div>` : ''}
                            </div>
                        </li>
                    `;
                }).join('');

                html += `
                    <div class="w-full">
                        <div class="bg-white rounded-[2.5rem] p-6 md:p-8 shadow-cute border-4 ${style.border} relative h-full flex flex-col">
                            <div class="absolute -top-4 -right-4 text-6xl ${style.textBig} floating pointer-events-none"><i class="fa-solid ${style.icon}"></i></div>
                            <h3 class="text-2xl font-black ${style.textTitle} mb-5 border-b-2 border-gray-100 pb-3 relative z-10 shrink-0">
                                ${catName}
                            </h3>
                            <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 font-bold text-gray-600 relative z-10 flex-1 content-start">
                                ${itemsHtml}
                            </ul>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // ==========================================
        // 全域搜尋所需的探索模組資料 (以供統計與搜尋使用)
        // ==========================================
        function loadSharedCommunityData() {
            return new Promise((resolve, reject) => {
                if (globalCommunityData) return resolve(globalCommunityData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('社群'));
                    if (nameIdx === -1) nameIdx = 0;
                    let catIdx = headers.findIndex(k => k.includes('屬性') || k.includes('分類'));
                    if (catIdx === -1) catIdx = 1;
                    let linkIdx = headers.findIndex(k => k.includes('連結') || k.includes('網址') || k.includes('URL'));
                    if (linkIdx === -1) linkIdx = 2;
                    let imgIdx = 4;

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = (row.length > imgIdx && row[imgIdx]) ? row[imgIdx].trim() : '';
                        let finalImg = '';
                        const urlMatch = rawImg.match(/https?:\/\/[^\s]+/);
                        if (urlMatch) finalImg = urlMatch[0];

                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他推薦',
                            link: row[linkIdx] ? row[linkIdx].trim() : '#',
                            img: finalImg
                        };
                    }).filter(item => item.name !== '' && item.link !== '#');

                    globalCommunityData = parsedData;
                    resolve(globalCommunityData);
                }).catch(reject);
            });
        }

        function loadSharedBuildingData() {
            return new Promise((resolve, reject) => {
                if (globalBuildingData) return resolve(globalBuildingData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=985024788&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('建案') || k.includes('名稱'));
                    if (nameIdx === -1) nameIdx = 0; 
                    let villageIdx = headers.findIndex(k => k.includes('里'));
                    if (villageIdx === -1) villageIdx = 1;
                    let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                    if (imgIdx === -1) imgIdx = 3; 

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            village: row[villageIdx] ? row[villageIdx].trim() : '未分類區域',
                            img: row[imgIdx] ? row[imgIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalBuildingData = parsedData;
                    resolve(globalBuildingData);
                }).catch(reject);
            });
        }
    </script>
