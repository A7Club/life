    <!-- JavaScript 路由與注入邏輯 -->
    <script>
        // 初始化載入首頁
        document.addEventListener('DOMContentLoaded', () => {
            loadPage('home');
        });

        // 頁面動態注入核心函數 (模擬多頁面行為)
        function loadPage(pageId) {
            const root = document.getElementById('app-root');
            const template = document.getElementById('tpl-' + pageId);
            
            if (template) {
                // 1. 完全清空容器 (避免 DOM 重疊與衝突)
                root.innerHTML = '';
                
                // 2. 複製 Template 內容並注入
                root.appendChild(template.content.cloneNode(true));
                
                // 3. 更新導航列樣式
                updateNavStyles(pageId);
                
                // 4. 平滑滾動到頂部
                window.scrollTo({ top: 0, behavior: 'smooth' });

                // 如果是首頁，觸發捲動監聽的跳動數字動畫
                if (pageId === 'home') {
                    // 微小延遲確保 DOM 已完全渲染
                    setTimeout(() => {
                        initScrollCounters();
                        fetchAttractionsData(); // 新增：抓取動態景點並計算車程
                    }, 50);
                }

                // 如果是 Food 頁面，動態抓取試算表資料
                if (pageId === 'food') {
                    fetchFoodData();
                }

                // 如果是 Shopping 頁面，動態抓取購物生活資料庫
                if (pageId === 'shopping') {
                    fetchShoppingData();
                }

                // 如果是 Explore 頁面，動態抓取熱門社群推薦資料
                if (pageId === 'explore') {
                    fetchCommunityData();
                    fetchBuildingData(); // 新增：抓取建案資料
                }
            } else {
                console.error("找不到對應的模板: ", pageId);
            }
        }

        // ==========================================
        // 🔎 全域搜尋系統 (Global Search)
        // ==========================================
        async function doSearch() {
            const input = document.getElementById('home-search-input');
            if(!input) return;
            const query = input.value.trim();
            if(!query) return;

            // 切換至搜尋結果視圖
            loadPage('search');
            
            const display = document.getElementById('search-query-display');
            const container = document.getElementById('search-results-container');
            if(display) display.innerHTML = `正在為您尋找與 <span class="text-themePink font-black">「${query}」</span> 相關的樂園角落...`;

            try {
                // 等待所有資料庫完整載入 (並行處理加速)
                const [foodData, shoppingData, communityData, buildingData] = await Promise.all([
                    loadSharedFoodData(),
                    loadSharedShoppingData(),
                    loadSharedCommunityData(),
                    loadSharedBuildingData()
                ]);

                const q = query.toLowerCase();

                // 執行過濾比對
                const matchedFood = foodData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.category && item.category.toLowerCase().includes(q)) ||
                    (item.address && item.address.toLowerCase().includes(q))
                );

                const matchedShopping = shoppingData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.category && item.category.toLowerCase().includes(q)) ||
                    (item.address && item.address.toLowerCase().includes(q))
                );

                const matchedCommunity = communityData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.category && item.category.toLowerCase().includes(q))
                );

                const matchedBuildings = buildingData.filter(item => 
                    (item.name && item.name.toLowerCase().includes(q)) || 
                    (item.village && item.village.toLowerCase().includes(q))
                );

                let html = '';

                // 渲染美食結果
                if(matchedFood.length > 0) {
                    html += `
                        <div class="bg-white rounded-[2rem] p-6 shadow-cute border-4 border-pink-50 relative overflow-hidden">
                            <h3 class="text-2xl font-black text-themePink mb-4 border-b-2 border-pink-100 pb-2"><i class="fa-solid fa-burger mr-2"></i> 美食販賣部 (${matchedFood.length})</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 relative z-10">
                                ${matchedFood.map(item => {
                                    let imgContent = item.img ? `<img src="${item.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-utensils text-2xl text-pink-300"></i>`;
                                    let navTarget = encodeURIComponent(item.address || item.name);
                                    return `
                                        <a href="https://www.google.com/maps/dir/?api=1&destination=${navTarget}" target="_blank" class="bg-pink-50 p-3 rounded-2xl shadow-sm border border-white flex items-center gap-3 hover:-translate-y-1 hover:shadow-md transition-all group">
                                            <div class="w-14 h-14 bg-white rounded-xl overflow-hidden shrink-0 flex items-center justify-center">${imgContent}</div>
                                            <div class="flex-1 overflow-hidden pr-2">
                                                <div class="flex items-center gap-2 mb-0.5">
                                                    <span class="text-[10px] bg-white text-themePink px-1.5 py-0.5 rounded-md font-black shadow-sm shrink-0">${item.category}</span>
                                                    <h4 class="font-black text-gray-800 line-clamp-1 group-hover:text-themePink">${item.name}</h4>
                                                </div>
                                                <p class="text-xs text-gray-500 font-bold line-clamp-1"><i class="fa-solid fa-location-dot mr-1 text-pink-400"></i>${item.address || 'A7 在地美食'}</p>

        // 捲動監聽：當元素進入畫面時才觸發動畫
        function initScrollCounters() {
            const statsContainer = document.getElementById('stats-container');
            if (!statsContainer) return;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // 當區塊進入畫面時
                    if (entry.isIntersecting) {
                        animateCounters();
                        observer.unobserve(entry.target); // 觸發過後就取消監聽，避免重複播放
                    }
                });
            }, { threshold: 0.2 }); // 當區塊進入畫面 20% 視角時觸發

            observer.observe(statsContainer);
        }

        // 數字跳動/翻牌動畫函數 (Ease-Out 特效)
        function animateCounters() {
            const counters = document.querySelectorAll('.num-counter');
            
            counters.forEach(counter => {
                const target = parseInt(counter.getAttribute('data-target'));
                const duration = 2500; // 動畫總時間 2.5 秒
                const frameRate = 1000 / 60; // 60 FPS
                const totalFrames = Math.round(duration / frameRate);
                let currentFrame = 0;

                // 緩動函數：前面跳超快，後面「緩慢停下來」的平滑感 (EaseOutExpo)
                const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

                const updateCounter = () => {
                    currentFrame++;
                    const progress = easeOutExpo(currentFrame / totalFrames);
                    
                    // 單純、乾淨且快速遞增的數字翻動，視覺上最舒服不抖動
                    const currentVal = Math.round(target * progress);
                    counter.innerText = currentVal;

                    if (currentFrame < totalFrames) {
                        requestAnimationFrame(updateCounter);
                    } else {
                        counter.innerText = target; // 確保最後停在精準目標數字
                    }
                };
                
                // 開始前先歸零
                counter.innerText = '0';
                requestAnimationFrame(updateCounter);
            });
        }

        // --- 景點車程計算邏輯 ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球半徑(公里)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // 返回直線距離(公里)
        }

        async function calculateCarTime() {
            const timeElements = document.querySelectorAll('.location-time');
            if(!timeElements.length) return;

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    // 依序處理每個景點卡片
                    for (let el of timeElements) {
                        let targetLat = parseFloat(el.getAttribute('data-lat'));
                        let targetLng = parseFloat(el.getAttribute('data-lng'));
                        const address = el.getAttribute('data-address');

                        // 如果沒有經緯度，嘗試利用 OSM (Nominatim) 即時將地址轉為座標
                        if ((isNaN(targetLat) || isNaN(targetLng)) && address) {
                            try {
                                let searchAddress = address;
                                if(!searchAddress.includes('市') && !searchAddress.includes('區')) {
                                    searchAddress = '桃園市龜山區 ' + searchAddress;
                                }
                                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                                const data = await response.json();
                                if (data && data.length > 0) {
                                    targetLat = parseFloat(data[0].lat);
                                    targetLng = parseFloat(data[0].lon);
                                    // 儲存起來避免重複查詢
                                    el.setAttribute('data-lat', targetLat);
                                    el.setAttribute('data-lng', targetLng);
                                }
                            } catch (e) {
                                console.error("座標換算失敗:", address);
                            }
                            // 為了遵守免費地圖 API 限制，每次查詢間隔 1 秒
                            await new Promise(r => setTimeout(r, 1000));
                        }

                        // 如果成功取得座標，計算距離與車程
                        if (!isNaN(targetLat) && !isNaN(targetLng)) {
                            const dist = calculateDistance(userLat, userLng, targetLat, targetLng);
                            let estimatedMins = Math.round((dist / 30) * 60 + 5);
                            if(estimatedMins < 2) estimatedMins = 2;
                            el.innerHTML = `<i class="fa-solid fa-car-side"></i> 車程約 ${estimatedMins} 分鐘`;
                            el.classList.replace('text-gray-400', 'text-themePurple');
                        } else {
                            el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 無法估算車程`;
                            el.classList.replace('text-themePurple', 'text-gray-400');
                        }
                    }
                }, function(error) {
                    timeElements.forEach(el => {
                        el.innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> 未授權定位 (無法估算)`;
                        el.classList.replace('text-themePurple', 'text-gray-400');
                    });
                });
            } else {
                timeElements.forEach(el => {
                    el.innerHTML = `<i class="fa-solid fa-car-side"></i> 瀏覽器不支援定位`;
                });
            }
        }

        // CSV 解析器 (支援引號內換行與逗號)
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            // 過濾掉全空的列
            return ret.filter(r => r.join('').trim() !== '');
        }

        let globalFoodData = null; // 快取試算表資料

        // ==========================================
        // 🍿 美食販賣部 (Food) 相關函數
        // ==========================================
        function loadSharedFoodData() {
            return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點') || k.includes('網址')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                        let finalImg = rawImg.startsWith('http') ? rawImg : '';
                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx] : '',
                            img: finalImg,
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK'
                        };
                    }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(reject);
            });
        }

                if(cat.includes('飯') || cat.includes('麵') || cat.includes('正餐') || cat.includes('主食')) icon = '🍱';
                if(cat.includes('咖啡') || cat.includes('甜點') || cat.includes('飲料') || cat.includes('冰')) icon = '☕';
                if(cat.includes('小吃') || cat.includes('宵夜') || cat.includes('炸')) icon = '🍗';

        async function updateFoodMap(address, name, preLat, preLng) {

            overlay.style.display = 'flex';
            
            if(centerMarker) {
                centerMarker.classList.remove('opacity-100');
                centerMarker.classList.add('opacity-0');
            }

            const zoomToLocation = (lat, lon) => {
                // 動態更新 uMap iframe 的 src，並利用 hash 控制視角放大 (Zoom level 18)
                const baseUrl = "https://umap.openstreetmap.fr/zh-tw/map/a7_1366788";
                const params = "?scaleControl=false&miniMap=false&scrollWheelZoom=true&zoomControl=true&allowEdit=false&moreControl=true&searchControl=null&tilelayersControl=null&embedControl=null&datalayersControl=true&onLoadPanel=none&captionBar=false";
                iframe.src = `${baseUrl}${params}#18/${lat}/${lon}`;
                
                // 短暫延遲後隱藏遮罩，並顯示中心紅色 Marker 標記定位點
                setTimeout(() => {
                    overlay.style.display = 'none';
                    if(centerMarker) {
                        // 1. 設定小氣泡文字為店家名稱
                        const markerNameEl = document.getElementById('food-marker-name');
                        if (markerNameEl) markerNameEl.innerText = name;
                        
                        // 2. 顯示紅色地標與名稱氣泡
                        centerMarker.classList.remove('opacity-0');
                        centerMarker.classList.add('opacity-100');
                        
                        // 3. 設定 3 秒後自動隱藏，並清除舊的計時器避免干擾
                        if (foodMapMarkerTimeout) clearTimeout(foodMapMarkerTimeout);
                        foodMapMarkerTimeout = setTimeout(() => {
                            centerMarker.classList.remove('opacity-100');
                            centerMarker.classList.add('opacity-0');
                        }, 3000);
                    }
                }, 800);
            };

            try {
                // 若表單有提供座標，優先使用表單的座標
                if (preLat && preLng && !isNaN(preLat) && !isNaN(preLng)) {
                    zoomToLocation(preLat, preLng);
                    return;
                }

                // 否則，利用地址解析
                let searchAddress = address;
                if(!searchAddress.includes('市') && !searchAddress.includes('區')) {
                    searchAddress = '桃園市龜山區 ' + searchAddress;
                }

                // 使用 Nominatim API 取得經緯度
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    zoomToLocation(parseFloat(data[0].lat), parseFloat(data[0].lon));
                } else {
                    // 若 OSM 找不到該精確地址，顯示提示
                    overlayText.innerHTML = `地圖無法精確定位此地址<br><span class="text-xs text-gray-400 mt-1">${address}</span>`;
                    overlayText.className = "text-sm font-bold text-red-400 text-center";
                    setTimeout(() => {
                        overlay.style.display = 'none';
                    }, 2000);
                }
            } catch (error) {
                console.error("OSM Geocoding error:", error);
                overlayText.innerText = `地圖服務暫時無法連線`;
                overlayText.className = "text-sm font-bold text-red-400";
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 2000);
            }
        }


        // ==========================================
        // 🛍️ 購物、生活與景點共用資料模組 (Shopping)
        // ==========================================
        function loadSharedShoppingData() {
            return new Promise((resolve, reject) => {
                if (globalShoppingData) {
                    resolve(globalShoppingData);
                    return;
                }
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1279676556&single=true&output=csv';

                fetch(csvUrl)
                    .then(res => res.text())
                    .then(csvText => {
                        const rows = parseCSV(csvText);
                        if (rows.length < 2) {
                            globalShoppingData = [];
                            resolve(globalShoppingData);
                            return;
                        }

                        const headers = rows[0];
                        let nameIdx = headers.findIndex(k => k.includes('店') || k.includes('名'));
                        if (nameIdx === -1) nameIdx = 1; 
                        
                        let catIdx = headers.findIndex(k => k === '生活分類' || k.includes('生活分類'));
                        if (catIdx === -1) catIdx = 6; 

                        let addressIdx = headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點'));
                        let statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                        let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')); // 抓取照片

                        let parsedData = rows.slice(1).map(row => {
                            let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                            let finalImg = rawImg.startsWith('http') ? rawImg : '';

                            return {
                                name: row[nameIdx] || '未命名',
                                category: row[catIdx] || '未分類',
                                address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx] : '',
                                status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                                img: finalImg
                            };
                        }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                        globalShoppingData = parsedData.filter(item => {
                            if (statusIdx === -1) return true;
                            const s = String(item.status).toUpperCase().trim();
                            return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                        });

                        resolve(globalShoppingData);
                    })
                    .catch(err => reject(err));
            });
        }

        function fetchShoppingData() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;

            loadSharedShoppingData().then(data => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold py-8">目前沒有店家資料</div>';
                } else {
                    renderShoppingData(data, '全部');
                }
            }).catch(err => {
                console.error('CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8">資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderShoppingData(data, activeCategory = '全部') {
            const container = document.getElementById('shopping-list-container');
            const tagsContainer = document.getElementById('shopping-tags-container');
            if (!container) return;

            // --- 1. 渲染上方分類 TAG ---
            if (tagsContainer) {
                // 從全部資料中抓出唯一分類
                const allCategories = ['全部', ...new Set(globalShoppingData.map(item => item.category).filter(c => c))];
                
                tagsContainer.innerHTML = allCategories.map(cat => {
                    const isActive = cat === activeCategory;
                    
                    // 統一標籤的適應性佈局，取消個別差異
                    const activeClass = isActive 
                        ? 'bg-themeYellow text-white shadow-md scale-[1.02] md:scale-105 z-10' 
                        : 'bg-white text-gray-600 hover:bg-yellow-50 shadow-sm border-2 border-transparent hover:-translate-y-1';
                    
                    // 給予適合的圖示
                    let icon = '🛍️';
                    if(cat.includes('生鮮') || cat.includes('超市') || cat.includes('食品') || cat.includes('市場')) icon = '🛒';
                    if(cat.includes('居家') || cat.includes('寵物') || cat.includes('五金') || cat.includes('電器')) icon = '🏠';
                    if(cat.includes('服務') || cat.includes('洗') || cat.includes('美容') || cat.includes('修繕')) icon = '✂️';
                    if(cat === '全部') icon = '🎡';
                    
                    // 手機版根據內容自適應寬度 (flex-auto)，大螢幕維持一列 (lg:flex-1 或 flex-none)，文字加大，手機版隱藏 icon
                    return `<button onclick="renderShoppingData(globalShoppingData, '${cat.replace(/'/g, "\\'")}')" class="flex-auto lg:flex-1 w-auto py-3 px-3 md:px-5 rounded-xl md:rounded-2xl font-black text-base md:text-lg transition-all transform flex items-center justify-center gap-1 md:gap-2 border border-yellow-100 whitespace-nowrap ${activeClass}">
                                <span class="hidden md:inline-block shrink-0">${icon}</span>
                                <span>${cat}</span>
                            </button>`;
                }).join('');
            }

            // --- 2. 依照選中的分類過濾資料 ---
            const filteredData = activeCategory === '全部' ? data : data.filter(item => item.category === activeCategory);

            if (filteredData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有審核通過的店家喔！</div>';
                return;
            }

            // --- 3. 依生活分類群組化過濾後的資料，並渲染卡片 ---
            const groupedCategories = {};
            filteredData.forEach(item => {
                const cat = item.category || '未分類';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            // 為不同分類預備的可愛色彩池
            const stylePool = [
                { border: 'border-yellow-50', textBig: 'text-yellow-100', textTitle: 'text-themeYellow', icon: 'fa-cart-shopping', emoji: '🛒' },
                { border: 'border-blue-50', textBig: 'text-blue-100', textTitle: 'text-themeBlue', icon: 'fa-couch', emoji: '🏠' },
                { border: 'border-purple-50', textBig: 'text-purple-100', textTitle: 'text-themePurple', icon: 'fa-scissors', emoji: '✂️' },
                { border: 'border-green-50', textBig: 'text-green-100', textTitle: 'text-themeGreen', icon: 'fa-basket-shopping', emoji: '🛍️' },
                { border: 'border-pink-50', textBig: 'text-pink-100', textTitle: 'text-themePink', icon: 'fa-gift', emoji: '🎁' }
            ];

            let html = '';
            let styleIndex = 0;

            for (const [catName, items] of Object.entries(groupedCategories)) {
                // 智慧配對：依分類名稱關鍵字給予適合的顏色與圖示，若無則按順序取用
                let style;
                if (catName.includes('生鮮') || catName.includes('超市') || catName.includes('採買') || catName.includes('食品') || catName.includes('市場')) style = stylePool[0];
                else if (catName.includes('居家') || catName.includes('寵物') || catName.includes('五金') || catName.includes('電器')) style = stylePool[1];
                else if (catName.includes('服務') || catName.includes('洗') || catName.includes('寄') || catName.includes('修') || catName.includes('美容')) style = stylePool[2];
                else {
                    style = stylePool[3 + (styleIndex % 2)]; // 剩下的用綠色和粉色循環
                    styleIndex++;
                }

                // 產生該分類下的店家清單 HTML (包含地址與導航標籤)
                const itemsHtml = items.map(item => {
                    // 將地址或店名編碼，準備傳遞給 Google Maps 路線規劃 API
                    const navTarget = encodeURIComponent((item.address && item.address.trim() !== '') ? item.address : item.name);
                    
                    return `
                        <li class="flex items-center justify-between bg-gray-50 p-3 rounded-xl hover:bg-white hover:shadow-sm transition-all group">
                            <!-- 左側：店名與地址 -->
                            <div class="flex items-start flex-1 overflow-hidden pr-2">
                                <i class="fa-solid fa-check text-green-400 mr-2 mt-1 shrink-0 group-hover:scale-125 transition-transform"></i> 
                                <div class="flex flex-col overflow-hidden">
                                    <span class="font-bold text-gray-800 line-clamp-1">${item.name}</span>
                                    ${item.address ? `<span class="text-xs text-gray-500 mt-0.5 line-clamp-2"><i class="fa-solid fa-location-dot mr-1 text-gray-300"></i>${item.address}</span>` : ''}
                                </div>
                            </div>
                            
                            <!-- 右側：Google 地圖導航按鈕 -->
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${navTarget}" target="_blank" title="導航至 ${item.name}" class="shrink-0 bg-blue-100 text-blue-600 hover:bg-blue-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-black transition-colors shadow-sm flex items-center gap-1.5 z-10 cursor-pointer">
                                <i class="fa-solid fa-location-arrow"></i> 導航
                            </a>
                        </li>
                    `;
                }).join('');

                // 產生該分類的大卡片 HTML
                // 外層加入 h-full 與 flex-col 確保同排等高；內層清單加入自動適應欄位
                html += `
                    <div class="bg-white rounded-[2rem] p-6 shadow-cute border-4 ${style.border} relative h-full flex flex-col">
                        <div class="absolute -top-5 -right-5 text-6xl ${style.textBig} floating"><i class="fa-solid ${style.icon}"></i></div>
                        <h3 class="text-xl font-black ${style.textTitle} mb-4 relative z-10 shrink-0">${style.emoji} ${catName}</h3>
                        
                        <!-- 內層店家清單：當外層卡片變寬時，自動變成多欄排列 -->
                        <ul class="grid grid-cols-1 sm:grid-cols-[repeat(auto-fit,minmax(240px,1fr))] gap-3 font-bold text-gray-600 relative z-10 flex-1 content-start">
                            ${itemsHtml}
                        </ul>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function loadSharedCommunityData() {
            return new Promise((resolve, reject) => {
                if (globalCommunityData) return resolve(globalCommunityData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('社群'));
                    if (nameIdx === -1) nameIdx = 0;
                    let catIdx = headers.findIndex(k => k.includes('屬性') || k.includes('分類'));
                    if (catIdx === -1) catIdx = 1;
                    let linkIdx = headers.findIndex(k => k.includes('連結') || k.includes('網址') || k.includes('URL'));
                    if (linkIdx === -1) linkIdx = 2;

                    let parsedData = rows.slice(1).map(row => {
                        return {

                            category: row[catIdx] ? row[catIdx].trim() : '其他推薦',
                            link: row[linkIdx] ? row[linkIdx].trim() : '#'
                        };
                    }).filter(item => item.name !== '' && item.link !== '#');

                    globalCommunityData = parsedData;
                    resolve(globalCommunityData);
                }).catch(reject);

        // --- 探索在地A7：建案分佈模組 ---
        function loadSharedBuildingData() {
            return new Promise((resolve, reject) => {
                if (globalBuildingData) return resolve(globalBuildingData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=985024788&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('建案') || k.includes('名稱'));
                    if (nameIdx === -1) nameIdx = 0; 
                    let villageIdx = headers.findIndex(k => k.includes('里'));
                    if (villageIdx === -1) villageIdx = 1;
                    let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                    if (imgIdx === -1) imgIdx = 3; // D column fallback

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            village: row[villageIdx] ? row[villageIdx].trim() : '未分類區域',
                            img: row[imgIdx] ? row[imgIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalBuildingData = parsedData;
                    resolve(globalBuildingData);
                }).catch(reject);
            });
        }

        function fetchBuildingData() {
            const container = document.getElementById('buildings-list-container');
            if (!container) return;

            loadSharedBuildingData().then(data => {
                renderBuildingData(data);
            }).catch(err => {
                console.error('Building CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8 bg-white rounded-3xl">建案資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderBuildingData(data) {
            const container = document.getElementById('buildings-list-container');
            const tagsContainer = document.getElementById('village-tags-container'); // 新增：抓取標籤容器
            if (!container) return;

            const groupedVillages = {};
            data.forEach(item => {
                const village = item.village;
                if (!groupedVillages[village]) groupedVillages[village] = [];
                groupedVillages[village].push(item);
            });

            // == 依照地圖照片顏色綁定各里別的專屬色彩 ==
            // 由於 2026 年行政里調整，這裡將文青、樂善、文桃、善捷、牛角坡、長庚等里別，
            // 嚴格配置專屬的 Tailwind 色系，以精準對應上方地圖照片的區塊顏色。
            const fallbackPool = [
                { border: 'border-gray-200', textTitle: 'text-gray-600', icon: 'fa-map', bg: 'bg-gray-50', iconColor: 'text-gray-200', activeIcon: 'text-gray-400', hoverBg: 'hover:bg-gray-50' },
                { border: 'border-teal-200', textTitle: 'text-teal-600', icon: 'fa-location-dot', bg: 'bg-teal-50', iconColor: 'text-teal-200', activeIcon: 'text-teal-500', hoverBg: 'hover:bg-teal-50' }
            ];
            let fallbackStyleIndex = 0;

            function getStyleForVillage(name) {
                if (name.includes('文青')) return { border: 'border-pink-200', textTitle: 'text-themePink', icon: 'fa-building', bg: 'bg-pink-50', iconColor: 'text-pink-200', activeIcon: 'text-themePink', hoverBg: 'hover:bg-pink-50' };
                if (name.includes('樂善')) return { border: 'border-green-200', textTitle: 'text-themeGreen', icon: 'fa-tree', bg: 'bg-green-50', iconColor: 'text-green-200', activeIcon: 'text-themeGreen', hoverBg: 'hover:bg-green-50' };
                if (name.includes('文桃')) return { border: 'border-blue-200', textTitle: 'text-themeBlue', icon: 'fa-city', bg: 'bg-blue-50', iconColor: 'text-blue-200', activeIcon: 'text-themeBlue', hoverBg: 'hover:bg-blue-50' };
                if (name.includes('善捷')) return { border: 'border-yellow-300', textTitle: 'text-yellow-600', icon: 'fa-house-chimney', bg: 'bg-yellow-50', iconColor: 'text-yellow-300', activeIcon: 'text-yellow-500', hoverBg: 'hover:bg-yellow-50' };
                if (name.includes('牛角坡')) return { border: 'border-purple-200', textTitle: 'text-themePurple', icon: 'fa-map-pin', bg: 'bg-purple-50', iconColor: 'text-purple-200', activeIcon: 'text-themePurple', hoverBg: 'hover:bg-purple-50' };
                if (name.includes('長庚')) return { border: 'border-orange-200', textTitle: 'text-orange-500', icon: 'fa-hospital', bg: 'bg-orange-50', iconColor: 'text-orange-200', activeIcon: 'text-orange-500', hoverBg: 'hover:bg-orange-50' };
                
                // 找不到對應里別時，使用備用色彩輪替
                const style = fallbackPool[fallbackStyleIndex % fallbackPool.length];
                fallbackStyleIndex++;
                return style;
            }

            let html = '';
            let tagsHtml = ''; // 準備標籤的 HTML

            for (const [villageName, items] of Object.entries(groupedVillages)) {
                const style = getStyleForVillage(villageName);
                
                // 產生安全且唯一的 ID 供錨點跳轉使用
                const safeId = `village-${villageName.replace(/\s+/g, '')}`;

                // 生成各里的快速跳轉標籤 (適應大小螢幕的精緻選單按鈕樣式)
                tagsHtml += `
                    <button onclick="document.getElementById('${safeId}').scrollIntoView({behavior: 'smooth', block: 'start'})"
                            class="px-2 md:px-4 py-2.5 md:py-3 bg-white border-2 ${style.border} ${style.textTitle} font-black rounded-xl md:rounded-2xl ${style.hoverBg} transition-all shadow-sm text-xs md:text-base flex items-center gap-2 md:gap-3 hover:-translate-y-1 w-full text-left group">
                        <div class="w-6 h-6 md:w-8 md:h-8 rounded-full ${style.bg} flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                            <i class="fa-solid ${style.icon} text-[10px] md:text-sm"></i>
                        </div>
                        <span class="truncate flex-1">${villageName}</span>
                        <i class="fa-solid fa-chevron-right text-gray-300 group-hover:${style.textTitle} transition-colors text-[10px] md:text-xs"></i>
                    </button>
                `;

                const itemsHtml = items.map(item => {
                    let imgContent = '';
                    if (item.img && item.img.startsWith('http')) {
                        imgContent = `<img src="${item.img}" class="w-full h-full object-cover" alt="${item.name}">`;
                    } else {
                        imgContent = `<i class="fa-solid ${style.icon} ${style.iconColor} text-2xl"></i>`;
                    }

                    return `
                    <div class="${style.bg} p-2 rounded-2xl border border-white shadow-sm flex items-center gap-3 hover:-translate-y-1 transition-transform cursor-default">
                        <div class="w-12 h-12 shrink-0 rounded-xl overflow-hidden bg-white flex items-center justify-center border border-gray-100 shadow-inner">
                            ${imgContent}
                        </div>
                        <span class="font-bold text-gray-700 text-sm">${item.name}</span>
                    </div>
                    `;
                }).join('');

                // 在外層 div 加上 id，並加上 scroll-mt 確保被固定的 Navbar 擋住
                html += `
                    <div id="${safeId}" class="bg-white rounded-[2.5rem] shadow-cute p-6 border-4 ${style.border} hover:shadow-lg transition-shadow relative overflow-hidden scroll-mt-[100px]">
                        <div class="absolute -right-4 -bottom-4 text-6xl ${style.iconColor} opacity-50 pointer-events-none"><i class="fa-solid ${style.icon}"></i></div>
                        <div class="flex items-center justify-between mb-4 border-b-2 border-gray-100 pb-3 relative z-10">
                            <h3 class="text-xl font-black ${style.textTitle}">${villageName}</h3>
                            <i class="fa-solid ${style.icon} text-2xl ${style.activeIcon}"></i>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 relative z-10">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }
            
            // 渲染列表與標籤
            container.innerHTML = html;
            if (tagsContainer) {
                tagsContainer.innerHTML = tagsHtml;
            }
        }

    </script>
</body>
</html>
