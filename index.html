    <style>
        body {
            background-color: #FDFBF7;
            /* 融入機捷紫與可愛粉的雙色波卡圓點，加大間距與點點大小，溫和不密集 */
            background-image:
                radial-gradient(rgba(193, 151, 255, 0.35) 4px, transparent 4px),
                radial-gradient(rgba(255, 158, 187, 0.25) 4px, transparent 4px);
            background-size: 120px 120px;
            background-position: 0 0, 60px 60px;
        }

        /* 自訂可愛滾動條 (加入 height 以支援橫向滾動條) */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF9EBB;
            border-radius: 10px;
            border: 2px solid #FDFBF7;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff7eb3;
        }

        /* 在地新商家專屬橘色捲動條 */
        .scrollbar-orange::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        .scrollbar-orange::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-orange::-webkit-scrollbar-thumb {
            background: #FECF7A;
            border-radius: 10px;
            border: 2px solid #FDFBF7;
        }

        .scrollbar-orange::-webkit-scrollbar-thumb:hover {
            background: #FFD166;
        }

        /* 隱藏橫向滾動條(強制一列時使用) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 頁面切換動畫 */
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 標籤氣球動畫 */
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* 數字跳動的字體強調 */
        .num-counter {
            font-family: 'Nunito', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        /* --- Leaflet 客製化樣式 --- */
        .leaflet-popup-content-wrapper {
            border-radius: 1.5rem !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1) !important;
            padding: 4px !important;
        }

        .leaflet-popup-content {
            margin: 10px !important;
            font-family: 'Nunito', '"Noto Sans TC"', sans-serif;
        }

        /* 為 Leaflet Popup 關閉按鈕加上粉紅底圖與白色X (上移並靠右) */
        .leaflet-popup-close-button {
            top: 4px !important;
            right: 4px !important;
            color: white !important;
            background-color: #FF9EBB !important;
            border-radius: 50% !important;
            width: 24px !important;
            height: 24px !important;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2) !important;
            text-align: center !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }

        .leaflet-popup-close-button:hover {
            background-color: #ff7eb3 !important;
            color: white !important;
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }

        .marker-cluster-small,
        .marker-cluster-medium,
        .marker-cluster-large {
            background-color: rgba(255, 158, 187, 0.5) !important;
        }

        .marker-cluster-small div,
        .marker-cluster-medium div,
        .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important;
            color: white !important;
            font-family: 'Nunito', sans-serif !important;
            font-weight: 900 !important;
        }

        .custom-leaflet-icon-dynamic .fa-solid {
            margin-bottom: 2px;
            margin-right: 1px;
        }

        .leaflet-tooltip.custom-tooltip {
            background-color: white;
            color: #FF9EBB;
            font-weight: 900;
            border-radius: 0.5rem;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 4px 10px;
            font-family: 'Nunito', '"Noto Sans TC"', sans-serif;
        }

        .leaflet-tooltip.custom-tooltip::before {
            border-top-color: white;
        }

        /* 水滴圖標動畫 */
        .floating-marker {
            animation: floatMarker 2.5s ease-in-out infinite;
        }

        @keyframes floatMarker {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* 恢復圖標彈跳動畫 */
        .bounce-marker {
            animation: bounceMarker 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        }

        @keyframes bounceMarker {
            0% {
                transform: translateY(0px) scale(1, 1);
            }

            45% {
                transform: translateY(-12px) scale(0.95, 1.05);
            }

            100% {
                transform: translateY(0px) scale(1, 1);
            }
        }

        /* 恢復愛心動畫 */
        @keyframes heartBeat {
            0% {
                transform: scale(1);
            }

            14% {
                transform: scale(1.35);
            }

            28% {
                transform: scale(1);
            }

            42% {
                transform: scale(1.35);
            }

            70% {
                transform: scale(1);
            }

            100% {
                transform: scale(1);
            }
        }

        .heart-beat-active {
            animation: heartBeat 0.8s ease-in-out infinite;
        }

        /* --- 💎 奢華手搖飲大賞專屬特效 --- */

        .selection-ticket {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid #FFF;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border-radius: 1.25rem;
        }

        .selection-ticket:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -10px rgba(255, 158, 187, 0.4);
            border-color: #FF9EBB;
        }

        .selection-ticket.selected {
            background: linear-gradient(135deg, #FFF5F7 0%, #FFE4E9 100%);
            border-color: #FF9EBB;
            box-shadow: 0 10px 20px -5px rgba(255, 158, 187, 0.3);
        }

        .rising-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            color: #FF4785;
            animation: riseAndFade 0.8s ease-out forwards;
        }

        @keyframes riseAndFade {
            0% {
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -150%) scale(1.5) rotate(20deg);
                opacity: 0;
            }
        }

        .gold-pulse {
            position: relative;
            z-index: 1;
        }

        .gold-pulse::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -4px;
            bottom: -4px;
            left: -4px;
            background: linear-gradient(45deg, #FF9EBB, #FFD166, #FF9EBB);
            background-size: 200% 200%;
            z-index: -1;
            border-radius: 1.25rem;
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s;
            animation: shimmer 2s linear infinite;
        }

        .gold-pulse:not(:disabled)::after {
            opacity: 0.6;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }




        @keyframes flyUpFade {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-60px) scale(1.5) rotate(15deg);
                opacity: 0;
            }
        }

        .flying-heart {
            position: fixed;
            pointer-events: none;
            animation: flyUpFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            color: #FF4785;
            font-size: 1.5rem;
            z-index: 9999;
            text-shadow: 0 4px 8px rgba(255, 71, 133, 0.3);
        }

        /* 🎰 拉霸機特製動畫 */
        @keyframes bounce-x {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-4px);
            }
        }

        .animate-bounce-x {
            animation: bounce-x 1s infinite ease-in-out;
        }

        @keyframes scan-line {
            0% {
                top: 0%;
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        .animate-scan {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #FF9EBB, transparent);
            animation: scan-line 2s linear infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
    </style>
</head>

            const menu = document.getElementById('mobile-menu');
            if (menu) {
                menu.classList.toggle('hidden');
                menu.classList.toggle('flex');
            }
        }

        // 用於存放全域 setInterval 以便切換頁面時清除
        let globalMrtInterval = null;
        let globalMrtFetchInterval = null;

        // 初始化與路由監聽 
        document.addEventListener('DOMContentLoaded', () => {
            handleRoute();
        });

        window.addEventListener('hashchange', handleRoute);

        // 核心路由控制處理器
        function handleRoute(customRoute) {
            let hash = 'home';
            if (typeof customRoute === 'string') {
                hash = customRoute;
            } else {
                try {
                    hash = window.location.hash.substring(1) || 'home';
                } catch (e) {
                    hash = 'home';
                }
            }

            // 處理搜尋的特殊路由
            if (hash.startsWith('search=')) {
                const query = decodeURIComponent(hash.substring(7));
                renderPage('search');
                executeSearchLogic(query);
            } else if (hash === 'buildings' || hash === 'explore') {
                // 原本 explore 頁面的錨點或路由，直接導向新的獨立頁面
                window.location.href = 'explore.html' + (hash === 'buildings' ? '#buildings' : '');
            } else if (hash === 'school') {
                // 特殊錨點路由：切換到外部生活通頁面並定位
                window.location.href = 'lifehub.html#school';
            } else if (hash === 'food-gacha') {
                renderPage('home');
                document.title = 'A7 柒樂部🎡｜美食隨機輪盤';
                setTimeout(() => {
                    const gachaEl = document.getElementById('food-gacha');
                    if (gachaEl) {
                        gachaEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        gachaEl.classList.add('ring-4', 'ring-themePink', 'ring-offset-4', 'transition-shadow', 'duration-500');
                        setTimeout(() => gachaEl.classList.remove('ring-4', 'ring-themePink', 'ring-offset-4'), 2500);
                    }
                }, 350);
            } else {
                renderPage(hash);
            }
        }

        // 修改原本的 loadPage，改為推播網址 Hash
        function loadPage(pageId) {
            try {
                history.pushState(null, '', '#' + pageId);
            } catch (e) {
            }
            handleRoute(pageId);
        }

                    });

                root.innerHTML = '';

                // 4. 複製 Template 內容並注入
                root.appendChild(template.content.cloneNode(true));

                if (pageId === 'home') {
                    setTimeout(() => {

        function doSearch() {

        async function executeSearchLogic(query) {
            const display = document.getElementById('search-query-display');
            const container = document.getElementById('search-results-container');
            if (display) display.innerHTML = `正在為您尋找與 <span class="text-themePink font-black">「${query}」</span> 相關的樂園角落...`;

            document.title = `A7 柒樂部🎡｜搜尋結果: ${query}`;
            if (typeof gtag === 'function') {
                gtag('event', 'search', { search_term: query });
                gtag('event', 'page_view', {
                    page_title: document.title,
                    page_location: window.location.href,
                    page_path: '/search?q=' + encodeURIComponent(query)
                });
            }

            try {
                // 等待所有資料庫完整載入 (全面整合搜尋資料)
                const results = await Promise.all([
                    loadSharedFoodData(),
                    loadSharedShoppingData(),
                    loadSharedCommunityData(),
                    loadSharedBuildingData(),
                    loadSharedMedicalData(),
                    loadSharedEducationData(),
                    loadSharedLikesData()
                ]);

                const foodData = Array.isArray(results[0]) ? results[0] : [];
                const shoppingData = Array.isArray(results[1]) ? results[1] : [];
                const communityData = Array.isArray(results[2]) ? results[2] : [];
                const buildingData = Array.isArray(results[3]) ? results[3] : [];
                const medicalData = Array.isArray(results[4]) ? results[4] : [];
                const educationData = Array.isArray(results[5]) ? results[5] : [];
                const likesData = results[6] || {};

                const q = query.toLowerCase();
                const safeQ = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

                // 新增：動態抓取並搜尋 explore.html 靜態內容
                let exploreSnippet = null;
                let exploreLinkTarget = `explore.html?search=${encodeURIComponent(query)}`;
                try {
                    const res = await fetch('explore.html');
                    if (res.ok) {
                        const htmlText = await res.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlText, 'text/html');
                        doc.querySelectorAll('script, style, nav, footer, header, svg').forEach(el => el.remove());
                        const walkDOM = (node) => {
                            if (exploreSnippet) return;
                            if (node.nodeType === Node.TEXT_NODE) {
                                const text = node.textContent.trim();
                                if (text.toLowerCase().includes(q) && text.length > 1) {
                                    const matchIdx = text.toLowerCase().indexOf(q);
                                    const startIndex = Math.max(0, matchIdx - 25);
                                    const endIndex = Math.min(text.length, matchIdx + q.length + 25);
                                    let snippet = text.substring(startIndex, endIndex);
                                    if (startIndex > 0) snippet = '...' + snippet;
                                    if (endIndex < text.length) snippet = snippet + '...';
                                    const regex = new RegExp(`(${safeQ})`, 'gi');
                                    exploreSnippet = snippet.replace(regex, '<span class="bg-purple-200 text-purple-700 px-1 rounded font-black">$1</span>');
                                    let parent = node.parentElement;
                                    let targetTab = 'overview';
                                    while (parent && parent.tagName !== 'BODY') {
                                        if (parent.hasAttribute('data-shows-on')) {
                                            const showsOnTabs = parent.getAttribute('data-shows-on').split(',');
                                            if (showsOnTabs.length === 1 && showsOnTabs[0] !== 'overview') {
                                                targetTab = showsOnTabs[0];
                                            } else {
                                                const nonOverviewTab = showsOnTabs.find(tab => tab !== 'overview');
                                                targetTab = nonOverviewTab || showsOnTabs[0];
                                            }
                                            break;
                                        }
                                        parent = parent.parentElement;
                                    }
                                    exploreLinkTarget = `explore.html?search=${encodeURIComponent(query)}#${targetTab}`;
                                }
                            } else if (node.tagName === 'TEMPLATE') {
                                walkDOM(node.content);
                            } else {
                                for (let child of node.childNodes) walkDOM(child);
                            }

        // --- 共享資料載入函式 (新增) ---
        async function loadSharedMedicalData() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) return [];
                const headers = rows[0];
                let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構'));
                if (nameIdx === -1) nameIdx = 0;
                let catIdx = headers.findIndex(k => k.includes('醫療分類'));
                if (catIdx === -1) catIdx = headers.length > 8 ? 8 : headers.length - 1;
                const addressIdx = headers.findIndex(k => k.includes('地址'));
                return rows.slice(1).map(row => ({
                    name: row[nameIdx]?.trim() || '',
                    category: row[catIdx]?.trim() || '其他醫療',
                    address: addressIdx !== -1 ? row[addressIdx]?.trim() : ''
                })).filter(item => item.name);
            } catch (e) { return []; }
        }

        async function loadSharedEducationData() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=530207071&single=true&output=csv';
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText);
                if (!rows || rows.length === 0) return [];
                const headers = rows[0];
                const nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構')) === -1 ? 1 : headers.findIndex(k => k.includes('名稱') || k.includes('機構'));
                const catIdx = headers.findIndex(k => k.includes('分類') || k.includes('屬性')) === -1 ? 2 : headers.findIndex(k => k.includes('分類') || k.includes('屬性'));
                const addressIdx = headers.findIndex(k => k.includes('地址'));
                return rows.slice(1).map(row => ({
                    name: row[nameIdx]?.trim() || '',
                    category: catIdx !== -1 ? (row[catIdx]?.trim() || '綜合教育') : '綜合教育',
                    address: addressIdx !== -1 ? row[addressIdx]?.trim() : ''
                })).filter(item => item.name);
            } catch (e) { return []; }
        }

        // --- 清理便利商店品牌前綴 ---
        function getCleanStoreName(name, category) {
            if (!name) return name;
            if (name.includes('蝦皮')) {
                return name.replace(/^(蝦皮店到店|蝦皮)\s*[-－]?\s*/i, '').trim();
            }
            if (category && category.includes('便利')) {
                return name.replace(/^(7-ELEVEN|7-11|全家便利商店|全家|萊爾富便利商店|萊爾富|OK便利商店|OK MART)\s*[-－]?\s*/i, '').trim();
            }
            return name;
        }

        // --- 機捷動態更新與渲染 ---
        window.updateMRTStatus = function () {
            const nbEls = document.querySelectorAll('.mrt-time-north');
            const sbEls = document.querySelectorAll('.mrt-time-south');
            if (nbEls.length === 0 || !window.mrtBaseData) return;

            const now = new Date();
            const elapsedMin = (now.getTime() - window.mrtBaseData.timestamp) / 60000;

            let nDiff = window.mrtBaseData.n !== null ? window.mrtBaseData.n - elapsedMin : null;
            let sDiff = window.mrtBaseData.s !== null ? window.mrtBaseData.s - elapsedMin : null;

            if (nDiff !== null) { while (nDiff < -1) nDiff += 15; }
            if (sDiff !== null) { while (sDiff < -1) sDiff += 15; }

            const updateText = (els, diff, unitClass, isNorth) => {
                els.forEach(el => {
                    const unitEl = el.parentElement.querySelector('.' + unitClass);
                    if (diff === null || isNaN(diff)) {
                        el.innerText = '--';
                        el.className = isNorth
                            ? 'mrt-time-north text-2xl sm:text-4xl font-black text-purple-600 font-mono w-8 sm:w-10 text-center'
                            : 'mrt-time-south text-2xl sm:text-4xl font-black text-white font-mono w-8 sm:w-10 text-center';
                        if (unitEl) unitEl.style.display = 'inline';
                    } else if (diff <= 0 && diff >= -1) {
                        el.innerText = '進站中';
                        el.className = isNorth
                            ? 'mrt-time-north text-xl sm:text-3xl font-black text-red-500 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest'
                            : 'mrt-time-south text-xl sm:text-3xl font-black text-red-300 animate-pulse mt-1.5 drop-shadow-sm w-full text-center tracking-widest';
                        if (unitEl) unitEl.style.display = 'none';
                    } else {
                        el.innerText = Math.max(0, Math.ceil(diff));
                        el.className = isNorth
                            ? 'mrt-time-north text-2xl sm:text-4xl font-black text-purple-600 font-mono w-8 sm:w-10 text-center'
                            : 'mrt-time-south text-2xl sm:text-4xl font-black text-white font-mono w-8 sm:w-10 text-center';
                        if (unitEl) unitEl.style.display = 'inline';
                    }
                });
            };

            updateText(nbEls, nDiff, 'mrt-unit-north', true);
            updateText(sbEls, sDiff, 'mrt-unit-south', false);

            const renderTrack = (containerId) => {
                const trackEl = document.getElementById(containerId);
                if (trackEl) {
                    let html = '';
                    if (nDiff !== null && nDiff <= 15) {
                        let pos = 50 + (nDiff * (50 / 10));
                        pos = Math.max(0, Math.min(100, pos));
                        html += `<div class="absolute top-[0px] -translate-x-1/2 z-20 transition-all duration-1000" style="left:${pos}%"><div class="bg-white text-purple-600 rounded-full shadow-md border-2 border-purple-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-caret-left text-[10px]"></i><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i></div></div>`;
                    }
                    if (sDiff !== null && sDiff <= 15) {
                        let pos = 50 - (sDiff * (50 / 10));
                        pos = Math.max(0, Math.min(100, pos));
                        html += `<div class="absolute top-[16px] sm:top-[26px] -translate-x-1/2 z-20 transition-all duration-1000" style="left:${pos}%"><div class="bg-purple-500 sm:bg-purple-700 text-white rounded-full shadow-md border-2 border-white flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse" style="animation-delay: 0.5s;"><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i><i class="fa-solid fa-caret-right text-[10px]"></i></div></div>`;
                    }
                    trackEl.innerHTML = html;
                }
            };

            renderTrack('mrt-track-container-transit');
            renderTrack('mrt-track-container-overview');
        };

        // UI 渲染：建立詳細列表中的公車卡片
        function createTransitCard(route, destination, timeStatus, type, stopName = '捷運體育大學站') {
            let statusClass = "bg-gray-100 text-gray-500 border-gray-200";
            let timeText = String(timeStatus);
            let timeTextClass = "text-xl sm:text-2xl flex items-baseline justify-center gap-0.5 font-sans";

            if (timeText === '即將進站' || timeText === '進站中' || timeText === '0分' || timeText === '1分') {
                statusClass = "bg-red-500 text-white border-red-600 shadow-md animate-pulse";
                timeText = "即將進站";
                timeTextClass = "text-sm sm:text-lg font-black tracking-widest font-sans";
            } else if (timeText.includes('分')) {
                const minutes = parseInt(timeText.replace('分', ''));
                if (minutes <= 5) statusClass = "bg-orange-500 text-white border-orange-600 shadow-sm";
                else statusClass = "bg-emerald-50 text-emerald-600 border-emerald-200";
                timeText = `<span class="text-2xl sm:text-3xl font-black font-mono">${minutes}</span><span class="text-xs sm:text-sm font-bold font-sans">分</span>`;
            } else {
                statusClass = "bg-gray-200 text-gray-400 border-gray-300";
                timeTextClass = "text-xs sm:text-sm font-bold tracking-widest font-sans";
            }

            return `
                <div class="flex items-center justify-between p-3 sm:p-4 bg-gray-50 hover:bg-white rounded-xl border-2 border-gray-100 hover:border-gray-200 transition-colors w-full">
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 flex-1 min-w-0 pr-2">

        // --- 交通轉乘：改用 GAS 雲端 API ---
        async function fetchRealtimeTransitData() {
            const refreshIcon = document.getElementById('transit-refresh-icon');
            if (refreshIcon) refreshIcon.classList.add('fa-spin');

            const GAS_URL = "https://script.google.com/macros/s/AKfycbw0t0lUbxn6MV30sK75uGCNz6y_paQzQHtTvyFBpVd-uuPIAJ3op--wkv9TI6EjuGUxWw/exec";

            const generateStaticMrtTimes = (schedule) => {
                const now = new Date();
                const totalCurrentSecs = now.getMinutes() * 60 + now.getSeconds();
                let nextTotalSecs = schedule.map(m => m * 60).find(s => s >= totalCurrentSecs);
                if (nextTotalSecs === undefined) nextTotalSecs = (60 + schedule[0]) * 60;
                const result = (nextTotalSecs - totalCurrentSecs) / 60;
                return Math.max(0, result - 1);
            };

            try {
                const response = await fetch(GAS_URL, { redirect: "follow" });
                const res = await response.json();
                const now = new Date();
                const rawData = res.data || res;

                const parseSafeArray = (key) => {
                    let val = rawData[key];
                    if (!val) return [];
                    if (typeof val === 'string') {
                        try { val = JSON.parse(val); } catch (e) { return []; }
                    }
                    return Array.isArray(val) ? val : [];
                };

                const mrtA7Data = parseSafeArray('mrt_A7');
                const busTaoyuanData = parseSafeArray('bus_Taoyuan');
                const busNewTaipeiData = parseSafeArray('bus_NewTaipei');

                const getClosestMrt = (dirFilter) => {
                    const trains = mrtA7Data.filter(dirFilter);
                    if (!trains.length) return undefined;
                    const times = trains.map(t => {
                        const val = t.CountDownTime !== undefined ? t.CountDownTime : t.EstimateTime;
                        return parseFloat(val);
                    }).filter(t => !isNaN(t));
                    if (!times.length) return undefined;
                    return Math.min(...times);
                };

                let northMrt = getClosestMrt(m => String(m.Direction) === "0" || (m.direction && m.direction.includes("北上")));
                let southMrt = getClosestMrt(m => String(m.Direction) === "1" || (m.direction && m.direction.includes("南下")));

                if (northMrt === undefined) northMrt = generateStaticMrtTimes([2, 17, 32, 47]);
                if (southMrt === undefined) southMrt = generateStaticMrtTimes([0, 15, 30, 45]);

                const getStatusText = (status) => {
                    if (status === 1) return '尚未發車';
                    if (status === 2) return '交管不停靠';
                    if (status === 3) return '末班已過';
                    if (status === 4) return '今日未營運';
                    return '未發車';
                };

                const allBuses = [...busTaoyuanData, ...busNewTaipeiData].map(b => ({
                    route: b.RouteName?.Zh_tw || b.RouteName || b.route || "未知路線",
                    status: b.EstimateTime !== undefined ? Math.floor(b.EstimateTime / 60) : (b.StopStatus !== undefined ? getStatusText(b.StopStatus) : "未發車"),
                    stopName: b.StopName?.Zh_tw || b.StopName || b.stop || "",
                    direction: b.Direction !== undefined ? b.Direction : -1
                }));

                window.gasTransitCache = {
                    isFallback: false,
                    timestamp: now.getTime(),
                    updateTime: rawData.updateTime ? new Date(rawData.updateTime).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false }) : now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false }),
                    mrtA7: { north: northMrt, south: southMrt },
                    buses: allBuses
                };
            } catch (err) {
                console.warn("※ GAS 連線或格式錯誤:", err.message);
                window.gasTransitCache = {
                    isFallback: true,
                    timestamp: Date.now(),
                    updateTime: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false }) + ' (備援模式)',
                    mrtA7: {
                        north: generateStaticMrtTimes([2, 17, 32, 47]),
                        south: generateStaticMrtTimes([0, 15, 30, 45])
                    },
                    buses: []
                };
                window.gasTransitCache.errorMsg = err.message;
            } finally {
                if (window.gasTransitCache) {
                    const parseMrtTime = (val) => {
                        const m = parseFloat(val);
                        if (!isNaN(m)) return m;
                        return null;
                    };
                    window.mrtBaseData = {
                        timestamp: window.gasTransitCache.timestamp,
                        n: parseMrtTime(window.gasTransitCache.mrtA7.north),
                        s: parseMrtTime(window.gasTransitCache.mrtA7.south)
                    };
                    renderAllTransit();
                }
                if (refreshIcon) refreshIcon.classList.remove('fa-spin');
            }
        }

                const activeBuses = allResolvedBuses.filter(b => b.isActive);
let displayBuses = activeBuses;

// 1. 已經移除強制補齊 3 筆「未發車」的邏輯

        function animateSingleCounter(counter, target) {
            const duration = 2000;
            const frameRate = 1000 / 60;
            const totalFrames = Math.round(duration / frameRate);
            let currentFrame = 0;

            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);

            const updateCounter = () => {
                currentFrame++;
                const progress = easeOutExpo(currentFrame / totalFrames);
                const currentVal = Math.round(target * progress);
                counter.innerText = currentVal;

                if (currentFrame < totalFrames) {
                    requestAnimationFrame(updateCounter);
                } else {
                    counter.innerText = target;
                }
            };

            counter.innerText = '0';
            requestAnimationFrame(updateCounter);
        }

        // --- 景點車程計算邏輯 ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // CSV 解析器
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        window.focusNearestStore = function (safeCatId, catName, storeName, lat, lng, doFly = true) {
            const map = window.nearestMaps[safeCatId];
            const markersMap = window.nearestMarkersMap[safeCatId];
            if (!map || !markersMap) return;

            const marker = markersMap[storeName];
            if (!marker) return;

            if (map.activeNearestMarker && map.activeNearestMarker !== storeName && markersMap[map.activeNearestMarker]) {
                const prevMarker = markersMap[map.activeNearestMarker];
                if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                prevMarker.setIcon(getCategoryIcon(catName, map.activeNearestMarker, 'normal', false));
            }

            map.activeNearestMarker = storeName;

            if (doFly) {
                const targetZoom = 16;
                const pt = map.project([lat, lng], targetZoom);
                pt.y -= map.getSize().y / 4;
                const offsetLatLng = map.unproject(pt, targetZoom);

                map.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1 });
                map.once('moveend', () => {
                    marker.openPopup();
                });
            } else {
                marker.openPopup();
            }

            marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', true));

            if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
            marker.bounceTimeout = setTimeout(() => {
                if (markersMap[storeName] && map.activeNearestMarker === storeName) {
                    marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', false));
                }

        function loadSharedLikesData() {
            return new Promise((resolve) => {

                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    let likesMap = {};

                    if (rows.length > 1) {
                        const headers = rows[0];
                        const isLogFormat = headers.some(h => h.includes('時間')) && headers.some(h => h.includes('ID')) && headers.some(h => h.includes('店'));

                        if (isLogFormat) {
                            const userIdx = headers.findIndex(k => k.includes('ID') || k.includes('使用者'));
                            const storeIdx = headers.findIndex(k => k.includes('店'));
                            const actionIdx = headers.findIndex(k => k.includes('動作') || k.includes('狀態') || k.toLowerCase().includes('action'));

                            rows.slice(1).forEach(row => {
                                const storeName = row[storeIdx];
                                const userId = row[userIdx];
                                const action = actionIdx !== -1 ? row[actionIdx] : 'like';

                                if (!storeName || !userId) return;

                                if (!likesMap[storeName]) {
                                    likesMap[storeName] = { users: [] };
                                }

                                if (action && action.toLowerCase().includes('unlike')) {
                                    const idx = likesMap[storeName].users.indexOf(userId);
                                    if (idx !== -1) likesMap[storeName].users.splice(idx, 1);
                                } else {
                                    if (!likesMap[storeName].users.includes(userId)) {
                                        likesMap[storeName].users.push(userId);
                                    }
                                }
                            });
                        }
                    }

                    const localCache = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
                    for (let store in localCache) {
                        if (!likesMap[store]) likesMap[store] = { users: [] };
                        localCache[store].users.forEach(u => {
                            if (!likesMap[store].users.includes(u)) likesMap[store].users.push(u);
                        });
                    }

                    globalLikesData = likesMap;
                    resolve(globalLikesData);
                }).catch(err => {
                    console.error("讀取愛心表單失敗:", err);
                    globalLikesData = JSON.parse(localStorage.getItem('a7club_likes_cache') || '{}');
                    resolve(globalLikesData);
                });
            });
        }

        function toggleLike(event, storeName) {
            event.stopPropagation();

            if (!globalLikesData[storeName]) {
                globalLikesData[storeName] = { users: [] };
            }

            const storeLikes = globalLikesData[storeName];
            const userIndex = storeLikes.users.indexOf(currentUserId);
            const isLiked = userIndex !== -1;

            const btn = event.currentTarget;
            const icon = btn.querySelector('i.fa-heart');
            const countSpan = btn.querySelector('span');
            let currentCount = parseInt(countSpan.innerText) || 0;

            if (isLiked) {
                storeLikes.users.splice(userIndex, 1);
                icon.classList.remove('fa-solid', 'heart-beat-active', 'text-[#FF4785]');
                icon.classList.add('fa-regular', 'text-pink-400');
                btn.classList.remove('bg-pink-50', 'border-pink-300');
                countSpan.innerText = Math.max(0, currentCount - 1);

                return { iconClass: 'fa-pills', bgColor: 'bg-orange-400', textColor: 'text-orange-500', emoji: '💊' };
            }

            if (!categoryName) return CATEGORY_STYLES[CATEGORY_STYLES.length - 1];

            for (let style of CATEGORY_STYLES) {
                if (style.keywords.some(kw => categoryName.includes(kw))) {

        function loadSharedFoodData() {
            return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const timeIdx = Math.max(0, headers.findIndex(k => k.includes('時間') || k.toLowerCase().includes('timestamp')));
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點') || k.includes('網址')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                        let finalImg = rawImg.startsWith('http') ? rawImg : '';

                        let rawTime = timeIdx !== -1 && row[timeIdx] ? row[timeIdx].trim() : '';
                        let cleanTime = rawTime.replace('上午', 'AM').replace('下午', 'PM');
                        let parsedTime = new Date(cleanTime).getTime();

                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                            img: finalImg,
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                            likesCount: parseInt(row[16]) || 0,
                            timestamp: isNaN(parsedTime) ? 0 : parsedTime
                        };
                    }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(err => {
                    console.error('Fetch Food Data Error:', err);
                    resolve([]);
                });
            });
        }

                            <h4 class="font-black text-themePink text-sm leading-[1.1] mb-1">${formatStoreName(item.name)}</h4>
                            <p class="text-xs text-gray-500 font-bold leading-snug"><i class="fa-solid fa-location-dot mr-1"></i>${item.address}</p>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}" target="_blank" class="mt-2.5 block w-full bg-blue-100 text-blue-600 font-black py-1.5 rounded-lg text-xs hover:bg-blue-500 hover:text-white transition-colors shadow-sm">導航去</a>
                        </div>

                    marker.bindPopup(popupContent);

                    marker.on('click', () => {
                        if (activeFoodMarkerName && activeFoodMarkerName !== item.name && foodMarkersMap[activeFoodMarkerName]) {
                            const prevMarker = foodMarkersMap[activeFoodMarkerName];
                            if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                            prevMarker.setIcon(getCategoryIcon(prevMarker.category, activeFoodMarkerName, 'normal', false));
                        }
                        activeFoodMarkerName = item.name;
                        marker.setIcon(getCategoryIcon(item.category, item.name, 'clicked', true));

                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => {
                            if (foodMarkersMap[item.name] && activeFoodMarkerName === item.name) {
                                marker.setIcon(getCategoryIcon(item.category, item.name, 'clicked', false));
                            }
                        }, 5000);
                    });

                    foodClusterGroup.addLayer(marker);
                    foodMarkersMap[item.name] = marker;
                }

            if (foodClusterGroup && foodClusterGroup.getLayers().length > 0) {
                foodMapInstance.once('moveend', () => {
                    setTimeout(() => {
                        foodMapInstance.setZoom(foodMapInstance.getZoom() + 1);
                    }, 150);

            container.innerHTML = filteredData.map(item => {

                const isNew = item.timestamp && (Date.now() - item.timestamp < 7 * 24 * 60 * 60 * 1000);
                const newBadge = isNew ? '<span class="ml-1.5 bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-md shadow-sm relative -top-0.5 font-black animate-pulse whitespace-nowrap">NEW</span>' : '';

                if (item.img && item.img.startsWith('http')) {
                    imgContent = `<img src="${item.img}" onerror="this.outerHTML='<i class=\\'fa-solid ${style.iconClass} text-4xl ${style.textColor}\\'></i>'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">`;

                    <div class="absolute top-3 right-4 ${style.bgColor} text-white text-[10px] sm:text-xs font-black px-2.5 py-0.5 rounded-full shadow-sm tracking-wider inline-block">

                    </div>

        async function updateFoodMap(address, name, preLat, preLng, category) {
            if (foodMarkersMap[name]) {
                const marker = foodMarkersMap[name];

                if (activeFoodMarkerName && activeFoodMarkerName !== name && foodMarkersMap[activeFoodMarkerName]) {
                    const prevMarker = foodMarkersMap[activeFoodMarkerName];
                    if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                    prevMarker.setIcon(getCategoryIcon(prevMarker.category, activeFoodMarkerName, 'normal', false));
                }
                activeFoodMarkerName = name;

                const targetZoom = 18;
                const pt = foodMapInstance.project(marker.getLatLng(), targetZoom);
                pt.y -= foodMapInstance.getSize().y / 3.5;
                const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);

                foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });

                foodMapInstance.once('moveend', () => {
                    foodClusterGroup.zoomToShowLayer(marker, () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(category, name, 'clicked', true));

                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => {
                            if (foodMarkersMap[name] && activeFoodMarkerName === name) {
                                marker.setIcon(getCategoryIcon(category, name, 'clicked', false));
                            }
                        }, 5000);
                    });
                });
                return;
            }

            const overlay = document.getElementById('food-map-overlay');
            const overlayText = document.getElementById('food-map-overlay-text');

            if (overlay) {
                overlayText.className = "text-sm font-bold text-gray-600";
                overlayText.innerText = `正在為您定位 ${name}...`;
                overlay.style.display = 'flex';
            }

            try {
                let targetLat = preLat;
                let targetLng = preLng;

                if (!targetLat || !targetLng) {
                    let searchAddress = address.includes('市') ? address : '桃園市龜山區 ' + address;
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchAddress)}&limit=1`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        targetLat = parseFloat(data[0].lat);
                        targetLng = parseFloat(data[0].lon);
                    }
                }

                if (targetLat && targetLng) {
                    const targetZoom = 18;
                    const pt = foodMapInstance.project([targetLat, targetLng], targetZoom);
                    pt.y -= foodMapInstance.getSize().y / 3.5;
                    const offsetLatLng = foodMapInstance.unproject(pt, targetZoom);

                    foodMapInstance.flyTo(offsetLatLng, targetZoom, { animate: true, duration: 1.5 });
                    setTimeout(() => {
                        L.popup({ className: 'custom-popup-temporary' })
                            .setLatLng([targetLat, targetLng])
                            .setContent(`<div class="font-black text-themePink p-2 pt-6 text-center text-lg leading-[1.1]"><i class="fa-solid fa-location-dot mr-1"></i> ${formatStoreName(name)}</div>`)
                            .openOn(foodMapInstance);
                    }, 1000);
                } else {
                    if (overlay) {
                        overlayText.innerHTML = `地圖無法精確定位此地址<br><span class="text-xs text-gray-400 mt-1">${address}</span>`;
                        overlayText.className = "text-sm font-bold text-red-400 text-center";
                        setTimeout(() => overlay.style.display = 'none', 2000);
                        return;
                    }
                }
            } catch (error) {
                console.error("Geocoding error:", error);
                if (overlay) {
                    overlayText.innerText = `地圖服務暫時無法連線`;
                    overlayText.className = "text-sm font-bold text-red-400";
                    setTimeout(() => overlay.style.display = 'none', 2000);
                    return;
                }
            }

            if (overlay) setTimeout(() => overlay.style.display = 'none', 800);
        }

        async function showShoppingMap(safeCatId, catName, storeName, preLat, preLng, address) {
            document.querySelectorAll('[id^="map-wrapper-"]').forEach(wrapper => {
                if (wrapper.id !== 'map-wrapper-' + safeCatId) {
                    wrapper.classList.add('hidden');
                    wrapper.classList.remove('opacity-100');
                    wrapper.classList.add('opacity-0');
                }
            });

            const mapWrapper = document.getElementById('map-wrapper-' + safeCatId);
            if (!mapWrapper) return;

            if (mapWrapper.classList.contains('hidden')) {
                mapWrapper.classList.remove('hidden');
                void mapWrapper.offsetWidth;
                mapWrapper.classList.remove('opacity-0');
                mapWrapper.classList.add('opacity-100');
            }

            if (!shoppingMaps[safeCatId]) {
                shoppingMaps[safeCatId] = L.map('map-' + safeCatId, { zoomControl: false }).setView([25.0425, 121.3870], 14);
                L.control.zoom({ position: 'bottomright' }).addTo(shoppingMaps[safeCatId]);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap', maxZoom: 20
                }).addTo(shoppingMaps[safeCatId]);

                shoppingClusterGroups[safeCatId] = L.markerClusterGroup({
                    chunkedLoading: true, spiderfyOnMaxZoom: true, showCoverageOnHover: false, maxClusterRadius: 40
                });
                shoppingMaps[safeCatId].addLayer(shoppingClusterGroups[safeCatId]);
                shoppingMarkersMap[safeCatId] = {};
                shoppingMaps[safeCatId].activeMarker = null;

                const catStores = globalShoppingData.filter(s => s.category === catName);
                for (let store of catStores) {
                    if (store.lat && store.lng) {
                        const marker = L.marker([store.lat, store.lng], { icon: getCategoryIcon(store.category, store.name, 'normal') });
                        marker.category = store.category;
                        marker.storeName = store.name;
                        let cleanName = typeof getCleanStoreName === 'function' ? getCleanStoreName(store.name, catName) : store.name;
                        marker.bindTooltip(store.name, { direction: 'top', offset: [0, -50], className: 'custom-tooltip' });

                        let popupContent = `
                            <div class="text-center p-1 pt-5 w-50">
                                <h4 class="font-black text-themeYellow text-sm leading-[1.1] mb-1" title="${store.name}">${formatStoreName(store.name)}</h4>
                                <p class="text-xs text-gray-500 font-bold leading-snug"><i class="fa-solid fa-location-dot mr-1"></i>${store.address}</p>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${store.lat},${store.lng}" target="_blank" class="mt-2.5 block w-full bg-blue-100 text-blue-600 font-black py-1.5 rounded-lg text-xs hover:bg-blue-500 hover:text-white transition-colors shadow-sm">導航去</a>
                            </div>
                        `;
                        marker.bindPopup(popupContent);

                        marker.on('click', () => {
                            marker.setIcon(getCategoryIcon(store.category, store.name, 'clicked', true));
                            if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                            marker.bounceTimeout = setTimeout(() => {
                                marker.setIcon(getCategoryIcon(store.category, store.name, 'clicked', false));
                            }, 5000);
                        });

                        shoppingClusterGroups[safeCatId].addLayer(marker);
                        shoppingMarkersMap[safeCatId][store.name] = marker;
                    }
                }
            }

            const map = shoppingMaps[safeCatId];
            const clusterGroup = shoppingClusterGroups[safeCatId];

            setTimeout(() => {
                map.invalidateSize();

                let targetLat = preLat;
                let targetLng = preLng;

                const marker = shoppingMarkersMap[safeCatId][storeName];

                if (marker) {
                    if (map.activeMarker && map.activeMarker !== marker) {
                        map.removeLayer(map.activeMarker);
                        clusterGroup.addLayer(map.activeMarker);
                        map.activeMarker.setIcon(getCategoryIcon(map.activeMarker.category, map.activeMarker.storeName, 'normal', false));
                    }

                    map.activeMarker = marker;
                    clusterGroup.removeLayer(marker);
                    map.addLayer(marker);
                    marker.setZIndexOffset(1000);

                    let bounds;
                    if (clusterGroup.getLayers().length === 0) {
                        bounds = L.latLngBounds([marker.getLatLng(), marker.getLatLng()]);
                    } else {
                        bounds = clusterGroup.getBounds();
                        bounds.extend(marker.getLatLng());
                    }

                    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15, animate: true, duration: 1.5 });

                    map.once('moveend', () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', true));
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => marker.setIcon(getCategoryIcon(catName, storeName, 'clicked', false)), 5000);
                    });
                } else {
                    if (clusterGroup.getLayers().length > 0) {
                        map.fitBounds(clusterGroup.getBounds(), { padding: [40, 40], maxZoom: 15, animate: true, duration: 1.5 });
                    } else if (targetLat && targetLng) {
                        map.setView([targetLat, targetLng], 15);
                    }
                }
            }, 300);

            setTimeout(() => {
                mapWrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 150);
        }

        function loadSharedShoppingData() {
            return new Promise((resolve, reject) => {
                if (globalShoppingData) {
                    resolve(globalShoppingData);
                    return;
                }
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1279676556&single=true&output=csv';

                fetch(csvUrl)
                    .then(res => res.text())
                    .then(csvText => {
                        const rows = parseCSV(csvText);
                        if (rows.length < 2) {
                            globalShoppingData = [];
                            resolve(globalShoppingData);
                            return;
                        }

                        const headers = rows[0];
                        let nameIdx = headers.findIndex(k => k.includes('店') || k.includes('名'));
                        if (nameIdx === -1) nameIdx = 1;

                        let catIdx = headers.findIndex(k => k === '生活分類' || k.includes('生活分類'));
                        if (catIdx === -1) catIdx = 6;

                        let addressIdx = headers.findIndex(k => k.includes('地址') || k.includes('位置') || k.includes('地點'));
                        let statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態') || k.includes('OK'));
                        let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片') || k.includes('圖'));
                        let latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                        let lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                        let parsedData = rows.slice(1).map(row => {
                            let rawImg = imgIdx !== -1 && row[imgIdx] ? row[imgIdx].trim() : '';
                            let finalImg = rawImg.startsWith('http') ? rawImg : '';

                            return {
                                name: row[nameIdx] || '未命名',
                                category: row[catIdx] || '未分類',
                                address: addressIdx !== -1 && row[addressIdx] ? formatAddress(row[addressIdx].trim()) : '',
                                status: statusIdx !== -1 ? row[statusIdx] : 'OK',
                                img: finalImg,
                                lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                                lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                                likesCount: parseInt(row[16]) || 0
                            };
                        }).filter(item => item.name !== '未命名' && item.name.trim() !== '');

                        globalShoppingData = parsedData.filter(item => {
                            if (statusIdx === -1) return true;
                            const s = String(item.status).toUpperCase().trim();
                            return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s.includes('通過') || s === 'TRUE' || s === 'Y';
                        });

                        resolve(globalShoppingData);
                    })
                    .catch(err => {
                        console.error('Fetch Shopping Data Error:', err);
                        resolve([]);
                    });
            });
        }

        function fetchShoppingData() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;

            for (let key in shoppingMaps) {
                if (shoppingMaps[key]) shoppingMaps[key].remove();
            }
            shoppingMaps = {};
            shoppingClusterGroups = {};
            shoppingMarkersMap = {};

            Promise.all([loadSharedShoppingData(), loadSharedLikesData()]).then(([data, likes]) => {
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold py-8">目前沒有店家資料</div>';
                } else {
                    renderShoppingData(data, '全部');
                }
            }).catch(err => {
                console.error('CSV Fetch Error:', err);
                container.innerHTML = '<div class="col-span-full text-center text-red-500 font-bold py-8">資料載入失敗，請稍後再試。</div>';
            });
        }

        function renderShoppingData(data, activeCategory = '全部') {
            const container = document.getElementById('shopping-list-container');
            const tagsContainer = document.getElementById('shopping-tags-container');
            if (!container) return;

            container.className = "flex flex-col gap-6 w-full";

            if (tagsContainer) {
                const allCategories = ['全部', ...new Set(globalShoppingData.map(item => item.category).filter(c => c))];
                tagsContainer.innerHTML = allCategories.map(cat => {
                    const isActive = cat === activeCategory;
                    const activeClass = isActive
                        ? 'bg-themeYellow text-white shadow-md scale-[1.02] md:scale-105 z-10'
                        : 'bg-white text-gray-600 hover:bg-yellow-50 shadow-sm border-2 border-transparent hover:-translate-y-1';

                    let icon = '🛍️';
                    if (cat.includes('生鮮') || cat.includes('超市') || cat.includes('食品') || cat.includes('市場') || cat.includes('便利')) icon = '🛒';
                    if (cat.includes('居家') || cat.includes('寵物') || cat.includes('五金') || cat.includes('電器')) icon = '🏠';
                    if (cat.includes('服務') || cat.includes('洗') || cat.includes('美容') || cat.includes('修繕')) icon = '🤝';
                    if (cat.includes('觀光') || cat.includes('景點') || cat.includes('公園')) icon = '🌲';
                    if (cat.includes('捷運') || cat.includes('機捷') || cat.includes('交通')) icon = '🚇';
                    if (cat === '全部') icon = '🎡';

                    return `<button onclick="renderShoppingData(globalShoppingData, '${cat.replace(/'/g, "\\'")}')" class="w-auto py-2.5 md:py-3 px-4 md:px-6 rounded-full font-black text-xs md:text-sm transition-all transform flex items-center justify-center gap-1 md:gap-2 border border-yellow-100 whitespace-nowrap ${activeClass}">
                                <span class="hidden md:inline-block shrink-0">${icon}</span>
                                <span>${cat}</span>
                            </button>`;
                }).join('');
            }

            const filteredData = activeCategory === '全部' ? data : data.filter(item => item.category === activeCategory);
            if (filteredData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有審核通過的店家喔！</div>';
                return;
            }

            const groupedCategories = {};
            filteredData.forEach(item => {
                const cat = item.category || '未分類';
                if (!groupedCategories[cat]) groupedCategories[cat] = [];
                groupedCategories[cat].push(item);
            });

            const catLikes = {};
            for (const [catName, items] of Object.entries(groupedCategories)) {
                items.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
                catLikes[catName] = items.reduce((sum, item) => sum + (item.likesCount || 0), 0);
            }

            let mrtCat = null;
            let convenienceCat = null;
            let shoppingCenterCat = null;
            let photoCats = [];
            let normalCats = [];

            for (const [catName, items] of Object.entries(groupedCategories)) {
                if (catName.includes('捷運') || catName.includes('機捷') || catName.includes('交通')) {
                    mrtCat = { name: catName, items: items };
                } else if (catName.includes('便利')) {
                    convenienceCat = { name: catName, items: items, isPhoto: false, isLargeText: true };
                } else if (catName.includes('購物中心') || catName.includes('百貨') || catName.includes('商場')) {
                    shoppingCenterCat = { name: catName, items: items, isPhoto: true, isLargeText: false };
                } else {
                    const isPhoto = catName.includes('觀光景點') || catName.includes('公園');
                    const isLargeText = catName.includes('生鮮') || catName.includes('超市');

                    if (isPhoto) {
                        photoCats.push({ name: catName, items: items, isPhoto: true, isLargeText: false });
                    } else {
                        normalCats.push({ name: catName, items: items, isPhoto: false, isLargeText: isLargeText });
                    }
                }
            }

            photoCats.sort((a, b) => catLikes[b.name] - catLikes[a.name]);
            normalCats.sort((a, b) => catLikes[b.name] - catLikes[a.name]);

            let col1 = [];
            let col2 = [];
            let photoIndex = 0;
            let normalIndex = 0;
            let usePhotoForCol1 = true;
            let usePhotoForCol2 = false;

            while (photoIndex < photoCats.length || normalIndex < normalCats.length) {
                if (usePhotoForCol1 && photoIndex < photoCats.length) {
                    col1.push(photoCats[photoIndex++]);
                    usePhotoForCol1 = false;
                } else if (normalIndex < normalCats.length) {
                    col1.push(normalCats[normalIndex++]);
                    usePhotoForCol1 = true;
                } else if (photoIndex < photoCats.length) {
                    col1.push(photoCats[photoIndex++]);
                }

        function loadSharedCommunityData() {
            return new Promise((resolve, reject) => {
                if (globalCommunityData) return resolve(globalCommunityData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('社群'));
                    if (nameIdx === -1) nameIdx = 0;
                    let catIdx = headers.findIndex(k => k.includes('屬性') || k.includes('分類'));
                    if (catIdx === -1) catIdx = 1;
                    let linkIdx = headers.findIndex(k => k.includes('連結') || k.includes('網址') || k.includes('URL'));
                    if (linkIdx === -1) linkIdx = 2;
                    let imgIdx = 4;

                    let parsedData = rows.slice(1).map(row => {
                        let rawImg = (row.length > imgIdx && row[imgIdx]) ? row[imgIdx].trim() : '';
                        let finalImg = '';
                        const urlMatch = rawImg.match(/https?:\/\/[^\s]+/);
                        if (urlMatch) finalImg = urlMatch[0];

                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他推薦',
                            link: row[linkIdx] ? row[linkIdx].trim() : '#',
                            img: finalImg
                        };
                    }).filter(item => item.name !== '' && item.link !== '#');

                    globalCommunityData = parsedData;
                    resolve(globalCommunityData);
                }).catch(err => {
                    console.warn('Fetch Community Data Error:', err);
                    resolve([]);
                });
            });
        }

        function loadSharedBuildingData() {
            return new Promise((resolve, reject) => {
                if (globalBuildingData) return resolve(globalBuildingData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=985024788&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);

                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('建案') || k.includes('名稱'));
                    if (nameIdx === -1) nameIdx = 0;
                    let villageIdx = headers.findIndex(k => k.includes('里'));
                    if (villageIdx === -1) villageIdx = 1;
                    let imgIdx = headers.findIndex(k => k.includes('照片') || k.includes('圖片'));
                    if (imgIdx === -1) imgIdx = 3;

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            village: row[villageIdx] ? row[villageIdx].trim() : '未分類區域',
                            img: row[imgIdx] ? row[imgIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalBuildingData = parsedData;
                    resolve(globalBuildingData);
                }).catch(err => {
                    console.warn('Fetch Building Data Error:', err);
                    resolve([]);
                });
            });
        }
