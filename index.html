            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }
        .leaflet-popup-close-button:hover { background-color: #FF9EBB !important; color: white !important; }
        
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(255, 158, 187, 0.5) !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important; color: white !important; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important;

        .leaflet-tooltip.custom-tooltip { background-color: white; color: #FF9EBB; font-weight: 900; border-radius: 0.5rem; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 4px 10px; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }

            100% { transform: translateY(0px) scale(1, 1); }

    <!-- JavaScript 路由與注入邏輯 -->
    <script>
        let globalMrtInterval = null;
        let foodMapInstance = null;
        let foodClusterGroup = null;
        let foodMarkersMap = {}; 
        let activeFoodMarkerName = null;

        // ========================================================
        // 💖 愛心評分系統邏輯 (Like System)
        // ========================================================
        
        let globalLikesData = {}; // 存放所有店家的總愛心數 { "店家A": 10, "店家B": 5 }
        let userLikes = {};       // 存放當前使用者按讚的狀態 { "店家A": true }
        
        /*
        ========================================================
        [教學] Google Apps Script 接收端設定 (將讚數寫回 Google Sheet)
        ========================================================
        若要將愛心資料寫入試算表，您需要新增一個 Apps Script，程式碼範例如下：
        
        function doPost(e) {
            try {
                var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("愛心紀錄表");
                
                // 如果是 x-www-form-urlencoded 格式，資料會放在 e.parameter 裡面
                var userId = e.parameter.userId;
                var storeName = e.parameter.storeName;
                var year = e.parameter.year;
                var month = e.parameter.month;
                var timestamp = new Date();
                
                if (userId && storeName) {
                    sheet.appendRow([userId, storeName, year, month, timestamp]);
                    return ContentService.createTextOutput("success");
                } else {
                    return ContentService.createTextOutput("missing data");
                }
            } catch (error) {
                return ContentService.createTextOutput(error.toString());
            }
        }
        
        部署為「網頁應用程式」後，將拿到的 URL 貼在下方變數中即可啟用真實寫入功能。
        ========================================================
        */
        const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwpzgiPb4sKncl1Zd_PQVUKkRSn2D5-7_A8cNpxw3QD5rjklKGyw31MMdR6mRS5Ysyu3g/exec"; 

        // 取得或生成使用者的專屬 ID (存於瀏覽器 localStorage)
        function getUserId() {
            let uid = localStorage.getItem('a7_user_id');
            if (!uid) {
                // 產生一組 UUID (如果瀏覽器支援 crypto) 或使用隨機字串
                const randomStr = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                uid = 'USER_' + randomStr;
                localStorage.setItem('a7_user_id', uid);
            }
            return uid;
        }

        // 顯示 Toast 提示
        function showToast(message, isSuccess = true) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            const bgColor = isSuccess ? 'bg-white' : 'bg-red-50';
            const textColor = isSuccess ? 'text-themePink' : 'text-red-500';
            const icon = isSuccess ? '<i class="fa-solid fa-heart mr-2"></i>' : '<i class="fa-solid fa-circle-exclamation mr-2"></i>';
            const borderColor = isSuccess ? 'border-pink-200' : 'border-red-200';
            
            toast.className = `${bgColor} ${textColor} border-2 ${borderColor} px-5 py-3 rounded-full shadow-cute font-black text-sm sm:text-base flex items-center toast-enter pointer-events-auto`;
            toast.innerHTML = `${icon} ${message}`;
            
            container.appendChild(toast);
            
            // 3 秒後移除
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300); // 等待動畫結束後移除 DOM
            }, 3000);
        }

        // 啟動時讀取 Google Sheet CSV 內的按讚紀錄
        async function loadLikesData() {
            const likesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1295636704&single=true&output=csv';
            try {
                const res = await fetch(likesCsvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText).slice(1); // 略過標題列
                const currentUid = getUserId();
                
                const date = new Date();
                const curYear = String(date.getFullYear());
                const curMonth = String(date.getMonth() + 1);

                globalLikesData = {};
                userLikes = {};
                
                // 用於同步最新狀態到 localStorage
                let localHistory = JSON.parse(localStorage.getItem('a7_likes_history') || '{}');

                rows.forEach(row => {
                    if (row.length < 2) return;
                    const rowUid = row[0] ? row[0].trim() : '';
                    const storeName = row[1] ? row[1].trim() : '';
                    const rowYear = row[2] ? String(row[2]).trim() : '';
                    const rowMonth = row[3] ? String(row[3]).trim() : '';
                    if (!storeName) return;

                    // 統計總數
                    globalLikesData[storeName] = (globalLikesData[storeName] || 0) + 1;

                    // 判斷當前使用者「這個月」是否投過
                    if (rowUid === currentUid && rowYear === curYear && rowMonth === curMonth) {
                        userLikes[storeName] = true;
                        localHistory[storeName] = `${curYear}-${curMonth.padStart(2, '0')}`;
                    }
                });
                
                localStorage.setItem('a7_likes_history', JSON.stringify(localHistory));
            } catch (e) {
                console.warn("載入愛心資料失敗或無資料", e);
            }
        }

        // 切換按讚狀態並傳送資料
        async function toggleLike(storeName) {
            const uid = getUserId();
            const date = new Date();
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const currentMonthStr = `${year}-${String(month).padStart(2, '0')}`;
            
            // 1. 先檢查前端 localStorage 的紀錄 (節省連線)
            let history = JSON.parse(localStorage.getItem('a7_likes_history') || '{}');
            const lastClickedMonth = history[storeName];

            // 2. 如果是同一個月，跳出提示並阻止
            if (lastClickedMonth === currentMonthStr || userLikes[storeName]) {
                showToast("您這個月已經支持過囉！下個月再來吧！", false);
                return;
            }

            // 3. 允許投票：更新本地紀錄與 UI (Optimistic Update)
            history[storeName] = currentMonthStr;
            localStorage.setItem('a7_likes_history', JSON.stringify(history));
            
            userLikes[storeName] = true;
            globalLikesData[storeName] = (globalLikesData[storeName] || 0) + 1;
            
            updateLikeUI(storeName);
            showToast("感謝您的支持！💖", true);

            // 4. 若有設定 Apps Script URL 則嘗試寫入
            if (APPS_SCRIPT_WEB_APP_URL) {
                try {
                    // 使用 URLSearchParams 將每一個資料欄位獨立作為一個參數發送
                    const formData = new URLSearchParams();
                    formData.append('userId', uid);
                    formData.append('storeName', storeName);
                    formData.append('year', year);
                    formData.append('month', month);
                    formData.append('action', 'like');

                    // 使用 no-cors 模式確保請求不會被瀏覽器預檢擋下
                    fetch(APPS_SCRIPT_WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: formData.toString()
                    }).then(response => {
                        console.log('愛心紀錄發送成功 (Opaque Response)');
                    }).catch(error => {
                        console.error('發送愛心紀錄失敗', error);
                    });
                } catch(e) {
                    console.error("發送愛心紀錄發生例外錯誤", e);
                }
            } else {
                console.log(`[模擬寫入試算表] 使用者: ${uid} | 店家: ${storeName} | 年月: ${year}/${month} | 動作: 按讚`);
            }
        }

        // 動態更新畫面的愛心數量與狀態
        function updateLikeUI(storeName) {
            // 尋找網頁中所有 `data-store` 符合的按鈕並更新
            const buttons = document.querySelectorAll(`.like-btn[data-store="${storeName.replace(/"/g, '&quot;')}"]`);
            const isLiked = userLikes[storeName];
            const count = globalLikesData[storeName] || 0;

            buttons.forEach(btn => {
                const icon = btn.querySelector('i.fa-heart');
                const countSpan = btn.querySelector('.like-count');
                if (!icon || !countSpan) return;

                if (isLiked) {
                    icon.classList.remove('text-pink-200');
                    icon.classList.add('text-themePink', 'heart-beat');
                    countSpan.classList.remove('text-gray-400');
                    countSpan.classList.add('text-pink-600');
                    btn.classList.remove('bg-white', 'border-pink-100');
                    btn.classList.add('bg-pink-50', 'border-pink-200');
                    setTimeout(() => icon.classList.remove('heart-beat'), 400); // 移除動畫class以便下次觸發
                } else {
                    icon.classList.remove('text-themePink');
                    icon.classList.add('text-pink-200');
                    countSpan.classList.remove('text-pink-600');
                    countSpan.classList.add('text-gray-400');
                    btn.classList.remove('bg-pink-50', 'border-pink-200');
                    btn.classList.add('bg-white', 'border-pink-100');
                }
                countSpan.innerText = count > 0 ? count : '推';
            });
        }

        // 產生愛心按鈕的 HTML 模組 (改為更可愛的膠囊形狀，並且顏色採用柔和粉色)
        function getLikesHtml(storeName) {
            const count = globalLikesData[storeName] || 0;
            const isLiked = userLikes[storeName] || false;
            
            // 調整 Hover 時的顏色：
            // 如果還沒按讚 (isLiked為false)，hover 邊框變深粉色 (hover:border-pink-300)，背景微紅 (hover:bg-red-50)
            // 如果已經按讚 (isLiked為true)，hover 邊框更深 (hover:border-pink-400)，背景更粉 (hover:bg-pink-100)
            const iconColor = isLiked ? 'text-themePink' : 'text-pink-200';
            const textColor = isLiked ? 'text-pink-600' : 'text-gray-400';
            const bgColor = isLiked ? 'bg-pink-50 border-pink-200 hover:bg-pink-100 hover:border-pink-400' : 'bg-white border-pink-100 hover:bg-red-50 hover:border-pink-300';
            const displayText = count > 0 ? count : '推';
            const safeName = storeName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            
            return `
                <button onclick="event.stopPropagation(); toggleLike('${safeName}')" 
                        class="like-btn flex items-center justify-center gap-1.5 ${bgColor} border-2 shadow-sm rounded-full px-3 py-1.5 z-30 hover:scale-105 active:scale-95 transition-all group" 
                        data-store="${safeName}">
                    <i class="fa-solid fa-heart ${iconColor} text-sm group-hover:scale-125 group-hover:text-pink-400 transition-all"></i>
                    <span class="text-xs font-black ${textColor} like-count">${displayText}</span>
                </button>
            `;
        }

        // 輔助函數：處理店家名稱，讓英文字體變小
        function formatStoreName(name) {
            if (!name) return '';
            // 將連續的英文字母與數字包在一層 span 中，並縮小字體
            return name.replace(/([a-zA-Z0-9\s]+)/g, '<span class="text-[0.85em] font-extrabold tracking-[-0.03em]">$1</span>');
        }

        // 輔助函數：過濾地址字串 (移除常見的桃園市區域碼)
        function formatAddress(address) {
            if (!address) return '';
            // 利用正則表達式，去除字串開頭可能存在的 3~5 位數字 (郵遞區號) 以及後面的空白
            let formatted = address.replace(/^\d{3,5}\s*/, '');

            return formatted;
        }

        // ========================================================
        // 🗺️ Leaflet 地圖核心功能 (移至前方宣告)
        // ========================================================
        function initFoodMap() {
            const mapEl = document.getElementById('food-leaflet-map');
            if (!mapEl) return;

            if (foodMapInstance) {
                foodMapInstance.remove();
                foodMapInstance = null;
                foodClusterGroup = null;
                foodMarkersMap = {};
            }

            // 初始化縮放級別放寬，避免一開始跳動過大
            foodMapInstance = L.map('food-leaflet-map', { zoomControl: false }).setView([25.0425, 121.3870], 15);
            L.control.zoom({ position: 'bottomright' }).addTo(foodMapInstance);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                maxZoom: 20
            }).addTo(foodMapInstance);

            foodClusterGroup = L.markerClusterGroup({
                chunkedLoading: true, spiderfyOnMaxZoom: true, showCoverageOnHover: false, zoomToBoundsOnClick: true, maxClusterRadius: 40
            });
            foodMapInstance.addLayer(foodClusterGroup);
        }

        // ========================================================
        // 核心初始化與路由
        // ========================================================
        
        document.addEventListener('DOMContentLoaded', async () => {
            // 先等待愛心紀錄讀取完畢，再進行畫面渲染
            await loadLikesData();
            handleRoute();
        });

        window.addEventListener('hashchange', handleRoute);

        function handleRoute() {
            let hash = window.location.hash.substring(1) || 'home';
            if (hash.startsWith('search=')) {
                const query = decodeURIComponent(hash.substring(7));
                renderPage('search');
                executeSearchLogic(query);
            } else if (hash === 'buildings') {
                renderPage('explore', true); 
                setTimeout(() => {
                    const section = document.getElementById('buildings-section');
                    if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            } else {
                renderPage(hash);
            }
        }

        function loadPage(pageId) {
            window.location.hash = pageId;
        }

        function renderPage(pageId, skipScrollTop = false) {
            const root = document.getElementById('app-root');
            const template = document.getElementById('tpl-' + pageId);
            
            if (template) {
                root.innerHTML = '';
                root.appendChild(template.content.cloneNode(true));
                updateNavStyles(pageId);
                
                if (!skipScrollTop) window.scrollTo({ top: 0, behavior: 'smooth' });

                if (pageId === 'home') {
                    setTimeout(() => {
                        fetchAndUpdateHomeCounts(); 
                        fetchLocalNews(); 
                        updateMRTStatus();
                        if (globalMrtInterval) clearInterval(globalMrtInterval);
                        globalMrtInterval = setInterval(updateMRTStatus, 1000);
                    }, 50);
                } else {
                    if (globalMrtInterval) { clearInterval(globalMrtInterval); globalMrtInterval = null; }
                }

                if (pageId === 'food') { setTimeout(() => { initFoodMap(); fetchFoodData(); }, 50); }
                if (pageId === 'shopping') fetchShoppingData();
                if (pageId === 'medical') fetchMedicalData();
                if (pageId === 'explore') { fetchCommunityData(); fetchBuildingData(); }
            } else {
                console.error("找不到模板: ", pageId);
            }
        }

        // === 相關輔助工具 (CSV 解析、Modal 開關) ===
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        // Modal 相關功能
        function openStoreModal(name, tag, tagColor, desc, address, hours, imgUrl, mapQuery) {
            document.getElementById('store-modal-title').innerText = name;
            const tagEl = document.getElementById('store-modal-tag');
            tagEl.innerText = tag; tagEl.className = `text-xs font-black px-2.5 py-1 rounded-lg text-white shadow-sm ${tagColor}`;
            document.getElementById('store-modal-desc').innerText = desc;
            document.getElementById('store-modal-hours').innerText = hours;
            
            document.getElementById('store-modal-img-container').innerHTML = `
                <img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent z-10"></div>
            `;
            
            const mapBtn = document.getElementById('store-modal-map-btn');
            const qrContainer = document.getElementById('store-modal-qr-container');
            const qrImg = document.getElementById('store-modal-qr-img');
            const lineBtn = document.getElementById('store-modal-line-btn');
            const ratingContainer = document.getElementById('store-modal-rating-container');
            const addressEl = document.getElementById('store-modal-address');
            
            if (mapQuery.startsWith('http') && (mapQuery.includes('line.me') || mapQuery.includes('lin.ee'))) {
                mapBtn.classList.add('hidden'); qrContainer.classList.remove('hidden'); qrContainer.classList.add('flex');

        let globalFoodData = null;
        
        const FOOD_CATEGORY_STYLES = [
            { keywords: ['早', '早餐', '早午餐'], iconClass: 'fa-egg', bgColor: 'bg-yellow-400', textColor: 'text-yellow-600', emoji: '🍳' },
            { keywords: ['素', '素食', '蔬食', '健康'], iconClass: 'fa-leaf', bgColor: 'bg-green-400', textColor: 'text-green-600', emoji: '🥗' },
            { keywords: ['飲', '飲料', '手搖', '茶'], iconClass: 'fa-glass-water', bgColor: 'bg-teal-400', textColor: 'text-teal-600', emoji: '🧋' },
            { keywords: ['麵', '麵食', '拉麵', '義大利麵'], iconClass: 'fa-bowl-rice', bgColor: 'bg-orange-300', textColor: 'text-orange-700', emoji: '🍜' },
            { keywords: ['飯', '正餐', '主食', '便當', '水餃'], iconClass: 'fa-bowl-food', bgColor: 'bg-orange-400', textColor: 'text-orange-600', emoji: '🍱' },
            { keywords: ['西餐', '美式', '漢堡', '披薩'], iconClass: 'fa-burger', bgColor: 'bg-red-400', textColor: 'text-red-600', emoji: '🍔' },
            { keywords: ['咖啡', '甜點', '冰', '蛋糕', '麵包', '甜甜圈'], iconClass: 'fa-cookie-bite', bgColor: 'bg-themeBlue', textColor: 'text-blue-500', emoji: '🍩' },
            { keywords: ['小吃', '宵夜', '炸', '烤', '滷味'], iconClass: 'fa-drumstick-bite', bgColor: 'bg-amber-400', textColor: 'text-amber-600', emoji: '🍗' },
            { keywords: ['鍋', '火鍋', '鐵板'], iconClass: 'fa-fire-burner', bgColor: 'bg-red-400', textColor: 'text-red-500', emoji: '🍲' },
            { keywords: ['異國', '日式', '韓式', '義式', '泰式'], iconClass: 'fa-earth-americas', bgColor: 'bg-indigo-400', textColor: 'text-indigo-600', emoji: '🍝' },
            { keywords: ['預設'], iconClass: 'fa-utensils', bgColor: 'bg-themePink', textColor: 'text-pink-500', emoji: '🍽️' }
        ];

        function getFoodStyleByCategory(categoryName) {
            if (!categoryName) return FOOD_CATEGORY_STYLES[FOOD_CATEGORY_STYLES.length - 1];
            for (let style of FOOD_CATEGORY_STYLES) {
                if (style.keywords.some(kw => categoryName.includes(kw))) return style;
            }
            return FOOD_CATEGORY_STYLES[FOOD_CATEGORY_STYLES.length - 1];
        }

        function loadSharedFoodData() {
            return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx] : '',
                            img: imgIdx !== -1 && row[imgIdx] && row[imgIdx].startsWith('http') ? row[imgIdx].trim() : '',
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK'
                        };
                    }).filter(item => item.name !== '未命名');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(reject);
            });
        }

        function fetchFoodData() {
            const container = document.getElementById('food-list-container');
            if (!container) return;
            loadSharedFoodData().then(data => {
                if (data.length === 0) container.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold py-8">目前沒有美食資料</div>';
                else renderFoodData(data, '全部');
            });
        }

        function renderFoodData(data, activeCategory) {
            const container = document.getElementById('food-list-container');
            const tagsContainer = document.getElementById('food-tags-container');
            if (!container) return;

            const categories = ['全部', ...new Set(data.map(item => item.category).filter(c => c))];
            const tagsHtml = categories.map(cat => {
                const isActive = cat === activeCategory;
                const activeClass = isActive ? 'bg-themePink text-white shadow-md scale-[1.02] md:scale-105 z-10' : 'bg-white text-gray-600 hover:bg-pink-50 shadow-sm border-2 border-transparent hover:-translate-y-1';
                let icon = cat === '全部' ? '🎡' : getFoodStyleByCategory(cat).emoji;
                return `<button onclick="renderFoodData(globalFoodData, '${cat.replace(/'/g, "\\'")}')" class="flex-auto lg:flex-none w-auto py-2 md:py-2.5 px-4 md:px-6 rounded-full font-black text-xs md:text-sm transition-all transform flex items-center justify-center gap-1 md:gap-2 border border-pink-100 whitespace-nowrap ${activeClass}">
                            <span class="hidden md:inline-block shrink-0">${icon}</span><span>${cat}</span>
                        </button>`;
            }).join('');

            if (tagsContainer) tagsContainer.innerHTML = tagsHtml;

            const filteredData = activeCategory === '全部' ? data : data.filter(item => item.category === activeCategory);
            
            if (filteredData.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有店家喔！</div>';
                return;
            }

            // 更新地圖標籤 (Map Markers)
            if (foodClusterGroup) foodClusterGroup.clearLayers();
            foodMarkersMap = {};
            activeFoodMarkerName = null;

            filteredData.forEach(item => {
                if (item.lat && item.lng) {
                    const marker = L.marker([item.lat, item.lng], { icon: getCategoryIcon(item.category, 'normal') });
                    marker.category = item.category;
                    marker.bindTooltip(item.name, { direction: 'top', offset: [0, -50], className: 'custom-tooltip' });
                    
                    let popupContent = `
                        <div class="text-center p-1 w-44 relative">
                            <h4 class="font-black text-themePink text-sm mb-1">${item.name}</h4>
                            <p class="text-xs text-gray-500 font-bold leading-snug"><i class="fa-solid fa-location-dot mr-1"></i>${formatAddress(item.address)}</p>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}" target="_blank" class="mt-2.5 block w-full bg-blue-100 text-blue-600 font-black py-1.5 rounded-lg text-xs hover:bg-blue-500 hover:text-white transition-colors shadow-sm">導航去</a>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                    marker.on('click', () => {
                        if (activeFoodMarkerName && activeFoodMarkerName !== item.name && foodMarkersMap[activeFoodMarkerName]) {
                            const prevMarker = foodMarkersMap[activeFoodMarkerName];
                            if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                            prevMarker.setIcon(getCategoryIcon(prevMarker.category, 'normal', false));
                        }
                        activeFoodMarkerName = item.name;
                        marker.setIcon(getCategoryIcon(item.category, 'clicked', true));
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => {
                            if (foodMarkersMap[item.name] && activeFoodMarkerName === item.name) {
                                marker.setIcon(getCategoryIcon(item.category, 'clicked', false));
                            }
                        }, 5000);
                    });
                    foodClusterGroup.addLayer(marker);
                    foodMarkersMap[item.name] = marker;
                }
            });

            if (foodClusterGroup && foodClusterGroup.getLayers().length > 0) {
                foodMapInstance.once('moveend', () => { setTimeout(() => foodMapInstance.setZoom(foodMapInstance.getZoom() + 1), 150); });
                foodMapInstance.fitBounds(foodClusterGroup.getBounds(), { padding: [40, 40] });
            }

            // 更新清單卡片
            container.innerHTML = filteredData.map(item => {
                const style = getFoodStyleByCategory(item.category);
                let imgContent = (item.img && item.img.startsWith('http'))
                    ? `<img src="${item.img}" onerror="this.outerHTML='<i class=\\'fa-solid ${style.iconClass} text-4xl ${style.textColor}\\'></i>'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">`
                    : `<i class="fa-solid ${style.iconClass} text-3xl sm:text-4xl ${style.textColor} group-hover:text-themePink transition-colors opacity-80"></i>`;

                return `
                <!-- 修改佈局：移除 pb-12，改用 Flexbox 處理內部元素排列 -->
                <div onclick="updateFoodMap('${item.address.replace(/'/g, "\\'")}', '${item.name.replace(/'/g, "\\'")}', ${item.lat || null}, ${item.lng || null}, '${item.category.replace(/'/g, "\\'")}')" class="bg-white p-3 md:p-4 pt-5 md:pt-6 rounded-3xl shadow-cute flex flex-col hover:-translate-y-1 transition-transform cursor-pointer border border-pink-50 group relative mt-2 h-full">
                    
                    <!-- 小藥丸分類標籤 -->
                    <div class="absolute -top-3 right-3 md:right-4 ${style.bgColor} text-white text-[10px] md:text-xs font-black px-3 py-1 rounded-full shadow-md z-10 border-2 border-white">
                        ${item.category}
                    </div>
                    
                    <!-- 上半部：照片與店名 -->
                    <div class="flex items-start gap-3 md:gap-4 w-full">
                        <div class="w-14 h-14 sm:w-16 sm:h-16 ${style.bgColor.replace('bg-', 'bg-').replace('400', '50')} rounded-full overflow-hidden shrink-0 shadow-inner relative flex items-center justify-center border-2 border-white">
                            ${imgContent}
                        </div>
                        
                        <div class="flex-1 pr-1 pt-1">
                            <!-- 使用 formatStoreName 處理中英文字體大小 -->
                            <h4 class="font-bold text-gray-800 text-sm md:text-base group-hover:text-themePink transition-colors leading-snug break-words">${formatStoreName(item.name)}</h4>
                        </div>
                    </div>
                    
                    <!-- 下半部：地址與愛心，讓愛心固定在右下角 -->
                    <div class="flex items-end justify-between w-full mt-auto pt-3">
                        <div class="flex-1 pr-2">
                            <p class="text-xs text-gray-500 font-bold flex items-start"><i class="fa-solid fa-location-dot mt-0.5 mr-1.5 text-pink-400 shrink-0"></i><span class="break-words line-clamp-2">${formatAddress(item.address)}</span></p>
                        </div>
                        <div class="shrink-0">
                            ${getLikesHtml(item.name)}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function loadSharedMedicalData() {
            return new Promise((resolve, reject) => {
                if (globalMedicalData) return resolve(globalMedicalData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構')); if (nameIdx === -1) nameIdx = 0; 
                    let catIdx = headers.findIndex(k => k.includes('醫療分類')); if (catIdx === -1) catIdx = 8;
                    let addressIdx = headers.findIndex(k => k.includes('地址'));
                    let phoneIdx = headers.findIndex(k => k.includes('電話'));
                    let licenseIdx = 14; 

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他醫療',
                            address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx].trim() : '',
                            phone: phoneIdx !== -1 && row[phoneIdx] ? row[phoneIdx].trim() : '',
                            license: row[licenseIdx] ? row[licenseIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalMedicalData = parsedData;
                    resolve(globalMedicalData);
                }).catch(reject);
            });
        }

                for (const [id, target] of Object.entries(counts)) {
                    const counter = document.getElementById(id);

        function animateSingleCounter(counter, target) {
            const duration = 2000, totalFrames = Math.round(duration / (1000/60));
            let currentFrame = 0;
            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
            const updateCounter = () => {
                currentFrame++;
                const currentVal = Math.round(target * easeOutExpo(currentFrame / totalFrames));
                counter.innerText = currentVal;
                if (currentFrame < totalFrames) requestAnimationFrame(updateCounter);
                else counter.innerText = target; 
            };
            counter.innerText = '0'; requestAnimationFrame(updateCounter);
        }

        function updateMRTStatus() {
            const container = document.getElementById('mrt-track-container');
            const nbEl = document.getElementById('mrt-time-north'), sbEl = document.getElementById('mrt-time-south');
            if (!container || !nbEl || !sbEl) return;
            const now = new Date(), totalMins = now.getMinutes() + now.getSeconds() / 60;
            const baseNb = [5, 20, 35, 50], baseSb = [10, 25, 40, 55];
            let nbHTML = '', sbHTML = '', minNb = 999, minSb = 999;
            
            baseNb.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - totalMins;
                    if (diff > 0 && diff < minNb) minNb = diff;
                    if (diff >= -9 && diff <= 9) {
                        let pos = Math.max(0, Math.min(100, 50 + (diff * (50/9))));
                        // 修正：將 top 改為負值，讓列車在軌道（文字）上方行駛
                        nbHTML += `<div class="absolute -top-[16px] sm:-top-[20px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;"><div class="bg-white text-themeGreen rounded-full shadow-md border-2 border-green-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-caret-left text-[10px]"></i><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i></div></div>`;
                    }
                });
            });
            
            baseSb.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - totalMins;
                    if (diff > 0 && diff < minSb) minSb = diff;
                    if (diff >= -9 && diff <= 9) {
                        let pos = Math.max(0, Math.min(100, 50 - (diff * (50/9))));
                        // 修正：同樣將南下列車上移，錯開軌道下方文字
                        sbHTML += `<div class="absolute top-[8px] sm:top-[12px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;"><div class="bg-white text-themeBlue rounded-full shadow-md border-2 border-blue-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i><i class="fa-solid fa-caret-right text-[10px]"></i></div></div>`;
                    }
                });
            });

            container.innerHTML = nbHTML + sbHTML;
            const updateText = (el, diff, unitId) => {
                const u = document.getElementById(unitId);
                if (Math.ceil(diff) <= 1 && Math.ceil(diff) >= 0) {
                    el.innerText = '進站中'; el.className = 'text-2xl sm:text-3xl font-black text-red-400 animate-pulse mt-1.5 w-full text-center tracking-widest';
                    if(u) u.style.display = 'none';
                } else {
                    el.innerText = Math.ceil(diff); el.className = el.id.includes('north') ? 'text-3xl sm:text-4xl font-black text-themeGreen font-mono w-10 text-center' : 'text-3xl sm:text-4xl font-black text-themeBlue font-mono w-10 text-center';
                    if(u) u.style.display = 'inline';
                }
            };
            updateText(nbEl, minNb, 'mrt-unit-north'); updateText(sbEl, minSb, 'mrt-unit-south');
        }

                        let avatar = item.img || `https://ui-avatars.com/api/?name=${item.name}&background=random&color=fff`;
                        if(isLocal) {
                            return `<a href="${item.link}" target="_blank" class="flex-1 min-w-[140px] max-w-[240px] flex flex-col bg-white rounded-[2rem] p-5 shadow-cute border-2 border-gray-100 hover:border-pink-200 transition-all hover:-translate-y-2 text-center relative overflow-hidden"><div class="w-20 h-20 rounded-full mx-auto mb-3 overflow-hidden"><img src="${avatar}" class="w-full h-full object-cover"></div><h4 class="font-black text-gray-800 line-clamp-2 mb-4">${item.name}</h4><div class="w-full ${btnCls} py-2 rounded-xl text-sm font-black mt-auto"><i class="fa-brands ${icon}"></i> 點擊進入</div></a>`;
                        }
                        return `<a href="${item.link}" target="_blank" class="bg-white rounded-[1.5rem] p-4 shadow-sm border-2 border-gray-100 flex justify-between items-center group hover:-translate-y-1 hover:border-pink-200"><div class="flex-1 pr-2"><h4 class="font-black text-gray-800 line-clamp-2 mb-2 group-hover:text-themePink">${item.name}</h4><span class="bg-gray-500 text-white text-[10px] px-2 py-1 rounded-lg">${snsType}</span></div><div class="w-14 h-14 rounded-full overflow-hidden shrink-0"><img src="${avatar}" class="w-full h-full object-cover"></div></a>`;
                    }).join('');
                    html += `<div class="bg-white rounded-[2.5rem] p-8 shadow-cute border-4 border-blue-50 flex flex-col h-full"><h3 class="text-xl font-black text-themeBlue mb-6 border-b-4 border-blue-100 pb-3 inline-block shrink-0">${catName}</h3><div class="${isLocal?'flex flex-wrap justify-center':'grid grid-cols-1 sm:grid-cols-[repeat(auto-fit,minmax(260px,1fr))]'} gap-4 relative z-10">${itemsHtml}</div></div>`;
                }
                container.innerHTML = html;
            });
        }

        function fetchBuildingData() {
            loadSharedBuildingData().then(data => {
                const container = document.getElementById('buildings-list-container');
                const tagsCont = document.getElementById('village-tags-container');
                if(!container) return;
                const grouped = {}; data.forEach(i => { if(!grouped[i.village]) grouped[i.village]=[]; grouped[i.village].push(i); });
                let html = '', tags = '';
                for(const [vName, items] of Object.entries(grouped)) {
                    tags += `<button onclick="document.getElementById('v-${vName}').scrollIntoView({behavior:'smooth'})" class="py-2 px-4 bg-white border-2 border-gray-100 font-black rounded-xl hover:bg-gray-50">${vName}</button>`;
                    html += `<div id="v-${vName}" class="bg-white rounded-[2.5rem] p-6 border-4 border-gray-100 scroll-mt-[100px]"><h3 class="text-xl font-black text-gray-600 mb-4 border-b-2 pb-2">${vName} (${items.length})</h3><div class="flex flex-wrap gap-3">` + items.map(i => `<div class="bg-gray-50 p-2 rounded-2xl flex items-center gap-3"><div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center">${i.img?`<img src="${i.img}" class="w-full h-full object-cover">`:'<i class="fa-solid fa-building text-gray-300"></i>'}</div><span class="font-bold text-sm">${i.name}</span></div>`).join('') + `</div></div>`;
                }
                container.innerHTML = html; if(tagsCont) tagsCont.innerHTML = tags;
            });
        }

        function updateNavStyles(pageId) {
            ['food', 'shopping', 'medical', 'explore'].forEach(id => {
                const btn = document.getElementById('nav-btn-' + id);
                if(btn) btn.className = `nav-btn px-4 py-2 rounded-full font-bold transition-all ` + (id===pageId ? `bg-theme${id==='food'?'Pink':id==='shopping'?'Yellow':id==='medical'?'Green':'Purple'} text-white shadow-md scale-105` : `text-gray-500 hover:bg-gray-100`);
            });
        }
        function toggleMobileMenu() { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function toggleShareForm() { const f = document.getElementById('share-form-container'); f.classList.toggle('hidden'); if(!f.classList.contains('hidden')) setTimeout(() => f.scrollIntoView({behavior:'smooth', block:'center'}), 150); }

    </script>
</body>
</html>
