        // --- 學區查詢功能 ---
        function checkSchoolDistrict() {
            const input = document.getElementById('address-checker-input');
            const msgBox = document.getElementById('district-result-msg');

            if (!input || !msgBox) return;

            const rawQuery = input.value.trim();
            if (!rawQuery) {
                msgBox.innerHTML = '<span class="text-red-500 font-bold">請輸入路名或里名進行查詢。</span>';
                msgBox.classList.remove('hidden');
                resetSchoolHighlight();
                return;
            }

            const searchQuery = rawQuery.replace(/[０-９]/g, function (s) {
                return String.fromCharCode(s.charCodeAt(0) - 65248);
            });

            const KNOWN_ROADS = ["文桃路", "文華路", "文信路", "文工一路", "樂善二路", "文吉路", "牛角坡路", "樂善一路", "樂善三路", "文化一路", "華亞三路", "文化二路", "樂善街", "樂學路", "樂學一路", "文達路", "樂學二路", "文明路", "文德二路", "文康街", "文德路", "樂學三路", "文青路", "文藝街", "文青二路", "樹人路", "中坑街"];
            let matchedRoadInQuery = KNOWN_ROADS.find(r => searchQuery.includes(r));

            let matchedOldVillage = "";
            let matchedNewVillage = "";
            let exactMatchKey = null;

            const getNewVillageMap = (road) => {
                if (!road) return null;
                if (['文桃路', '樂善二路', '牛角坡路', '文吉路', '樂善一路', '樂善三路'].includes(road)) return '文桃里';
                if (['文青二路'].includes(road)) return '文樂里';
                if (['文藝街'].includes(road)) return '文藝里';
                if (['文德二路', '文德路', '文康街'].includes(road)) return '長樂里';
                return null;
            };

            if (matchedRoadInQuery) {
                let candidateKeys = Object.keys(ADVANCED_ROAD_DISTRICTS).filter(k => k.includes(matchedRoadInQuery));

                let houseNumber = null;
                const numberMatch = searchQuery.match(/(\d+)號/);
                if (numberMatch) houseNumber = parseInt(numberMatch[1], 10);

                for (let key of candidateKeys) {
                    const rules = ADVANCED_ROAD_DISTRICTS[key];
                    for (let rule of rules) {
                        let isMatch = false;
                        if (rule.type === 'all') {
                            isMatch = true;
                        } else if (houseNumber !== null) {
                            const inRange = houseNumber >= rule.min && houseNumber <= rule.max;
                            if (rule.type === 'range' && inRange) isMatch = true;
                            else if (rule.type === 'odd' && inRange && houseNumber % 2 !== 0) isMatch = true;
                            else if (rule.type === 'even' && inRange && houseNumber % 2 === 0) isMatch = true;
                        }

                        if (isMatch) {
                            if (rule.type !== 'all') {
                                exactMatchKey = key;
                                matchedOldVillage = rule.village;
                                matchedNewVillage = getNewVillageMap(matchedRoadInQuery) || matchedOldVillage;
                                break;
                            } else if (!exactMatchKey) {
                                exactMatchKey = key;
                                matchedOldVillage = rule.village;
                                matchedNewVillage = getNewVillageMap(matchedRoadInQuery) || matchedOldVillage;
                            }
                        }
                    }
                    if (exactMatchKey && ADVANCED_ROAD_DISTRICTS[exactMatchKey].some(r => r.type !== 'all' && houseNumber !== null && houseNumber >= r.min && houseNumber <= r.max)) {
                        break;
                    }
                }
            } else {
                if (searchQuery.includes('文桃')) { matchedOldVillage = '樂善里'; matchedNewVillage = '文桃里'; }
                else if (searchQuery.includes('文藝')) { matchedOldVillage = '文青里'; matchedNewVillage = '文藝里'; }
                else if (searchQuery.includes('文樂')) { matchedOldVillage = '文青里'; matchedNewVillage = '文樂里'; }
                else if (searchQuery.includes('長樂')) { matchedOldVillage = '文青里/樂善里'; matchedNewVillage = '長樂里'; }
                else if (searchQuery.includes('文青')) { matchedOldVillage = '文青里'; matchedNewVillage = '文青里'; }
                else if (searchQuery.includes('樂善') || searchQuery.includes('牛角坡')) { matchedOldVillage = '樂善里'; matchedNewVillage = '樂善里'; }
                else if (searchQuery.includes('文化') || searchQuery.includes('明德') || searchQuery.includes('大華')) { matchedOldVillage = '文化里'; matchedNewVillage = '文化里'; }
                else if (searchQuery.includes('長庚')) { matchedOldVillage = '長庚里'; matchedNewVillage = '長庚里'; }
                else if (searchQuery.includes('大崗') || searchQuery.includes('大湖') || searchQuery.includes('公西') || searchQuery.includes('坪頂')) { matchedOldVillage = '大崗里'; matchedNewVillage = '大崗里'; }
                else if (searchQuery.includes('文德')) { matchedOldVillage = '文德里'; matchedNewVillage = '文德里'; }
                else if (searchQuery.includes('舊路') || searchQuery.includes('楓樹') || searchQuery.includes('兔坑')) { matchedOldVillage = '舊路里'; matchedNewVillage = '舊路里'; }
                else {
                    msgBox.innerHTML = `<p class="text-gray-500 font-bold"><i class="fa-solid fa-circle-question mr-2 text-orange-400"></i> 找不到對應路名或里名，建議輸入「路名與號碼」（如：文化一路105號）或「里名」。</p>`;
                    msgBox.classList.remove('hidden');
                    resetSchoolHighlight();
                    return;
                }
            }

            let inputLinMatch = searchQuery.match(/第?(\d+)鄰/);
            let roadLinMatch = exactMatchKey ? exactMatchKey.match(/第?(\d+)鄰/) : null;

            let explicitLin = null;
            if (inputLinMatch) {
                explicitLin = `第 ${inputLinMatch[1]} 鄰`;
            } else if (roadLinMatch) {
                explicitLin = `第 ${roadLinMatch[1]} 鄰`;
            }

            let oldLin = explicitLin ? explicitLin : '(未提供 / 依戶政為準)';
            let newLin = explicitLin ? `${explicitLin} <span class="text-[10px] text-green-600/70 font-normal ml-1">(依戶政新編為準)</span>` : '(分鄰重整中 / 依戶政為準)';

            msgBox.classList.remove('hidden');

            msgBox.innerHTML = `
                <div class="flex flex-col gap-3">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <div class="bg-gray-50 p-3.5 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden">
                            <div class="absolute -right-2 -bottom-2 text-4xl text-gray-100 pointer-events-none z-0"><i class="fa-solid fa-clock-rotate-left"></i></div>
                            <div class="relative z-10">
                                <span class="text-[10px] bg-gray-400 text-white px-2 py-0.5 rounded font-black mb-2 inline-block">原先劃分</span>
                                <div class="font-black text-gray-600 flex items-center">行政里：<span class="text-gray-800 text-lg ml-1">${matchedOldVillage}</span></div>
                                <div class="font-bold text-gray-500 text-xs sm:text-sm mt-1 flex items-center">行政鄰：<span class="ml-1">${oldLin}</span></div>
                            </div>
                        </div>
                        <div class="bg-green-50 p-3.5 rounded-xl border border-green-200 shadow-sm relative overflow-hidden">
                            <div class="absolute -right-2 -bottom-2 text-4xl text-green-100 pointer-events-none z-0"><i class="fa-solid fa-map-location-dot"></i></div>
                            <div class="relative z-10">
                                <span class="text-[10px] bg-themeGreen text-white px-2 py-0.5 rounded font-black mb-2 inline-block">現在劃分</span>
                                <div class="font-black text-gray-800 flex items-center">行政里：<span class="text-themeGreen text-xl ml-1">${matchedNewVillage}</span></div>
                                <div class="font-bold text-green-600 text-xs sm:text-sm mt-1 flex items-center">行政鄰：<span class="ml-1">${newLin}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            highlightSchoolsByVillage(matchedNewVillage);
        }

        function highlightSchoolsByVillage(village) {
            const schoolCards = document.querySelectorAll('#school .group');
            let found = false;

            schoolCards.forEach(card => {
                const text = card.textContent;
                if (text.includes(village) || text.includes(village.replace('里', ''))) {
                    card.classList.add('ring-4', 'ring-themeGreen', 'ring-offset-2');
                    card.classList.remove('opacity-50');
                    found = true;
                } else {
                    card.classList.remove('ring-4', 'ring-themeGreen', 'ring-offset-2');
                    card.classList.add('opacity-50');
                }
            });

            if (!found) {
                resetSchoolHighlight();
                const msgEl = document.getElementById('district-result-msg');
                if (msgEl) {
                    const originalHtml = msgEl.innerHTML;
                    msgEl.innerHTML = originalHtml + `<div class="mt-3 pt-3 border-t border-green-50 text-orange-500 font-bold text-sm"><i class="fa-solid fa-circle-exclamation mr-1.5"></i>目前清單中尚無明確標示屬於「${village}」的學區，建議直接聯繫區公所確認喔！</div>`;
                }
            }
        }

                         onclick="toggleDrinkSelection(event, '${item.name.replace(/'/g, "\\'")}')">
                        <div class="flex flex-col gap-0.5 overflow-hidden">
                            <div class="text-[9px] text-pink-300 font-black tracking-widest uppercase opacity-70">OFFICIAL VOTE</div>
                            <div class="font-black text-gray-800 text-xs sm:text-sm truncate pr-1 transition-colors ${isSelected ? 'text-pink-600' : 'group-hover:text-pink-500'}" title="${item.name}">${formatAwardName(item.name)}</div>
                        </div>
                        <div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0 ${isSelected ? 'bg-pink-500' : 'bg-gray-50/50'} transition-all duration-300 shadow-sm">
                            <i class="fa-solid fa-heart ${isSelected ? 'text-white scale-125' : 'text-gray-200 group-hover:text-pink-200 group-hover:scale-110'} text-xs transition-all"></i>
                        </div>
                    </div>`;
            }).join('');

            container.style.display = 'block';
            content.innerHTML = `
                <div class="flex flex-col relative z-20 w-full animate-fade-in">
                    <div class="flex flex-col md:flex-row items-center justify-between border-b border-pink-100/50 pb-4 mb-4 gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 bg-gradient-to-br from-pink-400 to-pink-600 rounded-2xl flex items-center justify-center text-white shadow-xl rotate-3 shrink-0">
                                <i class="fa-solid fa-trophy text-2xl"></i>
                            </div>
                            <div class="text-center md:text-left">
                                <h3 class="text-2xl sm:text-2xl font-black text-gray-800 tracking-[0.1em] relative z-10 px-2 font-serif">首屆 A7 搖霸大賞 🥤 誰才是龜山最強手搖？</h3>
                                <p class="text-[10px] sm:text-xs text-pink-400 font-bold tracking-[0.2em] uppercase mt-1">SELECT YOUR FAVORITES • 即日起至4/30截止 • </p>
                            </div>
                        </div>
                        <div id="selection-counter" class="bg-white/80 backdrop-blur px-5 py-2.5 rounded-2xl border-2 border-pink-100 shadow-sm flex items-center gap-3">
                            <span class="text-xs font-black text-gray-400">已選取心儀店家</span>
                            <span class="text-xl font-black text-pink-500 leading-none">${selectedDrinkStores.length}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 2xl:grid-cols-7 gap-3 sm:gap-4 mb-4">
                        ${candidatesHtml}
                    </div>

                    <div class="relative py-2">
                        <div class="absolute inset-0 flex items-center justify-center opacity-[0.03] pointer-events-none scale-150">
                            <i class="fa-solid fa-trophy text-[200px]"></i>
                        </div>
                        <div class="flex flex-col items-center relative z-10">
                            <button onclick="confirmDrinkVote(event)" 
                                    id="btn-submit-drink-vote"
                                    class="w-full sm:w-80 group bg-gradient-to-r from-gray-200 to-gray-300 text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 relative overflow-hidden cursor-not-allowed" 
                                    disabled>
                                <span class="relative z-10 text-lg">正式送出大賞投票</span>
                                <i class="fa-solid fa-paper-plane relative z-10 text-sm group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                            </button>
                            <p class="text-[11px] text-gray-400 font-bold mt-2 tracking-widest"><i class="fa-solid fa-hand-pointer mr-1 animate-bounce"></i> 選取喜歡的店家後按鈕將會解鎖</p>
                        </div>
                    </div>
                </div>`;

            updateSubmitButtonState();
        }


        window.toggleDrinkSelection = function (event, storeName) {
            if (isDrinkSubmitted) return;
            const idx = selectedDrinkStores.indexOf(storeName);
            if (idx === -1) {
                selectedDrinkStores.push(storeName);
                // 噴發愛心特效
                for (let i = 0; i < 5; i++) {
                    const heart = document.createElement('i');
                    heart.className = 'fa-solid fa-heart rising-heart';
                    const offset = (Math.random() - 0.5) * 40;
                    heart.style.left = (event.clientX + offset) + 'px';
                    heart.style.top = (event.clientY + (Math.random() * -20)) + 'px';
                    heart.style.fontSize = (0.5 + Math.random()) + 'rem';
                    heart.style.opacity = (0.5 + Math.random() * 0.5);
                    heart.style.animationDelay = (i * 0.05) + 's';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 800);
                }
            } else {
                selectedDrinkStores.splice(idx, 1);
            }
            window.initDrinkVoting();
        }

        function updateSubmitButtonState() {
            const btn = document.getElementById('btn-submit-drink-vote');
            if (!btn) return;
            if (selectedDrinkStores.length > 0) {
                btn.disabled = false;
                btn.classList.remove('from-gray-200', 'to-gray-300', 'cursor-not-allowed');
                btn.classList.add('from-pink-500', 'to-pink-600', 'gold-pulse', 'cursor-pointer', 'hover:-translate-y-1', 'hover:shadow-pink-400/50');
            } else {
                btn.disabled = true;
                btn.classList.remove('from-pink-500', 'to-pink-600', 'gold-pulse', 'cursor-pointer', 'hover:-translate-y-1', 'hover:shadow-pink-400/50');
                btn.classList.add('from-gray-200', 'to-gray-300', 'cursor-not-allowed');
            }
        }



        window.confirmDrinkVote = async function (event) {
            if (selectedDrinkStores.length === 0) return;
            const btn = event.currentTarget || document.getElementById('btn-submit-drink-vote');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> 正在傳送大賞選票...`;
            btn.disabled = true;
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyH7yhuVfi-Ajb0u9hwob8plKXqvm2Bbas4H-TFiDFQ2_aKmZQI6vhfHJyvLO7xhB1WA/exec';
            const timeString = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
            try {
                const promises = selectedDrinkStores.map(storeName => {
                    if (!globalLikesData[storeName]) globalLikesData[storeName] = { users: [] };
                    if (!globalLikesData[storeName].users.includes(currentUserId)) {
                        globalLikesData[storeName].users.push(currentUserId);
                    }
                    return fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ storeName, userId: currentUserId, action: 'like', timestamp: timeString })
                    });
                });
                await Promise.all(promises);
                localStorage.setItem('a7club_drink_submitted', 'true');
                localStorage.setItem('a7club_likes_cache', JSON.stringify(globalLikesData));
                isDrinkSubmitted = true;


                setTimeout(() => {
                    window.initDrinkVoting();
                    if (typeof renderFoodRankings === 'function') renderFoodRankings(globalFoodData, globalLikesData);
                }, 1000);
            } catch (e) {
                console.error('大賞提交失敗', e);
                btn.disabled = false;
                btn.innerText = '再次嘗試提交選票';
            }
        }
    function openMugoThreadsModal() {
    // 1. 先呼叫通用開窗函式，圖片網址傳空值
    openStoreModal(
        '沐菓 MUGO BAKERY', 
        '全新開幕', 
        'bg-[#80CFFF]', 
        '', 
        '桃園市龜山區樂善一路9號', 
        '12:00 - 19:00 (售完為止)', 
        '', 
        'https://www.threads.net/@mugo_bakery/post/DXYOes0EiFW'
    );

    // 2. 針對沐菓隱藏圖片區塊
    const imgContainer = document.getElementById('store-modal-img-container');
    if (imgContainer) {
        imgContainer.style.display = 'none'; // 隱藏圖片區域
    }

    // 3. 注入 Threads 貼文並調整顯示樣式
    const descContainer = document.getElementById('store-modal-desc');
    if (descContainer) {
        descContainer.innerHTML = `
            <div class="w-full flex justify-center py-2 overflow-hidden rounded-2xl">
                <iframe 
                    src="https://www.threads.net/@mugo_bakery/post/DXYOes0EiFW/embed" 
                    width="100%" 
                    height="500" 
                    frameborder="0" 
                    scrolling="no" 
                    allowtransparency="true"
                    class="rounded-xl border border-gray-100 shadow-inner">
                </iframe>
            </div>
            <p class="mt-4 text-pink-500 font-black text-center text-sm">
                ✨ 出示此貼文給闆娘看，即可獲得招待鮮奶茶！
            </p>
        `;
    }

    // 4. 隱藏評分區塊，讓視覺更簡潔
    const ratingContainer = document.getElementById('store-modal-rating-container');
    if (ratingContainer) {
        ratingContainer.style.display = 'none';
    }
}
    </script>
</body>
