<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機捷柒號站 - A7生活入口網</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
          Search, MapPin, Coffee, Utensils, ShoppingBag, 
          Bus, Train, Stethoscope, BookOpen, Users, 
          Menu, X, ChevronRight, Star, Clock, Heart, 
          Navigation, Info, Home, ArrowRight, Filter,
          Car, Loader, ImageIcon, PlusCircle, ExternalLink,
          Table, RefreshCw, AlertCircle, Hash, Store, RefreshCcw, Sparkles, Plus, Check, Mountain,
          MessageCircle, Facebook, QrCode, Map as MapIcon, Send, Bot, User
        } from 'https://esm.sh/lucide-react@0.300.0';

        // --- Custom Icons ---
        const LineIcon = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className} xmlns="http://www.w3.org/2000/svg">
            <path d="M22 10.8C22 5.8 17.5 1.8 12 1.8C6.5 1.8 2 5.8 2 10.8C2 13.9 4 16.6 6.8 18.2C7 18.5 7 19.3 6.8 20.3C6.7 20.9 7.4 21.3 7.8 20.9C9.8 19.1 11.9 17.5 12 17.5H12.1C17.5 17.5 22 14.5 22 10.8Z" />
          </svg>
        );

        const ThreadsIcon = ({ size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className} xmlns="http://www.w3.org/2000/svg">
            <path d="M12.7 11.5C12.5 9.7 11.2 8.8 9.8 8.8C8.2 8.8 7 10.1 7 12C7 13.8 8.2 15.3 9.9 15.3C11.1 15.3 12.2 14.6 12.6 13.2L12.7 11.5ZM16.6 12C16.6 15.9 14.4 19 10.9 19C7.8 19 5.2 16.7 5.2 13.2C5.2 9.9 7.6 7.3 10.9 7.3C13.2 7.3 14.9 8.5 15.7 10.1H17.3C16.2 7.4 13.2 4.7 9.8 4.7C4.4 4.7 0 8.7 0 13.7C0 19.1 4.4 21.8 9.8 21.8C14 21.8 18 19.1 18 13.5V12.2H16.4V12H16.6Z" fillRule="evenodd" clipRule="evenodd"/>
          </svg>
        );

        // --- API Key ---
        const apiKey = ""; 

        // --- Data Sources ---
        const DATA_SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=643173606&single=true&output=csv";
        const FOOD_SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv";
        const SHOPPING_SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1279676556&single=true&output=csv";
        const SERVICES_SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv";
        const MEDICAL_SOURCE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv";

        const COMMUNITY_SOURCE_CSV = SERVICES_SOURCE_CSV; 
        const FORM_URL = "https://forms.gle/6R41TfuCMcJKry6N8";

        const FALLBACK_STORE_CSV = `店名,在地店家類型,地址,備註,美食分類,照片,機能分類
        YiPin Pasta 義品料理,義式料理,桃園市龜山區文青路137號 (家樂福1F),機器人送餐、親子友善,西式料理,,美食
        荖子鍋 家樂福文青店,火鍋,桃園市龜山區文青路137號 (家樂福1F),製麵機DIY、飲料喝到飽,中式料理,,美食`;

        const FALLBACK_COMMUNITY_CSV = `社群名稱,類型,說明,人數
        A7重劃區大小事,Line OpenChat,綜合討論、生活情報交流,5200+`;

        const INITIAL_STATS = [
          { id: 'total', label: '全部', count: 0, color: 'text-slate-800' }, 
          { id: 'medical', label: '醫療', count: 0, color: 'text-red-500' },
          { id: 'food', label: '美食', count: 0, color: 'text-orange-500' },
          { id: 'life', label: '生活', count: 0, color: 'text-blue-500' },
          { id: 'edu', label: '教育', count: 0, color: 'text-purple-500' },
          { id: 'spot', label: '景點', count: 0, color: 'text-green-600' },
        ];

        const NEARBY_SPOTS = [
          { id: 1, name: '林口三井 Outlet', time: '12分', distance: '4.4km', type: '購物' },
          { id: 2, name: 'Global Mall A8', time: '8分', distance: '2.5km', type: '生活' },
          { id: 3, name: 'Global Mall A9', time: '11分', distance: '4.1km', type: '影城' },
        ];

        const NEWS_POOL = [
          { 
            id: 1, 
            tag: '生活', 
            title: '龜山A7重劃區「買菜難」市府規劃新興市場改善', 
            date: '2025-11-20',
            link: 'https://news.housefun.com.tw/news/article/492981477151.html'
          },
          { 
            id: 2, 
            tag: '交通', 
            title: '機捷A7站變一道路開工！內政部補助預計118年完工', 
            date: '2025-10-16',
            link: 'https://tw.news.yahoo.com/%E6%A1%83%E6%A9%9F%E6%8D%B7a7%E7%AB%99%E8%AE%8A-%E9%81%93%E8%B7%AF%E9%96%8B%E5%B7%A5-%E5%85%A7%E6%94%BF%E9%83%A8%E8%A3%9C%E5%8A%A912-1%E5%84%84%E5%85%83-%E9%A0%90%E8%A8%88118%E5%B9%B4%E4%B8%8A%E5%8D%8A%E5%B9%B4%E5%AE%8C%E5%B7%A5-070900709.html'
          }
        ];

        // --- Helpers ---
        const getCategoryColor = (categoryName) => {
          if (!categoryName) return 'bg-slate-100 text-slate-600 border border-slate-200';
          const name = categoryName.toLowerCase();
          
          if (name.includes('line')) return 'bg-[#06C755] text-white border border-[#06C755]';
          if (name.includes('threads')) return 'bg-black text-white border border-black';
          if (name.includes('facebook') || name.includes('fb')) return 'bg-[#1877F2] text-white border border-[#1877F2]';
          
          if (name.includes('團購')) return 'bg-orange-50 text-orange-600 border border-orange-200';
          if (name.includes('親子') || name.includes('育兒')) return 'bg-pink-50 text-pink-600 border border-pink-200';
          if (name.match(/早午餐|早餐|brunch/)) return 'bg-amber-100 text-amber-800 border border-amber-200';
          if (name.match(/牙醫|眼科|小兒|中醫/)) return 'bg-teal-50 text-teal-600 border border-teal-200';
          if (name.match(/診所|藥局/)) return 'bg-rose-50 text-rose-600 border border-rose-200';
          
          return 'bg-slate-100 text-slate-600 border border-slate-200';
        };

        const parseCSV = (text) => {
          const rows = [];
          let currentRow = [];
          let currentVal = '';
          let insideQuote = false;
          for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i+1];
            if (char === '"') {
              if (insideQuote && nextChar === '"') { currentVal += '"'; i++; } else { insideQuote = !insideQuote; }
            } else if (char === ',' && !insideQuote) {
              currentRow.push(currentVal); currentVal = '';
            } else if ((char === '\r' || char === '\n') && !insideQuote) {
              if (char === '\r' && nextChar === '\n') i++;
              currentRow.push(currentVal); rows.push(currentRow); currentRow = []; currentVal = '';
            } else { currentVal += char; }
          }
          if (currentVal || currentRow.length > 0) { currentRow.push(currentVal); rows.push(currentRow); }
          return rows;
        };

        // --- Hooks ---
        const useGoogleSheetData = () => {
          const [data, setData] = useState([]);
          const [stats, setStats] = useState(INITIAL_STATS);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          const parseSheetContent = (csvText, sourceContext = 'general') => {
              const rows = parseCSV(csvText);
              if (rows.length === 0) return [];
              const header = rows[0].map(col => (col || '').trim());
              const getIndex = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
              
              const idxName = getIndex(['店名', '名稱', 'Title', 'Name', '社群名稱', '診所名稱']);
              
              let idxCat = -1;
              if (sourceContext === 'medical_section') {
                 idxCat = getIndex(['店家類型', '科別', '分類']);
              } else {
                 idxCat = getIndex(['機能分類', '屬性', '主題標籤', 'Tag', '分類', 'Category']);
              }
              
              const idxFoodCat = getIndex(['美食分類', 'Food Category']); 
              const idxAddr = getIndex(['地址', 'Address', '連結', 'Link']);
              const idxPhoto = getIndex(['照片', '圖片', 'Image', 'Photo']);
              const idxMap = getIndex(['Google', '地圖', 'Map']);
              const idxDesc = getIndex(['備註', '說明', 'Description', '人數']);

              if (idxName === -1) return [];

              return rows.slice(1).map((row, i) => {
                if (!row[idxName]) return null;
                const category = (idxCat !== -1 && row[idxCat]) ? row[idxCat].trim() : (sourceContext === 'medical_section' ? '醫療診所' : '其他');
                const foodCategory = (idxFoodCat !== -1 ? (row[idxFoodCat] || '') : '').trim();
                let mainType = 'life';

                if (sourceContext === 'food') mainType = 'food';
                else if (sourceContext === 'shopping') mainType = 'store';
                else if (sourceContext === 'services') mainType = 'medical'; 
                else if (sourceContext === 'medical_section') mainType = 'medical';
                else {
                    if (category.match(/診所|藥局|牙醫|眼科/)) mainType = 'medical';
                    else if (category.match(/餐|食|飯|麵|飲|咖啡|早午餐/)) mainType = 'food';
                }

                let foodType = '其他美食';
                if (mainType === 'food') {
                  if (foodCategory) foodType = foodCategory;
                  else if ((category + row[idxName]).match(/早午餐|早餐/)) foodType = '早午餐';
                }

                const tags = category ? category.split(/[,/，、\s]+/).map(t => t.trim()).filter(Boolean) : [];
                let address = row[idxAddr] || 'A7重劃區';
                let mapLink = (idxMap !== -1 && row[idxMap]) ? row[idxMap] : null;
                
                if (sourceContext === 'services' && (address.startsWith('http') || address.startsWith('www'))) {
                    mapLink = address; address = '線上服務/社群'; 
                }

                return {
                  id: `${sourceContext}-${i}`,
                  name: row[idxName] || '未命名',
                  address: address,
                  category: category,
                  mainType: mainType,
                  foodType: foodType,
                  photo: row[idxPhoto] || null,
                  mapLink: mapLink,
                  desc: row[idxDesc] || '',
                  tags: tags,
                  source: sourceContext
                };
              }).filter(item => item !== null);
          };

          const fetchData = async () => {
            setLoading(true);
            try {
              const [resGeneral, resFood, resShopping, resServices, resMedical] = await Promise.allSettled([
                  fetch(DATA_SOURCE_CSV).then(r => r.text()),
                  fetch(FOOD_SOURCE_CSV).then(r => r.text()),
                  fetch(SHOPPING_SOURCE_CSV).then(r => r.text()),
                  fetch(SERVICES_SOURCE_CSV).then(r => r.text()),
                  fetch(MEDICAL_SOURCE_CSV).then(r => r.text())
              ]);

              let combinedData = [];
              if (resGeneral.status === 'fulfilled') combinedData = [...combinedData, ...parseSheetContent(resGeneral.value, 'general')];
              if (resFood.status === 'fulfilled') combinedData = [...combinedData, ...parseSheetContent(resFood.value, 'food')];
              if (resShopping.status === 'fulfilled') combinedData = [...combinedData, ...parseSheetContent(resShopping.value, 'shopping')];
              if (resServices.status === 'fulfilled') combinedData = [...combinedData, ...parseSheetContent(resServices.value, 'services')];
              if (resMedical.status === 'fulfilled') combinedData = [...combinedData, ...parseSheetContent(resMedical.value, 'medical_section')];

              const uniqueData = Array.from(new Map(combinedData.map(item => [item.name, item])).values());
              setData(uniqueData);
              
              // Calc stats
              const counts = { total: 0, medical: 0, food: 0, life: 0, spot: 0, edu: 0 };
              uniqueData.forEach(item => {
                counts.total++;
                if (counts[item.mainType] !== undefined) counts[item.mainType]++; else counts.life++;
              });
              setStats([
                { id: 'total', label: '全部', count: counts.total, color: 'text-slate-800' }, 
                { id: 'medical', label: '醫療', count: counts.medical, color: 'text-red-500' },
                { id: 'food', label: '美食', count: counts.food, color: 'text-orange-500' },
                { id: 'life', label: '生活', count: counts.life, color: 'text-blue-500' },
                { id: 'edu', label: '教育', count: counts.edu, color: 'text-purple-500' },
                { id: 'spot', label: '景點', count: counts.spot, color: 'text-green-600' },
              ]);
              setError(null);
            } catch (err) {
              console.warn("Fetch failed", err);
              try {
                const fallbackData = parseSheetContent(FALLBACK_STORE_CSV, 'fallback');
                setData(fallbackData);
              } catch (e) { setError("資料讀取失敗"); }
            } finally { setLoading(false); }
          };

          useEffect(() => { fetchData(); }, []);
          return { data, stats, loading, error, refetch: fetchData };
        };

        const useCommunityData = () => {
          const [groups, setGroups] = useState([]);
          const [loading, setLoading] = useState(true);

          useEffect(() => {
            const fetchCommunityData = async () => {
              try {
                const response = await fetch(COMMUNITY_SOURCE_CSV);
                if (!response.ok) throw new Error('Network error');
                const text = await response.text();
                
                const rows = parseCSV(text);
                if (rows.length === 0) return;
                const header = rows[0].map(col => (col || '').trim());
                const getIndex = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
                const idxName = getIndex(['名稱', 'Title', 'Name', '社群名稱']);
                const idxDesc = getIndex(['說明', 'Description', '備註']);
                const idxLink = getIndex(['連結', 'Link', 'URL']);
                const idxCount = getIndex(['人數', '成員', 'Member']);
                const idxType = getIndex(['類型', 'Type', 'Tag', '屬性', '機能分類']);
                
                if (idxName === -1) return;

                const parsedGroups = rows.slice(1).map((row, i) => {
                  if (!row[idxName]) return null;
                  const name = row[idxName];
                  const type = row[idxType] || '';
                  let icon = Users;
                  let color = "bg-blue-500";
                  
                  if (name.includes('Line') || type.includes('Line')) { icon = LineIcon; color = "bg-[#06C755]"; }
                  else if (name.includes('Facebook') || name.includes('FB')) { icon = Facebook; color = "bg-[#1877F2]"; }
                  else if (name.includes('Threads')) { icon = ThreadsIcon; color = "bg-black"; }

                  return {
                    id: i, title: name, sub: row[idxDesc] || '點擊加入', link: row[idxLink] || '#',
                    memberCount: row[idxCount], icon, color, type
                  };
                }).filter(Boolean);
                setGroups(parsedGroups);
              } catch (e) { console.warn("Community fetch failed"); } 
              finally { setLoading(false); }
            };
            fetchCommunityData();
          }, []);

          return { groups, loading };
        };

        // --- Components ---
        const CountUp = ({ end, duration = 2000 }) => {
          const [count, setCount] = useState(0);
          useEffect(() => { setCount(end); }, [end]);
          return <span>{count}</span>;
        };

        const SectionTitle = ({ title, subtitle }) => (
          <div className="mb-6 border-l-4 border-purple-600 pl-4">
            <h2 className="text-2xl font-bold text-slate-800">{title}</h2>
            {subtitle && <p className="text-slate-500 text-sm mt-1">{subtitle}</p>}
          </div>
        );

        const Card = ({ children, className = "", onClick }) => (
          <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow ${className} ${onClick ? 'cursor-pointer' : ''}`}>
            {children}
          </div>
        );

        const Badge = ({ children, className = "" }) => (
          <span className={`px-2 py-1 rounded-md text-xs font-medium transition-colors ${className}`}>
            {children}
          </span>
        );

        const GroupCard = ({ title, sub, icon: Icon, color, link, memberCount, type }) => (
          <div onClick={() => window.open(link, '_blank')} className="bg-white p-4 rounded-xl border border-slate-200 hover:border-purple-300 hover:shadow-md transition-all cursor-pointer flex items-center gap-4 group">
            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white ${color} shadow-sm group-hover:scale-110 transition-transform`}>
              <Icon size={24} />
            </div>
            <div className="flex-1">
              <h4 className="font-bold text-slate-800 text-base line-clamp-1">{title}</h4>
              <p className="text-xs text-slate-500 mt-0.5 line-clamp-1">{sub}</p>
              {memberCount && <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded mt-1 inline-block">約 {memberCount} 人</span>}
            </div>
            <div className="flex flex-col items-end gap-2">
               <Badge className={getCategoryColor(type || '')}>{type || '社群'}</Badge>
               {link && link !== '#' && (
                 <div className="bg-white p-1 rounded shadow-sm border border-slate-100 group-hover:border-purple-200 transition-colors">
                   <img src={`https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=${encodeURIComponent(link)}`} alt="QR Code" className="w-10 h-10" />
                 </div>
               )}
            </div>
          </div>
        );

        const EventCard = ({ date, title, location, tag }) => (
          <div className="flex gap-4 items-start p-3 hover:bg-slate-50 rounded-lg transition-colors border-b border-slate-100 last:border-0">
            <div className="flex flex-col items-center min-w-[50px] bg-purple-50 text-purple-700 rounded-lg p-2">
              <span className="text-xs font-bold uppercase">{date.split(' ')[0]}</span>
              <span className="text-lg font-bold">{date.split(' ')[1]}</span>
            </div>
            <div>
              <div className="flex items-center gap-2 mb-1">
                <span className="text-[10px] px-1.5 py-0.5 rounded border border-purple-200 text-purple-600 bg-white">{tag}</span>
                <h4 className="font-bold text-slate-800 text-sm line-clamp-1">{title}</h4>
              </div>
              <div className="flex items-center gap-1 text-xs text-slate-500">
                <MapIcon size={12} /> {location}
              </div>
            </div>
          </div>
        );

        const PollCard = () => {
          const [voted, setVoted] = useState(false);
          const handleVote = () => setVoted(true);

          return (
            <div className="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
              <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
              <div className="relative z-10">
                <div className="flex items-center gap-2 mb-4">
                  <span className="bg-white/20 backdrop-blur-md px-2 py-1 rounded text-xs font-bold flex items-center gap-1"><Star size={12} /> 本週熱門話題</span>
                </div>
                <h3 className="text-xl font-bold mb-4">A7 最迫切需要的公共建設是？</h3>
                {!voted ? (
                  <div className="space-y-3">
                    {['大型圖書館/親子館', '公有零售市場', '更多公園綠地', 'YouBike 站點加密'].map((opt, i) => (
                      <button key={i} onClick={handleVote} className="w-full text-left bg-white/10 hover:bg-white/20 border border-white/20 rounded-lg px-4 py-3 text-sm font-medium transition-all flex justify-between items-center group">
                        {opt}<span className="opacity-0 group-hover:opacity-100 transition-opacity">投票</span>
                      </button>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-4 animate-fade-in">
                    {[{ opt: '大型圖書館/親子館', pct: 45 }, { opt: '公有零售市場', pct: 25 }, { opt: '更多公園綠地', pct: 20 }, { opt: 'YouBike 站點加密', pct: 10 }].map((item, i) => (
                      <div key={i}>
                        <div className="flex justify-between text-xs mb-1 opacity-90"><span>{item.opt}</span><span>{item.pct}%</span></div>
                        <div className="h-2 bg-black/20 rounded-full overflow-hidden"><div className="h-full bg-white/90 rounded-full" style={{ width: `${item.pct}%` }}></div></div>
                      </div>
                    ))}

          return (
            <div className="space-y-8">
              <div className="rounded-3xl px-8 py-16 text-white relative overflow-hidden shadow-xl" style={{ backgroundImage: 'url("https://www.farglory-realty.com.tw/wp-content/uploads/2025/11/%E8%8F%AF%E4%BA%9E%E5%9C%92%E5%8D%801-1-1367x1024.jpg")', backgroundSize: 'cover', backgroundPosition: 'center' }}>
                <div className="absolute inset-0 bg-slate-900/60"></div>
                <div className="relative z-10 max-w-2xl">
                  <h1 className="text-4xl font-bold mb-4">發現 A7 新生活</h1>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-3">
                {[{ icon: Utensils, label: '美食攻略', page: 'food', color: 'text-purple-600 bg-purple-50' }, { icon: ShoppingBag, label: '逛街購物', page: 'shopping', color: 'text-blue-600 bg-blue-50' }, { icon: Users, label: '在地服務', page: 'community', color: 'text-indigo-600 bg-indigo-50' }].map((item, idx) => (
                  <button key={idx} onClick={() => onChangePage(item.page)} className="flex flex-col items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md transition-all">
                    <div className={`p-3 rounded-full mb-2 ${item.color}`}><item.icon size={24} /></div>
                    <span className="font-bold text-slate-800">{item.label}</span>
                  </button>
                ))}
              </div>
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div className="flex justify-between mb-4">
                   <h3 className="font-bold text-lg text-slate-800 flex gap-2"><MapIcon/> A7 商圈店家統計</h3>
                   <button onClick={refetch}><RefreshCw size={16} className={loading?"animate-spin":""}/></button>
                </div>
                <div className="grid grid-cols-6 gap-2 text-center">
                   {stats.map(s => <div key={s.id} className="p-2 bg-slate-50 rounded"><div className="font-bold text-xl">{s.count}</div><div className="text-xs text-slate-500">{s.label}</div></div>)}
                </div>
              </div>
              <div className="grid md:grid-cols-2 gap-8">
                 <div className="bg-white rounded-xl shadow-md border-t-4 border-t-pink-500 p-5 h-full flex flex-col justify-center items-center text-center">
                    <h3 className="font-bold text-lg mb-4 text-slate-800 flex items-center gap-2"><MapPin className="text-pink-500"/> 附近熱門商圈</h3>
                    <button onClick={handleGetLocation} className="w-full bg-slate-50 hover:bg-pink-50 border border-dashed border-slate-300 hover:border-pink-300 rounded-xl p-8 flex flex-col items-center gap-3 transition-all group">
                       <MapIcon size={48} className="text-slate-300 group-hover:text-pink-500 transition-colors" />
                       <span className="font-bold text-slate-500 group-hover:text-pink-600">📍 點擊立即探索離您最近的熱門去處</span>
                    </button>
                 </div>
                 <div className="bg-white rounded-xl shadow-md border-t-4 border-t-blue-500 p-5">
                    <h3 className="font-bold text-lg mb-4 text-slate-800">最新生活消息</h3>
                    <div className="space-y-4">
                      {NEWS_POOL.slice(0,3).map(n => <a key={n.id} href={n.link} target="_blank" className="block p-3 bg-slate-50 rounded hover:bg-blue-50 transition-colors"><div className="text-xs text-slate-500">{n.date}</div><div className="font-bold text-slate-800">{n.title}</div></a>)}
                    </div>
                 </div>
              </div>
            </div>
          );
        };

        const App = () => {
          const [currentPage, setCurrentPage] = useState('home');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const sheetData = useGoogleSheetData();
          const communityData = useCommunityData();

          useEffect(() => { window.scrollTo(0, 0); setIsMobileMenuOpen(false); }, [currentPage]);

          const navLinks = [
            { id: 'home', label: '首頁' },
            { id: 'food', label: '美食攻略' },
            { id: 'shopping', label: '找買情報' },
            { id: 'services', label: '生活服務' },
            { id: 'community', label: '社群互動' },
            { id: 'overview', label: '區域概覽' },
          ];

          const renderPage = () => {
            switch (currentPage) {
              case 'home': return <HomeView onChangePage={setCurrentPage} sheetData={sheetData} />;
              case 'food': return <FoodView sheetData={sheetData} />;
              case 'shopping': return <ShoppingView sheetData={sheetData} />;
              case 'overview': return <OverviewView />;
              case 'community': return <CommunityView communityData={communityData} sheetData={sheetData} />;
              case 'services': return <ServicesView sheetData={sheetData} />;
              case 'browse': return <BrowseView sheetData={sheetData} />;
              default: return <div className="text-center py-20">頁面建置中... <button onClick={() => setCurrentPage('home')} className="text-blue-500">回首頁</button></div>;
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
              <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 shadow-sm">
                <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentPage('home')}>
                    <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-xl flex items-center justify-center text-white font-bold">A7</div>
                    <span className="text-xl font-bold">機捷柒號站</span>
                  </div>
                  <nav className="hidden md:flex gap-6">
                    {navLinks.map(link => <button key={link.id} onClick={() => setCurrentPage(link.id)} className={`text-sm font-medium ${currentPage === link.id ? 'text-purple-600' : 'text-slate-600 hover:text-purple-600'}`}>{link.label}</button>)}
                  </nav>
                  <button className="md:hidden" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>{isMobileMenuOpen ? <X /> : <Menu />}</button>
                </div>
                {isMobileMenuOpen && <div className="md:hidden bg-white border-t p-4 space-y-3">{navLinks.map(link => <button key={link.id} onClick={() => setCurrentPage(link.id)} className="block w-full text-left p-2 rounded hover:bg-slate-50">{link.label}</button>)}</div>}
              </header>
              <main className="container mx-auto px-4 py-6 min-h-[80vh]">{renderPage()}</main>
              <AiAssistant sheetData={sheetData} />
              <footer className="bg-slate-800 text-slate-300 py-10 mt-10">
                <div className="container mx-auto px-4 grid md:grid-cols-4 gap-8">
                  <div>
                    <div className="flex items-center gap-2 mb-2 text-white">
                      <div className="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center font-bold">柒</div>
                      <span className="text-xl font-bold">機捷柒號</span>
                    </div>
                    <p className="text-sm text-slate-400">專為 A7 重劃區居民打造的生活指南，整合食衣住行育樂資訊，讓你輕鬆探索新生活。</p>
                  </div>
                  <div>
                    <h4 className="text-white font-bold mb-4">聯絡我們</h4>
                    <p className="text-sm mb-2">有新開店家要推薦？歡迎投稿！</p>
                    <button className="bg-purple-600 text-white px-4 py-2 rounded text-sm hover:bg-purple-700 transition-colors shadow-lg shadow-purple-900/50">
                      聯絡 @kao4rina
                    </button>
                  </div>
                </div>
                <div className="container mx-auto px-4 mt-8 pt-8 border-t border-slate-700 text-center text-xs text-slate-500">
                  © 2025 A7 Life Hub. All rights reserved. 非官方資訊平台，僅供參考。
                </div>
              </footer>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
