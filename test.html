    <script>
        tailwind.config = {
            theme: {
                extend: {

                        sans: ['Nunito', '"Noto Sans TC"', 'sans-serif'],

                    colors: {
                        themePink: '#FF9EBB',

    <style>
        body { 
            background-color: #FDFBF7; 
            /* 可愛的圓點背景 */
            background-image: radial-gradient(#FF9EBB 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
        /* 自訂可愛滾動條 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FF9EBB; border-radius: 10px; border: 2px solid #FDFBF7; }
        ::-webkit-scrollbar-thumb:hover { background: #ff7eb3; }

        /* 隱藏橫向滾動條(強制一列時使用) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 頁面切換動畫 */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 標籤氣球動畫 */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        
        /* 愛心點擊的跳動動畫 */
        .heart-beat { animation: heartBeat 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        
        /* 數字跳動的字體強調 */
        .num-counter { font-family: 'Nunito', sans-serif; font-variant-numeric: tabular-nums; }

        /* --- Leaflet 客製化樣式 --- */
        .leaflet-popup-content-wrapper { border-radius: 1.5rem !important; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1) !important; padding: 4px !important; }
        .leaflet-popup-content { margin: 10px !important; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        
        /* 為 Leaflet Popup 關閉按鈕加上白色圓形底圖與陰影 */
        .leaflet-popup-close-button { 
            top: 10px !important; 
            right: 12px !important; 
            color: #FF9EBB !important; 
            background-color: white !important; 
            border-radius: 50% !important; 
            width: 24px !important; 
            height: 24px !important; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;
            text-align: center !important;
            line-height: 24px !important;
            font-size: 16px !important;
            font-weight: 900 !important;
            padding: 0 !important;
            z-index: 100 !important;
        }
        .leaflet-popup-close-button:hover { background-color: #FF9EBB !important; color: white !important; }
        
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background-color: rgba(255, 158, 187, 0.5) !important; }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(255, 158, 187, 0.9) !important; color: white !important; font-family: 'Nunito', sans-serif !important; font-weight: 900 !important;
        }

        .custom-leaflet-icon-dynamic .fa-solid { margin-bottom: 2px; margin-right: 1px; }

        .leaflet-tooltip.custom-tooltip { background-color: white; color: #FF9EBB; font-weight: 900; border-radius: 0.5rem; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 4px 10px; font-family: 'Nunito', '"Noto Sans TC"', sans-serif; }
        .leaflet-tooltip.custom-tooltip::before { border-top-color: white; }

        /* 水滴圖標動畫 */
        .floating-marker { animation: floatMarker 2.5s ease-in-out infinite; }
        @keyframes floatMarker {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        
        /* 恢復圖標彈跳動畫 */
        .bounce-marker { animation: bounceMarker 0.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite; }
        @keyframes bounceMarker {
            0% { transform: translateY(0px) scale(1, 1); }
            45% { transform: translateY(-12px) scale(0.95, 1.05); }
            100% { transform: translateY(0px) scale(1, 1); }
        }
        
        /* Toast 提示框動畫 */
        .toast-enter { animation: slideInUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .toast-leave { animation: fadeOutDown 0.3s ease-in forwards; }
        @keyframes slideInUp {
            from { transform: translate(-50%, 100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes fadeOutDown {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 100%); opacity: 0; }
        }
    </style>
</head>

    <!-- JavaScript 路由與注入邏輯 -->
    <script>
        let globalMrtInterval = null;
        let foodMapInstance = null;
        let foodClusterGroup = null;
        let foodMarkersMap = {}; 
        let activeFoodMarkerName = null;

        // ========================================================
        // 💖 愛心評分系統邏輯 (Like System)
        // ========================================================
        
        let globalLikesData = {}; // 存放所有店家的總愛心數 { "店家A": 10, "店家B": 5 }
        let userLikes = {};       // 存放當前使用者按讚的狀態 { "店家A": true }
        let isVoting = {};        // 防連點鎖定狀態
        
        const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwpzgiPb4sKncl1Zd_PQVUKkRSn2D5-7_A8cNpxw3QD5rjklKGyw31MMdR6mRS5Ysyu3g/exec"; 

        // 取得或生成使用者的專屬 ID (存於瀏覽器 localStorage)
        function getUserId() {
            let uid = localStorage.getItem('a7_user_id');
            if (!uid) {
                // 產生簡易設備指紋 (Device Fingerprint) 增加灌票難度
                const nav = window.navigator;
                const screen = window.screen;
                const fpString = nav.userAgent + nav.language + screen.colorDepth + screen.width + screen.height;
                let hash = 0;
                for (let i = 0; i < fpString.length; i++) {
                    hash = ((hash << 5) - hash) + fpString.charCodeAt(i);
                    hash |= 0;
                }
                const deviceFp = 'DEV' + Math.abs(hash).toString(36);
                
                // 結合 UUID 與設備指紋
                const randomStr = typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
                uid = `USER_${deviceFp}_${randomStr}`;
                localStorage.setItem('a7_user_id', uid);
            }
            return uid;
        }

        // 顯示 Toast 提示
        function showToast(message, isSuccess = true) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            
            const toast = document.createElement('div');
            const bgColor = isSuccess ? 'bg-white' : 'bg-red-50';
            const textColor = isSuccess ? 'text-themePink' : 'text-red-500';
            const icon = isSuccess ? '<i class="fa-solid fa-heart mr-2"></i>' : '<i class="fa-solid fa-circle-exclamation mr-2"></i>';
            const borderColor = isSuccess ? 'border-pink-200' : 'border-red-200';
            
            toast.className = `${bgColor} ${textColor} border-2 ${borderColor} px-5 py-3 rounded-full shadow-cute font-black text-sm sm:text-base flex items-center toast-enter pointer-events-auto`;
            toast.innerHTML = `${icon} ${message}`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // 啟動時讀取 Google Sheet CSV 內的按讚紀錄
        async function loadLikesData() {
            const likesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1295636704&single=true&output=csv';
            try {
                const res = await fetch(likesCsvUrl);
                const csvText = await res.text();
                const rows = parseCSV(csvText).slice(1);
                const currentUid = getUserId();
                
                const date = new Date();
                const curYear = String(date.getFullYear());
                const curMonth = String(date.getMonth() + 1);

                globalLikesData = {};
                userLikes = {};
                
                let localHistory = JSON.parse(localStorage.getItem('a7_likes_history') || '{}');

                rows.forEach(row => {
                    if (row.length < 2) return;
                    const rowUid = row[0] ? row[0].trim() : '';
                    const storeName = row[1] ? row[1].trim() : '';
                    const rowYear = row[2] ? String(row[2]).trim() : '';
                    const rowMonth = row[3] ? String(row[3]).trim() : '';
                    if (!storeName) return;

                    globalLikesData[storeName] = (globalLikesData[storeName] || 0) + 1;

                    if (rowUid === currentUid && rowYear === curYear && rowMonth === curMonth) {
                        userLikes[storeName] = true;
                        localHistory[storeName] = `${curYear}-${curMonth.padStart(2, '0')}`;
                    }
                });
                
                localStorage.setItem('a7_likes_history', JSON.stringify(localHistory));
            } catch (e) {
                console.warn("載入愛心資料失敗或無資料", e);
            }
        }

        // 切換按讚狀態並傳送資料
        async function toggleLike(storeName) {
            // 防連點機制：如果正在處理中，直接返回
            if (isVoting[storeName]) return;
            isVoting[storeName] = true;

            try {
                const uid = getUserId();
                const date = new Date();
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const currentMonthStr = `${year}-${String(month).padStart(2, '0')}`;
                
                let history = JSON.parse(localStorage.getItem('a7_likes_history') || '{}');
                const lastClickedMonth = history[storeName];

                if (lastClickedMonth === currentMonthStr || userLikes[storeName]) {
                    showToast("下次等你來捧場 🙌", false);
                    return;
                }

                history[storeName] = currentMonthStr;
                localStorage.setItem('a7_likes_history', JSON.stringify(history));
                
                userLikes[storeName] = true;
                globalLikesData[storeName] = (globalLikesData[storeName] || 0) + 1;
                
                updateLikeUI(storeName);
                showToast("感謝您的支持 💖", true);

                if (APPS_SCRIPT_WEB_APP_URL) {
                    try {
                        const formData = new URLSearchParams();
                        formData.append('userId', uid);
                        formData.append('storeName', storeName);
                        formData.append('year', year);
                        formData.append('month', month);
                        formData.append('action', 'like');

                        fetch(APPS_SCRIPT_WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: formData.toString()
                        }).then(response => {
                            console.log('愛心紀錄發送成功 (Opaque Response)');
                        }).catch(error => {
                            console.error('發送愛心紀錄失敗', error);
                        });
                    } catch(e) {
                        console.error("發送愛心紀錄發生例外錯誤", e);
                    }
                } else {
                    console.log(`[模擬寫入試算表] 使用者: ${uid} | 店家: ${storeName} | 年月: ${year}/${month} | 動作: 按讚`);
                }
            } finally {
                // 延遲解除鎖定，避免極限連點發送多餘請求
                setTimeout(() => {
                    isVoting[storeName] = false;
                }, 1000);
            }
        }

        // 動態更新畫面的愛心數量與狀態
        function updateLikeUI(storeName) {
            const buttons = document.querySelectorAll(`.like-btn[data-store="${storeName.replace(/"/g, '&quot;')}"]`);
            const isLiked = userLikes[storeName];
            const count = globalLikesData[storeName] || 0;

            buttons.forEach(btn => {
                const icon = btn.querySelector('i.fa-heart');
                const countSpan = btn.querySelector('.like-count');
                if (!icon || !countSpan) return;

                if (isLiked) {
                    icon.classList.remove('text-pink-200');
                    icon.classList.add('text-themePink', 'heart-beat');
                    countSpan.classList.remove('text-gray-400');
                    countSpan.classList.add('text-pink-600');
                    btn.classList.remove('bg-white', 'border-pink-100');
                    btn.classList.add('bg-pink-50', 'border-pink-200');
                    setTimeout(() => icon.classList.remove('heart-beat'), 400); 
                } else {

        // === 相關輔助工具 (CSV 解析、Modal 開關) ===
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret.filter(r => r.join('').trim() !== '');
        }

        function getFoodStyleByCategory(categoryName) {
            if (!categoryName) return FOOD_CATEGORY_STYLES[FOOD_CATEGORY_STYLES.length - 1];
            for (let style of FOOD_CATEGORY_STYLES) {
                if (style.keywords.some(kw => categoryName.includes(kw))) return style;

        function loadSharedFoodData() {
            return new Promise((resolve, reject) => {
                if (globalFoodData) return resolve(globalFoodData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=1150395419&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    const nameIdx = Math.max(0, headers.findIndex(k => k.includes('店') || k.includes('名')));
                    const catIdx = Math.max(0, headers.findIndex(k => k.includes('分類') || k.includes('類別')));
                    const addressIdx = Math.max(0, headers.findIndex(k => k.includes('地址') || k.includes('位置')));
                    const imgIdx = Math.max(0, headers.findIndex(k => k.includes('照片') || k.includes('圖片')));
                    const statusIdx = headers.findIndex(k => k.includes('審核') || k.includes('狀態'));
                    const latIdx = headers.findIndex(k => k.includes('緯度') || k.toLowerCase().includes('lat'));
                    const lngIdx = headers.findIndex(k => k.includes('經度') || k.toLowerCase().includes('lng'));

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] || '未命名',
                            category: row[catIdx] || '未分類',
                            address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx] : '',
                            img: imgIdx !== -1 && row[imgIdx] && row[imgIdx].startsWith('http') ? row[imgIdx].trim() : '',
                            lat: latIdx !== -1 && row[latIdx] ? parseFloat(row[latIdx]) : null,
                            lng: lngIdx !== -1 && row[lngIdx] ? parseFloat(row[lngIdx]) : null,
                            status: statusIdx !== -1 ? row[statusIdx] : 'OK'
                        };
                    }).filter(item => item.name !== '未命名');

                    globalFoodData = parsedData.filter(item => {
                        if (statusIdx === -1) return true;
                        const s = String(item.status).toUpperCase().trim();
                        return s.includes('OK') || s === 'V' || s === 'O' || s.includes('是') || s === 'TRUE' || s === 'Y';
                    });
                    resolve(globalFoodData);
                }).catch(reject);
            });
        }

            if (tagsContainer) tagsContainer.innerHTML = tagsHtml;

                container.innerHTML = '<div class="col-span-full text-center text-gray-400 font-bold py-8">這個分類還沒有店家喔！</div>';
                return;

            foodMarkersMap = {};

                <div onclick="updateFoodMap('${item.address.replace(/'/g, "\\'")}', '${item.name.replace(/'/g, "\\'")}', ${item.lat || null}, ${item.lng || null}, '${item.category.replace(/'/g, "\\'")}')" class="bg-white p-3 md:p-4 rounded-3xl shadow-cute flex flex-row items-stretch gap-3 md:gap-4 hover:-translate-y-1 transition-transform cursor-pointer border border-pink-50 group relative mt-2 h-full">

                        ${item.category}

                    <div class="w-20 h-20 sm:w-24 sm:h-24 ${style.bgColor.replace('bg-', 'bg-').replace('400', '50')}/60 rounded-2xl overflow-hidden shrink-0 shadow-inner relative flex items-center justify-center border-2 border-white self-center">
                        ${imgContent}

                    <div class="flex flex-col flex-1 min-w-0 justify-center relative">
                        <div class="flex flex-col justify-center flex-1 pr-12 pb-1">
                            <h4 class="font-bold text-gray-800 text-base sm:text-lg group-hover:text-themePink transition-colors leading-snug break-words mb-1.5">${formatStoreName(item.name)}</h4>
                            <p class="text-xs text-gray-500 font-bold flex items-start"><i class="fa-solid fa-location-dot mt-0.5 mr-1.5 text-pink-400 shrink-0"></i><span class="break-words line-clamp-2">${formatAddress(item.address)}</span></p>
                        </div>
                        
                        <div class="absolute bottom-0 right-0 shrink-0">
                            ${getLikesHtml(item.name)}

        let globalMedicalData = null;

        function loadSharedMedicalData() {
            return new Promise((resolve, reject) => {
                if (globalMedicalData) return resolve(globalMedicalData);
                const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=368795626&single=true&output=csv';
                fetch(csvUrl).then(res => res.text()).then(csvText => {
                    const rows = parseCSV(csvText);
                    if (rows.length < 2) return resolve([]);
                    const headers = rows[0];
                    let nameIdx = headers.findIndex(k => k.includes('名稱') || k.includes('機構')); if (nameIdx === -1) nameIdx = 0; 
                    let catIdx = headers.findIndex(k => k.includes('醫療分類')); if (catIdx === -1) catIdx = 8;
                    let addressIdx = headers.findIndex(k => k.includes('地址'));
                    let phoneIdx = headers.findIndex(k => k.includes('電話'));
                    let licenseIdx = 14; 

                    let parsedData = rows.slice(1).map(row => {
                        return {
                            name: row[nameIdx] ? row[nameIdx].trim() : '',
                            category: row[catIdx] ? row[catIdx].trim() : '其他醫療',
                            address: addressIdx !== -1 && row[addressIdx] ? row[addressIdx].trim() : '',
                            phone: phoneIdx !== -1 && row[phoneIdx] ? row[phoneIdx].trim() : '',
                            license: row[licenseIdx] ? row[licenseIdx].trim() : ''
                        };
                    }).filter(item => item.name !== '');

                    globalMedicalData = parsedData;
                    resolve(globalMedicalData);
                }).catch(reject);
            });
        }

        function fetchAndUpdateHomeCounts() {
            Promise.all([loadSharedFoodData(), loadSharedShoppingData(), loadSharedMedicalData(), loadSharedCommunityData()])
            .then(([foodData, shoppingData, medicalData, communityData]) => {
                const counts = {
                    'counter-food': foodData.length, 'counter-shopping': shoppingData.length,
                    'counter-medical': medicalData.length, 'counter-explore': communityData.length,
                    'counter-total': foodData.length + shoppingData.length + medicalData.length + communityData.length
                };
                for (const [id, target] of Object.entries(counts)) {
                    const counter = document.getElementById(id);
                    if (counter && target > 0) animateSingleCounter(counter, target);
                    else if (counter) counter.innerText = '0';
                }
            }).catch(e => console.error(e));
        }

        function animateSingleCounter(counter, target) {
            const duration = 2000, totalFrames = Math.round(duration / (1000/60));
            let currentFrame = 0;
            const easeOutExpo = t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
            const updateCounter = () => {
                currentFrame++;
                const currentVal = Math.round(target * easeOutExpo(currentFrame / totalFrames));
                counter.innerText = currentVal;
                if (currentFrame < totalFrames) requestAnimationFrame(updateCounter);
                else counter.innerText = target; 
            };
            counter.innerText = '0'; requestAnimationFrame(updateCounter);
        }

        function updateMRTStatus() {
            const container = document.getElementById('mrt-track-container');
            const nbEl = document.getElementById('mrt-time-north'), sbEl = document.getElementById('mrt-time-south');
            if (!container || !nbEl || !sbEl) return;
            const now = new Date(), totalMins = now.getMinutes() + now.getSeconds() / 60;
            const baseNb = [5, 20, 35, 50], baseSb = [10, 25, 40, 55];
            let nbHTML = '', sbHTML = '', minNb = 999, minSb = 999;
            
            baseNb.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - totalMins;
                    if (diff > 0 && diff < minNb) minNb = diff;
                    if (diff >= -9 && diff <= 9) {
                        let pos = Math.max(0, Math.min(100, 50 + (diff * (50/9))));
                        nbHTML += `<div class="absolute -top-[16px] sm:-top-[20px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;"><div class="bg-white text-themeGreen rounded-full shadow-md border-2 border-green-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-caret-left text-[10px]"></i><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i></div></div>`;
                    }
                });
            });
            
            baseSb.forEach(arr => {
                [-60, 0, 60].forEach(offset => {
                    let diff = (arr + offset) - totalMins;
                    if (diff > 0 && diff < minSb) minSb = diff;
                    if (diff >= -9 && diff <= 9) {
                        let pos = Math.max(0, Math.min(100, 50 - (diff * (50/9))));
                        sbHTML += `<div class="absolute top-[8px] sm:top-[12px] -translate-x-1/2 z-20 transition-all duration-1000" style="left: ${pos}%;"><div class="bg-white text-themeBlue rounded-full shadow-md border-2 border-blue-200 flex items-center justify-center relative px-2 py-1 gap-1 animate-pulse"><i class="fa-solid fa-train-subway text-xs sm:text-sm"></i><i class="fa-solid fa-caret-right text-[10px]"></i></div></div>`;
                    }
                });
            });

            container.innerHTML = nbHTML + sbHTML;
            const updateText = (el, diff, unitId) => {
                const u = document.getElementById(unitId);
                if (Math.ceil(diff) <= 1 && Math.ceil(diff) >= 0) {
                    el.innerText = '進站中'; el.className = 'text-2xl sm:text-3xl font-black text-red-400 animate-pulse mt-1.5 w-full text-center tracking-widest';
                    if(u) u.style.display = 'none';
                } else {
                    el.innerText = Math.ceil(diff); el.className = el.id.includes('north') ? 'text-3xl sm:text-4xl font-black text-themeGreen font-mono w-10 text-center' : 'text-3xl sm:text-4xl font-black text-themeBlue font-mono w-10 text-center';
                    if(u) u.style.display = 'inline';
                }
            };
            updateText(nbEl, minNb, 'mrt-unit-north'); updateText(sbEl, minSb, 'mrt-unit-south');
        }

            let textColorClass = state === 'clicked' ? 'text-red-500' : style.textColor;
            let anim = isBouncing ? 'bounce-marker' : 'floating-marker';
            const html = `<div class="relative flex flex-col items-center justify-start w-[48px] h-[64px] pt-1"><div class="${anim} flex flex-col items-center relative z-10 w-full" style="filter: drop-shadow(0 4px 5px rgba(0,0,0,0.25)) drop-shadow(0 0 2px rgba(255,255,255,0.8));"><div class="relative w-[36px] h-[36px] ${bgColorClass} flex items-center justify-center z-10 transition-colors mt-[2px]" style="border-radius: 50% 50% 50% 0; transform: rotate(-45deg);"><div class="w-[22px] h-[22px] bg-white rounded-full flex items-center justify-center shadow-sm" style="transform: rotate(45deg);"><i class="fa-solid ${style.iconClass} ${textColorClass} text-[11px] mt-[1px]"></i></div></div></div><div class="absolute bottom-[9px] w-5 h-1.5 bg-black/25 rounded-[50%] blur-[1.5px] scale-x-[1.5] z-0"></div></div>`;
            return L.divIcon({ className: 'custom-leaflet-icon-dynamic bg-transparent border-0', html: html, iconSize: [48, 64], iconAnchor: [24, 60], popupAnchor: [0, -45] });
        }

        let userLocationMarker = null;
        function locateUserOnFoodMap() {
            if (!foodMapInstance || !navigator.geolocation) return;
            const btnIcon = document.getElementById('location-btn-icon');
            if(btnIcon) { btnIcon.classList.remove('fa-crosshairs'); btnIcon.classList.add('fa-spinner', 'fa-spin'); }
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                foodMapInstance.flyTo([lat, lng], 18, { animate: true });
                if (!userLocationMarker) userLocationMarker = L.marker([lat, lng], {icon: L.divIcon({ className: 'user-location-icon', html: `<div class="w-4 h-4 bg-blue-500 rounded-full border-2 border-white shadow-md relative"><div class="absolute inset-0 bg-blue-500 rounded-full animate-ping opacity-75"></div></div>`, iconSize: [16, 16], iconAnchor: [8, 8] }), zIndexOffset: 1000}).addTo(foodMapInstance);
                else userLocationMarker.setLatLng([lat, lng]);
                if(btnIcon) { btnIcon.classList.remove('fa-spinner', 'fa-spin'); btnIcon.classList.add('fa-crosshairs', 'text-themeBlue'); }
            }, () => { if(btnIcon) { btnIcon.classList.remove('fa-spinner', 'fa-spin'); btnIcon.classList.add('fa-crosshairs'); } });
        }

        async function updateFoodMap(address, name, preLat, preLng, category) {
            if (foodMarkersMap[name]) {
                const marker = foodMarkersMap[name];
                if (activeFoodMarkerName && activeFoodMarkerName !== name && foodMarkersMap[activeFoodMarkerName]) {
                    const prevMarker = foodMarkersMap[activeFoodMarkerName];
                    if (prevMarker.bounceTimeout) clearTimeout(prevMarker.bounceTimeout);
                    prevMarker.setIcon(getCategoryIcon(prevMarker.category, 'normal', false));
                }
                activeFoodMarkerName = name;
                foodMapInstance.flyTo(marker.getLatLng(), 18, { animate: true, duration: 1.5 });
                foodMapInstance.once('moveend', () => {
                    foodClusterGroup.zoomToShowLayer(marker, () => {
                        marker.openPopup();
                        marker.setIcon(getCategoryIcon(category, 'clicked', true));
                        if (marker.bounceTimeout) clearTimeout(marker.bounceTimeout);
                        marker.bounceTimeout = setTimeout(() => { if (foodMarkersMap[name] && activeFoodMarkerName === name) marker.setIcon(getCategoryIcon(category, 'clicked', false)); }, 5000);
                    });
                });
            }
        }

        let globalCommunityData = null, globalBuildingData = null;
        function loadSharedCommunityData() {
            return new Promise((resolve) => {
                if (globalCommunityData) return resolve(globalCommunityData);
                fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=369381822&single=true&output=csv')
                .then(res => res.text()).then(txt => {
                    const rows = parseCSV(txt);
                    // 修正：表單中的連結在 D 欄 (index 3)
                    globalCommunityData = rows.slice(1).map(row => ({ 
                        name: row[0] ? row[0].trim() : '', 
                        category: row[1] ? row[1].trim() : '其他', 
                        link: row[3] ? row[3].trim() : '#',  // 改為讀取 D 欄
                        img: (row[4] && row[4].match(/https?:\/\/[^\s]+/)) ? row[4].match(/https?:\/\/[^\s]+/)[0] : '' 
                    })).filter(i => i.name !== '');
                    resolve(globalCommunityData);
                }).catch(() => resolve([]));
            });
        }
        function loadSharedBuildingData() {
            return new Promise((resolve) => {
                if (globalBuildingData) return resolve(globalBuildingData);
                fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vTmr3ebvX4CeJ_Dc-TK_57zxqaVlXfI4CPVcgTAWAIKM29dtR-SqiFs93i2iz1ScwYEBcty8mlIxKYO/pub?gid=985024788&single=true&output=csv')
                .then(res => res.text()).then(txt => {
                    const rows = parseCSV(txt);
                    globalBuildingData = rows.slice(1).map(row => ({ name: row[0]?row[0].trim():'', village: row[1]?row[1].trim():'未分類', img: row[3]?row[3].trim():'' })).filter(i=>i.name!=='');
                    resolve(globalBuildingData);
                }).catch(() => resolve([]));
            });
        }

        function fetchCommunityData() {
            loadSharedCommunityData().then(data => {
                const container = document.getElementById('community-list-container');
                if(!container) return;
                const grouped = { '在地社群': [] };
                data.forEach(item => { const cat = item.category || '其他'; if(!grouped[cat]) grouped[cat]=[]; grouped[cat].push(item); });
                if(grouped['在地社群'].length===0) delete grouped['在地社群'];
                
                let html = '';
                for(const [catName, items] of Object.entries(grouped)) {
                    const isLocal = catName === '在地社群';
                    const itemsHtml = items.map(item => {
                        let snsType = 'Web', icon = 'fa-globe', btnCls = 'bg-themePink text-white';
                        const s = (item.name+' '+item.link).toUpperCase();
                        let snsBadgeClass = 'bg-gray-500 text-white';
                        let isLine = false;

                        if(s.includes('LINE')){ 
                            snsType='LINE'; icon='fa-line'; btnCls='bg-[#00B900] hover:bg-[#009900] text-white'; 
                            snsBadgeClass = 'bg-[#00B900] text-white';
                            isLine = true;
                        }
                        else if(s.includes('FB')||s.includes('FACEBOOK')){ 
                            snsType='FB'; icon='fa-facebook'; btnCls='bg-[#1877F2] hover:bg-[#166FE5] text-white'; 
                            snsBadgeClass = 'bg-[#1877F2] text-white';
                        }
                        else if(s.includes('THREADS')){
                            snsType = 'Threads'; icon = 'fa-threads'; btnCls = 'bg-black hover:bg-gray-800 text-white';
                            snsBadgeClass = 'bg-black text-white';
                        }
                        
                        let avatar = item.img;
                        if (!avatar) {
                            if (snsType === 'Threads') {
                                let initials = "TH"; 
                                let cleanName = item.name.replace(/Threads/i, '').trim();
                                if(cleanName.length > 0) initials = Array.from(cleanName).slice(0, 2).join('');
                                avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(initials)}&background=000000&color=fff&size=150&bold=true&length=2`;
                            } else {
                                avatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff&size=150&font-size=0.35`;
                            }
                        }

                        if(isLocal) {
                            let displayId = "點擊進入";
                            if (snsType === 'Threads') displayId = "前往 Threads";
                            else if (snsType === 'LINE') displayId = "加入 LINE 社群";
                            else if (snsType === 'FB') displayId = "前往粉絲專頁";

                            return `<a href="${item.link}" target="_blank" class="flex-1 min-w-[140px] max-w-[240px] flex flex-col bg-white rounded-[2rem] p-5 shadow-cute border-2 border-gray-100 hover:border-pink-200 transition-all hover:-translate-y-2 text-center relative overflow-hidden"><div class="absolute -right-3 -bottom-3 text-6xl opacity-[0.03] text-gray-500 pointer-events-none"><i class="fa-brands ${icon}"></i></div><div class="w-20 h-20 rounded-full mx-auto mb-3 overflow-hidden shadow-sm border-2 border-gray-50"><img src="${avatar}" class="w-full h-full object-cover"></div><h4 class="font-black text-gray-800 line-clamp-2 leading-snug mb-4 group-hover:text-themePink transition-colors">${item.name}</h4><div class="w-full ${btnCls} py-2.5 rounded-xl text-xs sm:text-sm font-black mt-auto flex items-center justify-center gap-1.5 shadow-sm relative z-10"><i class="fa-brands ${icon}"></i> <span class="truncate">${displayId}</span></div></a>`;
                        }
                        
                        let rightSideContent = '';
                        if (isLine) {
                            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(item.link)}`;
                            rightSideContent = `<div class="hidden sm:flex w-14 h-14 md:w-16 md:h-16 rounded-xl overflow-hidden shrink-0 border border-dashed border-gray-200 p-1 bg-white group-hover:border-themePink transition-colors sm:ml-4 items-center justify-center"><img src="${qrUrl}" class="w-full h-full object-contain mix-blend-multiply opacity-90 group-hover:opacity-100 transition-opacity"></div>`;
                        } else {
                            rightSideContent = `<div class="hidden sm:flex w-12 h-12 md:w-14 md:h-14 rounded-full overflow-hidden shrink-0 border-2 border-gray-100 p-0.5 bg-gray-50 group-hover:border-themePink transition-colors shadow-sm sm:ml-4 items-center justify-center"><img src="${avatar}" class="w-full h-full object-cover rounded-full"></div>`;
                        }

                        // 修改其他社群卡片排版
                        return `
                            <a href="${item.link}" target="_blank" class="bg-white rounded-[1rem] sm:rounded-[1.5rem] p-2 sm:p-3 md:p-4 shadow-sm border-2 border-gray-100 flex flex-col sm:flex-row items-center justify-center sm:justify-between group hover:-translate-y-1 hover:border-pink-200 transition-all h-full sm:h-auto sm:w-fit">
                                <div class="flex flex-col items-center sm:items-start w-full sm:w-auto flex-1 min-w-0">
                                    <h4 class="font-black text-gray-800 text-[11px] sm:text-sm md:text-base mb-1.5 sm:mb-2 line-clamp-2 sm:line-clamp-none group-hover:text-themePink transition-colors text-center sm:text-left leading-tight sm:leading-snug w-full break-words">${item.name}</h4>
                                    <!-- 修正：確保標籤顏色正確套用 -->
                                    <div class="${snsBadgeClass} text-[9px] md:text-xs font-black px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-md sm:rounded-lg shadow-sm flex items-center justify-center w-fit mx-auto sm:mx-0 shrink-0">
                                        <i class="fa-brands ${icon} mr-1"></i> ${snsType}
                                    </div>
                                </div>
                                ${rightSideContent}
                            </a>
                        `;
                    }).join('');
                    
                    const catIcon = catName === '在地社群' ? 'fa-thumbtack text-red-400' : 'fa-hashtag text-themePink';
                    const catBorder = catName === '在地社群' ? 'border-red-50' : 'border-blue-50';
                    const catBgIcon = catName === '在地社群' ? 'text-red-100' : 'text-blue-100';
                    
                    const gridClass = isLocal ? 'flex flex-wrap justify-center' : 'grid grid-cols-3 sm:flex sm:flex-wrap';

                    html += `<div class="bg-white rounded-[2.5rem] p-6 md:p-8 shadow-cute border-4 ${catBorder} relative h-full flex flex-col"><div class="absolute -top-4 -right-4 ${catBgIcon} text-6xl floating z-0 pointer-events-none"><i class="fa-solid fa-users-rectangle"></i></div><h3 class="text-xl font-black text-themeBlue mb-6 border-b-4 border-blue-100 pb-3 inline-block relative z-10 shrink-0"><i class="fa-solid ${catIcon} mr-2"></i>${catName}</h3><div class="${gridClass} gap-2 sm:gap-3 md:gap-4 relative z-10 flex-1 content-start">${itemsHtml}</div></div>`;
                }
                container.innerHTML = html;
            });
        }

        function fetchBuildingData() {
            loadSharedBuildingData().then(data => {
                const container = document.getElementById('buildings-list-container');
                const tagsCont = document.getElementById('village-tags-container');
                if(!container) return;
                const grouped = {}; data.forEach(i => { if(!grouped[i.village]) grouped[i.village]=[]; grouped[i.village].push(i); });
                
                // 設定各行政里的專屬顏色配置
                function getVillageStyle(villageName) {
                    if (villageName.includes('文青')) return { border: 'border-orange-200', textTitle: 'text-orange-400', icon: 'fa-building', bg: 'bg-orange-50', iconColor: 'text-orange-300', activeIcon: 'text-orange-500', hoverBg: 'hover:bg-orange-50' };
                    if (villageName.includes('文藝')) return { border: 'border-sky-200', textTitle: 'text-sky-400', icon: 'fa-building', bg: 'bg-sky-50', iconColor: 'text-sky-300', activeIcon: 'text-sky-500', hoverBg: 'hover:bg-sky-50' };
                    if (villageName.includes('長樂')) return { border: 'border-green-200', textTitle: 'text-green-400', icon: 'fa-building', bg: 'bg-green-50', iconColor: 'text-green-300', activeIcon: 'text-green-500', hoverBg: 'hover:bg-green-50' };
                    if (villageName.includes('文化')) return { border: 'border-gray-300', textTitle: 'text-gray-400', icon: 'fa-building', bg: 'bg-gray-100', iconColor: 'text-gray-300', activeIcon: 'text-gray-500', hoverBg: 'hover:bg-gray-100' };
                    if (villageName.includes('文桃')) return { border: 'border-pink-300', textTitle: 'text-pink-400', icon: 'fa-building', bg: 'bg-pink-100', iconColor: 'text-pink-300', activeIcon: 'text-pink-500', hoverBg: 'hover:bg-pink-100' };
                    if (villageName.includes('樂善')) return { border: 'border-blue-200', textTitle: 'text-blue-400', icon: 'fa-building', bg: 'bg-blue-50', iconColor: 'text-blue-300', activeIcon: 'text-blue-500', hoverBg: 'hover:bg-blue-50' };
                    if (villageName.includes('文樂')) return { border: 'border-purple-300', textTitle: 'text-purple-500', icon: 'fa-building', bg: 'bg-purple-100', iconColor: 'text-purple-300', activeIcon: 'text-purple-500', hoverBg: 'hover:bg-purple-100' };
                    
                    // 預設樣式
                    return { border: 'border-gray-200', textTitle: 'text-gray-600', icon: 'fa-building', bg: 'bg-gray-50', iconColor: 'text-gray-300', activeIcon: 'text-gray-400', hoverBg: 'hover:bg-gray-50' };
                }

                let html = '', tagsHtml = '';
                
                for(const [vName, items] of Object.entries(grouped)) {
                    const style = getVillageStyle(vName);
                    const safeId = `village-${vName.replace(/\s+/g, '')}`;

                    // 更新標籤樣式，確保手機板也顯示背景和邊框 (移除 sm:bg-white 和 sm:border-2 的 sm 前綴限制)
                    tagsHtml += `
                        <button onclick="document.getElementById('${safeId}').scrollIntoView({behavior: 'smooth', block: 'start'})"
                                class="py-1 px-3 sm:px-4 md:px-5 sm:py-2.5 md:py-3 bg-white border-2 ${style.border} ${style.textTitle} font-black rounded-full md:rounded-2xl ${style.hoverBg} transition-all shadow-sm text-sm sm:text-base md:text-lg flex items-center justify-center sm:justify-start gap-2 md:gap-3 hover:-translate-y-1 w-auto text-center sm:text-left group">
                            <div class="hidden sm:flex w-6 h-6 md:w-8 md:h-8 rounded-full ${style.bg} items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
                                <i class="fa-solid ${style.icon} text-xs md:text-sm"></i>
                            </div>
                            <span class="tracking-wide whitespace-nowrap">${vName}</span>
                        </button>
                    `;

                    // 更新列表樣式，套用各里顏色
                    html += `
                        <div id="${safeId}" class="bg-white rounded-[2.5rem] shadow-cute p-6 border-4 ${style.border} hover:shadow-lg transition-shadow relative overflow-hidden scroll-mt-[100px]">
                            <div class="absolute -right-4 -bottom-4 text-6xl ${style.iconColor} opacity-50 pointer-events-none"><i class="fa-solid ${style.icon}"></i></div>
                            <div class="flex items-center justify-between mb-4 border-b-2 border-gray-100 pb-3 relative z-10">
                                <h3 class="text-xl font-black ${style.textTitle}">${vName} <span class="text-sm font-bold text-gray-400 ml-1">(${items.length})</span></h3>
                                <i class="fa-solid ${style.icon} text-2xl ${style.activeIcon}"></i>
                            </div>
                            <div class="flex flex-wrap gap-3 relative z-10">
                    `;
                    
                    html += items.map(i => `
                                <div class="${style.bg} p-2 rounded-2xl border border-white shadow-sm flex items-center gap-3 hover:-translate-y-1 transition-transform cursor-default w-auto min-w-[120px] max-w-full">
                                    <div class="w-12 h-12 shrink-0 rounded-xl overflow-hidden bg-white flex items-center justify-center border border-gray-100 shadow-inner">
                                        ${i.img ? `<img src="${i.img}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-building ${style.iconColor}"></i>`}
                                    </div>
                                    <span class="font-bold text-gray-700 text-sm whitespace-nowrap overflow-hidden text-ellipsis">${i.name}</span>
                                </div>
                            `).join('');
                            
                    html += `
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html; 
                if(tagsCont) tagsCont.innerHTML = tagsHtml;
            });
        }

        function updateNavStyles(pageId) {
            ['food', 'shopping', 'medical', 'explore'].forEach(id => {
                const btn = document.getElementById('nav-btn-' + id);
                if(btn) btn.className = `nav-btn px-4 py-2 rounded-full font-bold transition-all ` + (id===pageId ? `bg-theme${id==='food'?'Pink':id==='shopping'?'Yellow':id==='medical'?'Green':'Purple'} text-white shadow-md scale-105` : `text-gray-500 hover:bg-gray-100`);
            });
        }
        function toggleMobileMenu() { const m = document.getElementById('mobile-menu'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function toggleShareForm() { const f = document.getElementById('share-form-container'); f.classList.toggle('hidden'); if(!f.classList.contains('hidden')) setTimeout(() => f.scrollIntoView({behavior:'smooth', block:'center'}), 150); }

    </script>
</body>
