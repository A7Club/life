        const uniqueVillages = computed(() => {
          const villages = neighborhoods.value.map(item => item.village);
          return [...new Set(villages)];
        });

        const filteredNeighborhoods = computed(() => {
          return neighborhoods.value.filter(item => {
            // 1. 篩選里別
            const matchesVillage = selectedVillage.value === '' || item.village === selectedVillage.value;
            
            // 2. 搜尋關鍵字與智慧區段解析
            let q = searchQuery.value.trim();
            if (q === '') return matchesVillage;

            // 清理常規地址雜訊
            q = q.replace(/桃園市|龜山區/g, '');
            const qLower = q.toLowerCase();

            // 若標籤直接符合 (例如搜尋 "麗寶")
            if (item.tag && item.tag.toLowerCase().includes(qLower)) return matchesVillage;

            let isMatch = false;
            
            // 簡單字串比對
            if (item.streets.some(s => s.toLowerCase().includes(qLower))) {
               isMatch = true;
            } else {
               // 智慧區間比對邏輯 (例如 "樂善三路116號")
               const matchRegex = /^(.+?[路街段巷弄])\s*(\d+)號?/;
               const parsed = q.match(matchRegex);
               
               if (parsed) {
                 const searchRoad = parsed[1];
                 const searchNum = parseInt(parsed[2], 10);
                 const isEven = searchNum % 2 === 0;

                 for (let streetStr of item.streets) {
                   // 必須是在同一條路上
                   if (!streetStr.includes(searchRoad)) continue;

                   // 解析原資料中的區間範圍 (例如 "112號至118號")
                   const rangeRegex = /(\d+)\s*(?:號)?\s*至\s*(\d+)\s*(?:號)?/g;
                   let rMatch;
                   while ((rMatch = rangeRegex.exec(streetStr)) !== null) {
                     let start = parseInt(rMatch[1], 10);
                     let end = parseInt(rMatch[2], 10);
                     if (start > end) { let temp = start; start = end; end = temp; }

                     // 若號碼落在區間內
                     if (searchNum >= start && searchNum <= end) {
                       // 檢查是否有限制單/雙號
                       const requiresEven = streetStr.includes("雙號") || streetStr.includes("(雙)") || streetStr.includes("雙數");
                       const requiresOdd = streetStr.includes("單號") || streetStr.includes("(單)") || streetStr.includes("單數");

                       if (requiresEven && !isEven) continue; // 規定雙號，但輸入是單號則跳過
                       if (requiresOdd && isEven) continue;   // 規定單號，但輸入是雙號則跳過
                       
                       isMatch = true;
                       break;
                     }
                   }
                   if (isMatch) break;
                 }
               }
            }
            return matchesVillage && isMatch;
          });
        });

        return {
          searchQuery,
          selectedVillage,
          uniqueVillages,
          filteredNeighborhoods
        };
      }
